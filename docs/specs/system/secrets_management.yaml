---
meta:
  name: Secrets Management
  version: "1.0.0"

inventory:
  CRITICAL:
    - TELEGRAM_BOT_TOKEN
    - DATABASE_URL
    - KEK (Key Encryption Key)
  HIGH:
    - SCHOOL21_API_TOKEN
    - ROCKETCHAT_API_CREDENTIALS
    - S3_KEYS
    - GITHUB_DEPLOY_KEY
storage:
  prod: "systemd-credentials (primary) OR file (0400)"
  ci: "GitHub Secrets"
  dev: ".env (gitignored)"

security_rules:
  - "No logging of secrets"
  - "Zeroing memory after use"
  - "No ENV_VARS for secrets in production"

rotation:
  policy: "On compromise (immediate) or Quarterly (planned)"
  procedure: "Update secret store -> Restart service"
