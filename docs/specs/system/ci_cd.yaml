---
meta:
  name: "CI/CD"
  version: "1.0.0"

ci_pipeline:
  trigger: "Push/PR to main"
  steps:
    lint: "golangci-lint"
    lint_yaml: "yamllint ."
    test: "go test -race -cover ./..."
    build: "go build ./cmd/noemx21-bot"
    security: "govulncheck"

cd_pipeline:
  trigger: "Merge to main (after CI)"
  registry: "GHCR (GitHub Container Registry)"
  strategy: "Dokku (git:from-image)"
  steps:
    - "Build & Push Docker image to GHCR"
    - "SSH to Dokku Host"
    - "Deploy: dokku git:from-image <app> <image>"
    - "Config: dokku config:set <app> <secrets>"
    - "Migrations: dokku run <app> <migrate_cmd>"
    - "Healthcheck (internal Dokku checks)"

secrets:
  - VPS_HOST
  - VPS_USER
  - VPS_SSH_KEY
  - DOKKU_APP_NAME
