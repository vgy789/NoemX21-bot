---
meta:
  feature_id: CLB-001
  name: Клубы и группы
  description: Отображение списка доступных клубов и групп с фильтрацией по кампусу
  version: 2.0.0

initial_state: CLUBS_MENU
states:
  CLUBS_MENU:
    type: interactive
    description: Меню клубов
    interface:
      text:
        ru: |
          🎲 *Клубы и сообщества*

          Находи единомышленников и создавай свои движения.

          📍 *Локальные* – внутри твоего кампуса `{my_campus}`.
          🌍 *Глобальные* – межкампусные проекты и онлайн-группы.

          👇 *Выбери категорию для поиска:*
        en: |
          🎲 *Clubs and Communities*

          Find like-minded people and create your own movement.

          📍 *Local* – inside your campus `{my_campus}`.
          🌍 *Global* – inter-campus projects and online groups.

          👇 *Choose a search category:*
      buttons:
        - id: local
          label:
            ru: 📍 Локальные
            en: 📍 Local
          next_state: FETCH_LOCAL_CLUBS
          row: 1
        - id: global
          label:
            ru: 🌍 Глобальные
            en: 🌍 Global
          next_state: FETCH_GLOBAL_CLUBS
          row: 1
        - id: create_club
          label:
            ru: 🧩 Создать свой клуб
            en: 🧩 Create your club
          next_state: CREATE_CLUB_INFO
          row: 2
        - id: back
          label:
            ru: 🏠 Назад
            en: 🏠 Back
          next_state: MAIN_MENU

  FETCH_LOCAL_CLUBS:
    type: system
    description: Загрузка списка локальных клубов из БД
    logic:
      action: get_clubs
      payload:
        campus_id: $context.campus_id
        is_local: true
    transitions:
      - next_state: DISPLAY_CLUBS

  FETCH_GLOBAL_CLUBS:
    type: system
    description: Загрузка списка глобальных сообществ из БД
    logic:
      action: get_clubs
      payload:
        is_local: false
    transitions:
      - next_state: DISPLAY_CLUBS

  DISPLAY_CLUBS:
    type: interactive
    description: Отображение списка клубов
    interface:
      text:
        ru: |
          👥 *Доступные сообщества*

          {clubs_list}
        en: |
          👥 *Available communities*

          {clubs_list}
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: CLUBS_MENU

  CREATE_CLUB_INFO:
    type: interactive
    description: Информация о создании клуба
    interface:
      text:
        ru: |
          🧩 *Создание клуба*

          Хочешь собрать свою команду? Отличная идея!
          В кампусе *{my_campus}* за клубы отвечает *{leader_name}*.

          📝 *Что делать дальше:*
          Заполни форму заявки, и с тобой свяжутся:
          {leader_form_link}
        en: |
          🧩 *Club Creation*

          Want to gather your own team? Great idea!
          In *{my_campus}*, *{leader_name}* is responsible for clubs.

          📝 *Next steps:*
          Fill out the application form, and you will be contacted:
          {leader_form_link}
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: CLUBS_MENU
