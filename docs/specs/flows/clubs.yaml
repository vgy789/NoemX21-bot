---
meta:
  feature_id: CLB-001
  name: Клубы и группы
  description: 'Каталог клубов: локальные и глобальные сообщества'
  version: 2.0.1

initial_state: CLUBS_MENU
states:
  CLUBS_MENU:
    type: interactive
    description: Меню выбора типа клубов
    interface:
      text:
        ru: |
          🎲 *Клубы и сообщества*

          📍 *Локация:* `{my_campus}`

          📂 *Категории:*
          • *Local:* Клубы твоего кампуса
          • *Global:* Межкампусные проекты
        en: |
          🎲 *Clubs & Communities*

          📍 *Location:* `{my_campus}`

          📂 *Categories:*
          • *Local:* Your campus clubs
          • *Global:* Inter-campus projects
      buttons:
        - id: local
          label:
            ru: 📍 Локальные
            en: 📍 Local
          next_state: FETCH_LOCAL_CLUBS
          row: 1
        - id: global
          label:
            ru: 🌍 Глобальные
            en: 🌍 Global
          next_state: FETCH_GLOBAL_CLUBS
          row: 1
        - id: create_club
          label:
            ru: 🧩 Создать клуб
            en: 🧩 Create club
          next_state: CREATE_CLUB_INFO
          row: 2
        - id: back
          label:
            ru: 🏠 Главное меню
            en: 🏠 Main menu
          next_state: MAIN_MENU

  FETCH_LOCAL_CLUBS:
    type: system
    description: Загрузка списка локальных клубов из БД
    logic:
      action: get_clubs
      payload:
        campus_id: $context.campus_id
        is_local: true
    transitions:
      - next_state: DISPLAY_CLUBS

  FETCH_GLOBAL_CLUBS:
    type: system
    description: Загрузка списка глобальных сообществ из БД
    logic:
      action: get_clubs
      payload:
        is_local: false
    transitions:
      - next_state: DISPLAY_CLUBS

  DISPLAY_CLUBS:
    type: interactive
    description: Отображение списка клубов
    interface:
      text:
        ru: |
          👥 *Каталог клубов*

          {clubs_list}
        en: |
          👥 *Club Catalog*

          {clubs_list}
      buttons:
        - id: back
          label:
            ru: 🔙 В меню клубов
            en: 🔙 To Clubs menu
          next_state: CLUBS_MENU

  CREATE_CLUB_INFO:
    type: interactive
    description: Информация о создании клуба
    interface:
      text:
        ru: |
          🧩 *Новый клуб*

          📍 Кампус: `{my_campus}`
          👤 Лидер комьюнити: *{leader_name}*

          📝 *Регистрация:*
          Заполни официальную форму заявки на создание.
          🔗 {leader_form_link}
        en: |
          🧩 *New Club*

          📍 Campus: `{my_campus}`
          👤 Community Lead: *{leader_name}*

          📝 *Registration:*
          Fill out the official application form.
          🔗 {leader_form_link}
      buttons:
        - id: back
          label:
            ru: 🔙 В меню клубов
            en: 🔙 To Clubs menu
          next_state: CLUBS_MENU
