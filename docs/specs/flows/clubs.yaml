initial_state: INIT_CLUBS
states:
  INIT_CLUBS:
    type: system
    description: Инициализация данных кампуса
    logic:
      action: get_campus_info
      payload:
        campus_id: $context.campus_id
    transitions:
      - next_state: CLUBS_MAIN

  CLUBS_MAIN:
    type: interactive
    description: Меню выбора типа клубов
    interface:
      text:
        ru: |
          🎲 *Клубы и сообщества*

          Ищешь единомышленников, чтобы вайбкодить 24/7 или играть в настолки до утра? Ты по адресу.
        en: |
          🎲 *Clubs & Communities*

          Looking for peers to vibecode 24/7 or play board games until dawn? You're in the right place.
      buttons:
        - id: local
          label:
            ru: 🏫 В моём кампусе
            en: 🏫 In my campus
          next_state: FETCH_LOCAL_CATEGORIES
          row: 1
        - id: global
          label:
            ru: 🌍 Межкампусные
            en: 🌍 Global communities
          next_state: FETCH_GLOBAL_CATEGORIES
          row: 1
        - id: create_club
          label:
            ru: 🧩 Собрать свой клуб
            en: 🧩 Assemble a club
          next_state: CREATE_CLUB_INFO
          row: 2
        - id: update_club
          label:
            ru: ℹ️ Как добавить / обновить
            en: ℹ️ How to add / update
          next_state: UPDATE_CLUB_INFO
          row: 2
        - id: back
          label:
            ru: 🏠 На главную
            en: 🏠 Main menu
          row: 3
          next_state: MAIN_MENU

  FETCH_LOCAL_CATEGORIES:
    type: system
    description: Загрузка категорий локальных клубов
    logic:
      action: get_categories
      payload:
        campus_id: $context.campus_id
        is_local: true
    transitions:
      - next_state: SELECT_CATEGORY

  FETCH_GLOBAL_CATEGORIES:
    type: system
    description: Загрузка категорий глобальных сообществ
    logic:
      action: get_categories
      payload:
        is_local: false
    transitions:
      - next_state: SELECT_CATEGORY

  SELECT_CATEGORY:
    type: interactive
    description: Выбор категории клубов
    interface:
      text:
        ru: |
          🗂️ *Клубы / Категории*

          В каком направлении будем искать? Выбери категорию:
        en: |
          🗂️ *Clubs / Categories*

          Which direction? Select a category:
      buttons:
        - id: "{category_1}"
          label: "{category_1}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_2}"
          label: "{category_2}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_3}"
          label: "{category_3}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_4}"
          label: "{category_4}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_5}"
          label: "{category_5}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_6}"
          label: "{category_6}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_7}"
          label: "{category_7}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_8}"
          label: "{category_8}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_9}"
          label: "{category_9}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_10}"
          label: "{category_10}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_11}"
          label: "{category_11}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_12}"
          label: "{category_12}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_13}"
          label: "{category_13}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_14}"
          label: "{category_14}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: "{category_15}"
          label: "{category_15}"
          next_state: FETCH_CLUBS_BY_CATEGORY
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: INIT_CLUBS

  FETCH_CLUBS_BY_CATEGORY:
    type: system
    description: Загрузка клубов, отфильтрованных по выбранной категории
    logic:
      action: get_clubs_by_category
      payload:
        category_name: $context.last_input
        campus_id: $context.campus_id
        is_local: $context.is_local
    transitions:
      - next_state: CLUBS_LIST

  CLUBS_LIST:
    type: interactive
    description: Отображение списка клубов в категории
    interface:
      text:
        ru: |
          *Клубы / Категория: {category_name}*

          Вот что удалось отыскать. Тыкай на любой, чтобы узнать подробности:
        en: |
          *Clubs / Category: {category_name}*

          Here's the list. Click any club to see the details:
      buttons:
        - id: "{club_id_1}"
          label: "{club_name_1}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_2}"
          label: "{club_name_2}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_3}"
          label: "{club_name_3}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_4}"
          label: "{club_name_4}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_5}"
          label: "{club_name_5}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_6}"
          label: "{club_name_6}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_7}"
          label: "{club_name_7}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_8}"
          label: "{club_name_8}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_9}"
          label: "{club_name_9}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_10}"
          label: "{club_name_10}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_11}"
          label: "{club_name_11}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_12}"
          label: "{club_name_12}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_13}"
          label: "{club_name_13}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_14}"
          label: "{club_name_14}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_15}"
          label: "{club_name_15}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_16}"
          label: "{club_name_16}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_17}"
          label: "{club_name_17}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_18}"
          label: "{club_name_18}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_19}"
          label: "{club_name_19}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_20}"
          label: "{club_name_20}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_21}"
          label: "{club_name_21}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_22}"
          label: "{club_name_22}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_23}"
          label: "{club_name_23}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_24}"
          label: "{club_name_24}"
          next_state: GET_CLUB_DETAIL
        - id: "{club_id_25}"
          label: "{club_name_25}"
          next_state: GET_CLUB_DETAIL
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: SELECT_CATEGORY

  GET_CLUB_DETAIL:
    type: system
    description: Загрузка карточки выбранного клуба
    logic:
      action: get_club_card
      payload:
        club_id: $context.last_input
        campus_id: $context.campus_id
    transitions:
      - next_state: CLUB_DETAIL

  CLUB_DETAIL:
    type: interactive
    description: Отображение детальной информации о клубе
    interface:
      text:
        ru: |
          {club_card}
        en: |
          {club_card}
      buttons:
        - id: join_club
          label:
            ru: 🔗 Занырнуть в канал
            en: 🔗 Dive into channel
          url: "{club_link}"
          condition: club_link != ''
        - id: back_to_list
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: CLUBS_LIST

  CREATE_CLUB_INFO:
    type: interactive
    description: Информация о создании клуба
    interface:
      text:
        ru: |
          🧩 *Хочешь стать вожаком стаи?*

          📍 Кампус: `{my_campus}`
          👤 Твой проводник (Lead): *{leader_name}*

          Чтобы создать свой клуб, нужно заполнить серьёзную форму. Опиши свою идею так, чтобы все крякнули от восторга!

          🔗 {leader_form_link}
        en: |
          🧩 *Want to lead the flock?*

          📍 Campus: `{my_campus}`
          👤 Your Community Lead: *{leader_name}*

          To start your own club, you need to fill out a serious form. Describe your idea so well that everyone quacks with joy!

          🔗 {leader_form_link}
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: INIT_CLUBS

  UPDATE_CLUB_INFO:
    type: interactive
    description: Информация о добавлении и обновлении данных клуба
    interface:
      text:
        ru: |
          ℹ️ *Как добавить / обновить информацию по группе*

          • Не нравится название, описание, эмодзи твоей группы?
          • Группа находится не в том разделе?
          • Организовал:а новый клуб и хочешь показать его остальным?

          Исправь всё в школьном репозитории данных бота.
          Либо попроси в чате бота.
        en: |
          ℹ️ *How to add / update group information*

          • Want to change your group name, description, or emoji?
          • Is your group shown in the wrong section?
          • Started a new club and want others to see it?

          Update everything in the school bot's data repository.
          Or ask the bot in the chat.
      buttons:
        - id: open_bot_content_repo
          label:
            ru: 🔗 Открыть репозиторий данных
            en: 🔗 Open data repository
          url: "{bot_content_repo_link}"
          condition: bot_content_repo_link != ''
        - id: open_bot_chat
          label:
            ru: 💬 Открыть чат бота
            en: 💬 Open bot chat
          url: "{bot_telegram_link}"
          condition: bot_telegram_link != ''
        - id: update_info_ok
          label:
            ru: ✅ Понятно
            en: ✅ Got it
          next_state: CLUBS_MAIN
