  GROUP_DEFENDER_WHITELIST_ADD_INPUT:
    type: input
    description: Ввод Telegram ID для whitelist
    interface:
      text:
        ru: |
          ➕ *Добавление в whitelist*

          Введи числовой Telegram ID пользователя.
        en: |
          ➕ *Add to whitelist*

          Enter numeric Telegram user ID.
      error_invalid:
        ru: "Нужен числовой Telegram ID."
        en: "Numeric Telegram ID is required."
      buttons:
        - id: def_wl_add_cancel
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: GROUP_DEFENDER_WHITELIST
    validation:
      regex: ^[0-9]{4,20}$
    transitions:
      - trigger: on_valid_input
        action: add_group_defender_whitelist_from_input
        next_state: GROUP_DEFENDER_WHITELIST

  GROUP_DEFENDER_BAN_DURATION_INPUT:
    type: input
    description: Ввод длительности временного бана Defender
    interface:
      text:
        ru: |
          ⏳ *Срок временной блокировки*

          Введи срок в формате: `5m`, `24h`, `3d`.
          Допустимый диапазон: от `5m` до `30d`.
        en: |
          ⏳ *Temporary ban duration*

          Enter duration in format: `5m`, `24h`, `3d`.
          Allowed range: from `5m` to `30d`.
      error_invalid:
        ru: "Неверный формат. Примеры: 5m, 24h, 3d."
        en: "Invalid format. Examples: 5m, 24h, 3d."
      buttons:
        - id: def_ban_duration_cancel
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: GROUP_DEFENDER_AUTOMODE
    validation:
      regex: (?i)^\s*[0-9]{1,4}\s*[mhd]\s*$
    transitions:
      - trigger: on_valid_input
        action: set_group_defender_ban_duration_from_input
        next_state: GROUP_DEFENDER_AUTOMODE

