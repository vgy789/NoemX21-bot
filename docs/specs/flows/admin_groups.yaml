  GROUP_MODERATION_COMMANDS:
    type: interactive
    description: Список команд модерации для группы
    interface:
      text:
        ru: |
          📑 *Команды модерации*

          💡 _Любую команду можно использовать в ответ на сообщение пользователя (reply) или просто указав его данные после команды:_ `<ник | @username | id>`

          `/mute [время]` — запретить писать сообщения на указанный срок.
          `/unmute` — досрочно разрешить писать сообщения.
          `/kick` — выгнать участника из группы (он сможет вернуться обратно по ссылке).
          `/ban` — заблокировать участника (он добавляется в чёрный список и не сможет вернуться).
          `/unban` или `/eban` — снять блокировку (удалить из чёрного списка).
          `/white` — добавить участника в белый список и полностью снять блокировку в группе.

          _Примеры времени:_ `10m`, `10минут`, `2 hours`, `2 Ч`, `6 Days`, `6 дней`.
        en: |
          📑 *Moderation Commands*

          💡 _Any command can be used by replying to a user's message or by explicitly specifying their target after the command:_ `<login | @username | id>`

          `/mute [duration]` — restrict the user from sending messages for a specific time.
          `/unmute` — remove message restrictions early.
          `/kick` — remove the user from the group (they can rejoin via an invite link).
          `/ban` — ban the user (adds them to the blacklist so they cannot rejoin).
          `/unban` or `/eban` — unban the user (removes them from the blacklist).
          `/white` — add the user to the whitelist and clear all group bans.

          _Duration examples:_ `10m`, `10минут`, `2 hours`, `2 Ч`, `6 Days`, `6 дней`.
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: GROUP_MODERATORS_MENU
          row: 99

