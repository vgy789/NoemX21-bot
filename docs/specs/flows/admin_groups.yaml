initial_state: ADMIN_MENU
states:
  ADMIN_MENU:
    type: system
    description: Проверка наличия групп
    logic:
      action: load_admin_context
    transitions:
      - condition: is_group_owner == true
        next_state: SELECT_GROUP_TO_MANAGE
      - next_state: NO_GROUPS_INFO

  NO_GROUPS_INFO:
    type: interactive
    description: Инструкция при отсутствии групп
    interface:
      text:
        ru: |
          *Клубы / Админка групп*

          Чтобы бот мог управлять твоей группой, добавь его в свою группу Telegram и назначь администратором.

          *Возможности бота:*
          • Защитник: удаление чужаков и отчисленных
          • Уведомления: пересылка новых PRR
          • Плашки/Статусы (Member Tags): авто-установка логина/уровня возле имени
          • Умное приветствие: Onboarding новичков
        en: |
          *Clubs / Group Admin*

          To let the bot manage your group, add it to your Telegram group and promote it to administrator.

          *Bot features:*
          • Defender: auto-kick non-members and expelled
          • Notifications: forward incoming PRR
          • Member Tags: auto-assign login/level titles near names
          • Smart Welcome: personalized onboarding
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: CLUBS_MAIN

  SELECT_GROUP_TO_MANAGE:
    type: interactive
    description: Выбор группы (клуба) для управления
    on_enter:
      - action: load_admin_context
    interface:
      text:
        ru: |
          🎲 *Выбор группы*

          Здесь ты можешь настроить работу бота в своих группах.
          *Возможности:*
          • Защитник: удаление чужаков и отчисленных
          • Уведомления: пересылка новых PRR
          • Плашки/Статусы (Member Tags): авто-установка логина/уровня возле имени
          • Умное приветствие: Onboarding новичков

          Выбери группу из списка:
        en: |
          🎲 *Select Group*

          Configure the bot for your groups here.
          *Features:*
          • Defender: auto-kick non-members and expelled
          • Notifications: forward incoming PRR
          • Member Tags: auto-assign login/level titles near names
          • Smart Welcome: personalized onboarding

          Choose a group from the list:
      buttons:
        - id: "{group_button_id_1}"
          label: "{group_title_1}"
          condition: "group_chat_id_1 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_2}"
          label: "{group_title_2}"
          condition: "group_chat_id_2 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_3}"
          label: "{group_title_3}"
          condition: "group_chat_id_3 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_4}"
          label: "{group_title_4}"
          condition: "group_chat_id_4 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_5}"
          label: "{group_title_5}"
          condition: "group_chat_id_5 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_6}"
          label: "{group_title_6}"
          condition: "group_chat_id_6 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_7}"
          label: "{group_title_7}"
          condition: "group_chat_id_7 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_8}"
          label: "{group_title_8}"
          condition: "group_chat_id_8 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_9}"
          label: "{group_title_9}"
          condition: "group_chat_id_9 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_10}"
          label: "{group_title_10}"
          condition: "group_chat_id_10 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: CLUBS_MAIN

  GROUP_ADMIN_MENU:
    type: interactive
    description: Экран выбранной группы
    interface:
      text:
        ru: |
          🛠 Настройка группы / *{selected_group_title}*
          Chat ID: `{selected_group_chat_id}`

          Раздел настроек этой группы будет расширен в следующих обновлениях.
        en: |
          🛠 Group Settings / *{selected_group_title}*
          Chat ID: `{selected_group_chat_id}`

          This group settings section will be expanded in upcoming updates.
      buttons:
        - id: back_to_groups
          label:
            ru: ↩️ К списку групп
            en: ↩️ Back to groups
          next_state: SELECT_GROUP_TO_MANAGE
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: CLUBS_MAIN
