  GROUP_DEFENDER_AUTOMODE:
    type: interactive
    description: Настройки авто-защиты
    on_enter:
      - action: load_group_defender_context
    interface:
      text:
        ru: |
          ⚙️ *Настройки автоматического фейс-контроля*

          *По умолчанию* я проверяю только новые входы и заявки на вступление и не трогаю тех, кто уже есть в группе.
          Когда группа использует *заявки на вступление*, перед отклонением заявки я напишу пользователю в личку, почему его не пустили и что нужно исправить (подробнее в «📌 Рекомендация»).

          🛡 *Мои фильтры:*

          *1. Регистрация в боте:*
          `{defender_enabled_label_ru}` _(Если вкл: не пускаю тех, кто не залогинился в боте)_

          *2. Статус (Заблокирован/Отчислен):*
          `{defender_remove_blocked_label_ru}` _(Если вкл: не пускаю отчисленных и заблокированных студентов)_

          *3. Фильтр по кампусам:*
          Разрешить `{defender_filter_campus_label_ru}` _(Можно выбрать несколько. Если выбран: пускаю только из этих кампусов)_

          *4. Фильтр по трайбам:*
          Разрешить `{defender_filter_tribe_label_ru}` _(Можно выбрать несколько, но только из твоего кампуса. При выборе трайбов фильтр №3 фиксируется *на твоём* кампусе)_

          *5. Проверять уже вошедших:*
          `{defender_recheck_known_members_label_ru}` _(Если вкл: буду удалять участников, которые написали в чат или попали в фоновую проверку и больше не проходят включенные фильтры)_
        en: |
          ⚙️ *Auto Face-Control Settings*

          *By default*, I only check new joins and join requests and do not touch those who are already in the group.
          When the group uses *join requests*, before declining a request, I will message the user privately to explain why they were not let in and what needs to be fixed (more details in "📌 Recommendation").

          🛡 *My filters:*

          *1. Registration in the bot:*
          `{defender_enabled_label_en}` _(If enabled: I do not let in those who have not logged into the bot)_

          *2. Status (Banned/Expelled):*
          `{defender_remove_blocked_label_en}` _(If enabled: I do not let in expelled and banned students)_

          *3. Campus filter:*
          Allow `{defender_filter_campus_label_en}` _(You can select multiple. If selected: I only let in people from these campuses)_

          *4. Tribe filter:*
          Allow `{defender_filter_tribe_label_en}` _(You can select multiple, but only from your campus. When selecting tribes, filter #3 is locked to *your* campus)_

          *5. Check already joined members:*
          `{defender_recheck_known_members_label_en}` _(If enabled: I will remove members who write in the chat or undergo a background check and no longer pass the enabled filters)_
      buttons:
        - id: def_enable_on
          label:
            ru: 1. Не пускать незарегистрированных в боте
            en: 1. Don‘t allow unregistered users in the bot
          action: set_group_defender_enabled
          condition: "can_manage_selected_group == true && defender_enabled == false"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1
        - id: def_enable_off
          label:
            ru: 1. Пускать незарегистрироанных в боте
            en: 1. Allow unregistered users in the bot
          action: set_group_defender_enabled
          condition: "can_manage_selected_group == true && defender_enabled == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1
        - id: def_blocked_on
          label:
            ru: 2. Не пускать отчисленных
            en: 2. Don‘t allow blocked users
          action: set_group_defender_remove_blocked
          condition: "can_manage_selected_group == true && defender_remove_blocked == false"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 2
        - id: def_blocked_off
          label:
            ru: 2. Пускать отчисленных
            en: 2. Allow blocked users
          action: set_group_defender_remove_blocked
          condition: "can_manage_selected_group == true && defender_remove_blocked == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 2
        - id: def_open_filter_campus
          label:
            ru: 3. Настроить фильтр по кампусу
            en: 3. Configure campus filter
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 3
        - id: def_open_filter_tribe
          label:
            ru: 4. Настроить фильтр по трайбу
            en: 4. Configure tribe filter
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_FILTER_TRIBE
          row: 4
        - id: def_recheck_known_on
          label:
            ru: 5. Проверять уже вошедших
            en: 5. Recheck existing members
          action: set_group_defender_recheck_known_members
          condition: "can_manage_selected_group == true && defender_recheck_known_members == false"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 5
        - id: def_recheck_known_off
          label:
            ru: 5. Не трогать уже вошедших
            en: 5. Do not recheck existing members
          action: set_group_defender_recheck_known_members
          condition: "can_manage_selected_group == true && defender_recheck_known_members == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 5
        - id: show_recommendation
          label:
            ru: 📌 Рекомендация по настройке
            en: 📌 See the setup guide
          next_state: GROUP_DEFENDER_RECOMMENDATION
          row: 6
        - id: def_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_DEFENDER_MENU

  GROUP_DEFENDER_RECOMMENDATION:
    type: interactive
    description: Рекомендация по включению заявок на вступление
    interface:
      text:
        ru: |
          📌 *Рекомендация*

          Представь ситуации: 
          – бот перестал работать, и все новички могут свободно проходить мимо фейс-контроля;
          – перед входом пир не зарегистрировался в боте, а тот его *без объяснений* мгновенно удалил из группы.

          Чтобы этого не допустить, *крайне рекомендуется включить* функцию *«Заявки на вступление»*.

          *Как включить:*
          1. Открой свою группу → нажми на название группы вверху.
          2. Нажми *«Управление группой»* (или *«Редактировать»* → *«Информация о группе»*).
          3. Перейди в раздел *«Пригласительные ссылки»* (Invite Links).
          4. Нажми *«Создать новую ссылку»* (или отредактируй существующую).
          5. Включи переключатель *«Заявки на вступление»* / *«Одобрять новых участников»* / *«Request admin approval»*.
          6. Сохрани ссылку.

          Теперь все, кто перейдёт по этой ссылке, будут видеть кнопку *«Подать заявку»* вместо автоматического вступления.

          Если бот внезапно отключился, то админ группы сможет вручную обработать заявки. Или он может дождаться когда бот заработает снова, отклонить новые заявки, и в ЛС пользователей попросить подать её снова (т.к. бот может только *перехватывать* заявки в реальном времени).

          📌 Не забудь указать новую ссылку на группу в разделе *Клубы*.
        en: |
          📌 *Recommendation*

          Imagine these situations:
          – The bot stops working, and all newcomers can freely bypass the face control;
          – A user didn't register in the bot before entering, and the bot instantly removes them from the group *without explanation*.

          To prevent this from happening, it is *highly recommended to enable* the *«Request Admin Approval»* feature. 

          *How to enable:*
          1. Open your group → tap on the group name at the top.
          2. Tap *«Manage Group»* (or *«Edit»* → *«Group Info»*).
          3. Go to the *«Invite Links»* section.
          4. Tap *«Create a New Link»* (or edit an existing one).
          5. Turn on the *«Request Admin Approval»* toggle.
          6. Save the link.

          Now, everyone who follows this link will see the *«Request to Join»* button instead of joining automatically.

          If the bot suddenly goes offline, the group admin can process the requests manually. Alternatively, they can wait for the bot to come back online, decline the new requests, and ask the users via private message to submit them again (as the bot can only *intercept* requests in real time).

          📌 Don't forget to specify the link to the new group in the Clubs section.
      buttons:
        - id: recommendation_ok
          label:
            ru: ✅ Понятно
            en: ✅ Got it
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1

