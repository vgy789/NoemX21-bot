  GROUP_DEFENDER_AUTOMODE:
    type: interactive
    description: Настройки авто-защиты
    on_enter:
      - action: load_group_defender_context
    interface:
      text:
        ru: |
          ⚙️ *Настройки фейс-контроля*

          Если режим включён, я проверяю каждого новичка прямо «на пороге».
          ⚠️ *Авто-режим не затрагивает тех, кто уже в чате.*

          🛡 *Мои фильтры:*

          *1. Регистрация в боте:*
          `{defender_enabled_label_ru}` _(Не пускаю тех, кто не залогинился в боте)_

          *2. Статус (Blocked/Expelled):*
          `{defender_remove_blocked_label_ru}` _(Не пускаю отчисленных студентов)_

          *3. Фильтр по кампусам:*
          `{defender_filter_campus_label_ru}` _(Можно выбрать несколько. Если есть выбор — пускаю только из этих кампусов.)_

          *4. Фильтр по трайбам:*
          `{defender_filter_tribe_label_ru}` _(Можно выбрать несколько, но только из твоего кампуса. При выборе трайбов кампус фиксируется на твоём.)_

          *5. Срок блокировки:*
          `{defender_ban_duration_label_ru}` _(После истечения срока Telegram разбанит пользователя автоматически)_
        en: |
          ⚙️ *Gatekeeper Settings*

          When enabled, I check every newcomer at the "gate".
          ⚠️ *Auto-mode does not affect existing group members.*

          🛡 *Filters:*

          *1. Bot Registration:*
          `{defender_enabled_label_en}` _(Keep out users who haven't logged into the bot)_

          *2. Status (Blocked/Expelled):*
          `{defender_remove_blocked_label_en}` _(Keep out expelled students)_

          *3. Campus Filter:*
          `{defender_filter_campus_label_en}` _(Multi-select. If set — allow only these campuses.)_

          *4. Tribe Filter:*
          `{defender_filter_tribe_label_en}` _(Multi-select, but only from your campus. Enabling tribe filters locks campus to yours.)_

          *5. Ban Duration:*
          `{defender_ban_duration_label_en}` _(User will be automatically unbanned by Telegram after this time)_
      buttons:
        - id: def_enable_on
          label:
            ru: 1. Не пускать незарегистрированных в боте
            en: 1. Don‘t allow unregistered users in the bot
          action: set_group_defender_enabled
          condition: "can_manage_selected_group == true && defender_enabled == false"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1
        - id: def_enable_off
          label:
            ru: 1. Пускать незарегистрироанных в боте
            en: 1. Allow unregistered users in the bot
          action: set_group_defender_enabled
          condition: "can_manage_selected_group == true && defender_enabled == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1
        - id: def_blocked_on
          label:
            ru: 2. Не пускать отчисленных
            en: 2. Don‘t allow blocked users
          action: set_group_defender_remove_blocked
          condition: "can_manage_selected_group == true && defender_remove_blocked == false"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 2
        - id: def_blocked_off
          label:
            ru: 2. Пускать отчисленных
            en: 2. Allow blocked users
          action: set_group_defender_remove_blocked
          condition: "can_manage_selected_group == true && defender_remove_blocked == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 2
        - id: def_open_filter_campus
          label:
            ru: 3. Настроить фильтр по кампусу
            en: 3. Configure campus filter
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 3
        - id: def_open_filter_tribe
          label:
            ru: 4. Настроить фильтр по трайбу
            en: 4. Configure tribe filter
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_FILTER_TRIBE
          row: 4
        - id: def_ban_custom
          label:
            ru: 5. Ввести срок блокировки
            en: 5. Enter ban duration
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_BAN_DURATION_INPUT
          row: 5
        - id: def_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_DEFENDER_MENU

