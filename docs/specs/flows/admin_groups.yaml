          label: "{defender_whitelist_remove_label_8}"
          action: remove_group_defender_whitelist
          condition: "defender_whitelist_remove_button_id_8 != ''"
          next_state: GROUP_DEFENDER_WHITELIST
          row: 9
        - id: "{defender_whitelist_remove_button_id_9}"
          label: "{defender_whitelist_remove_label_9}"
          action: remove_group_defender_whitelist
          condition: "defender_whitelist_remove_button_id_9 != ''"
          next_state: GROUP_DEFENDER_WHITELIST
          row: 10
        - id: "{defender_whitelist_remove_button_id_10}"
          label: "{defender_whitelist_remove_label_10}"
          action: remove_group_defender_whitelist
          condition: "defender_whitelist_remove_button_id_10 != ''"
          next_state: GROUP_DEFENDER_WHITELIST
          row: 11
        - id: def_back_menu
          label:
            ru: 🔙 Назад в меню
            en: 🔙 Back to menu
          row: 99
          next_state: GROUP_DEFENDER_MENU

  GROUP_DEFENDER_WHITELIST_ADD_INPUT:
    type: input
    description: Ввод Telegram ID или @username для whitelist
    interface:
      text:
        ru: |
          ➕ *Добавление в whitelist*

          Введи Telegram ID или @username пользователя.
        en: |
          ➕ *Add to whitelist*

          Enter Telegram user ID or @username.
      error_invalid:
        ru: "Укажи Telegram ID или @username."
        en: "Provide Telegram ID or @username."
      buttons:
        - id: def_wl_add_cancel
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: GROUP_DEFENDER_WHITELIST
    validation:
      regex: '(?i)^\s*(?:[0-9]{4,20}|@?[a-z][a-z0-9_]{4,31})\s*$'
    transitions:
      - trigger: on_valid_input
        action: add_group_defender_whitelist_from_input
        next_state: GROUP_DEFENDER_WHITELIST

  GROUP_DEFENDER_LOGS:
    type: interactive
    description: Лог последних действий защитника
    on_enter:
      - action: load_group_defender_logs
    interface:
      text:
        ru: |
          📜 *Последние действия защитника*

          _Что здесь отображается:_ когда сработал защитник, что сделал и почему.

          {defender_logs_list_ru}
        en: |
          📜 *Recent defender actions*

          _What you see here:_ when Defender ran, what it did, and why.

          {defender_logs_list_en}
      buttons:
        - id: def_logs_refresh
          label:
            ru: 🔄 Обновить
            en: 🔄 Refresh
          action: load_group_defender_logs
          next_state: GROUP_DEFENDER_LOGS
          row: 1
        - id: def_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_DEFENDER_MENU

  GROUP_MEMBER_TAGS_RUN:
    type: interactive
    description: Ручной запуск тегирования
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          🚀 *Ручное обновление тегов*

          Запустить обновление подписей (админ-тегов) для всех участников чата?

          ⚠️ *Важно:* Я не могу изменять теги другим администраторам – Telegram запрещает ботам редактировать профили владельцев и коллег-админов.

          *Варианты*
          • *Без замены* — добавлю теги только тем, у кого их сейчас нет.
          • *С заменой* — полностью обновлю подписи у всех «своих» пользователей.
        en: |
          🚀 *Manual Tag Update*

          Would you like to process admin tags for all group members right now?

          ⚠️ *Note:* I cannot edit tags for other admins. Telegram restrictions prevent bots from modifying the profiles of owners or other administrators.

          *Options:*
          • *Keep existing* — only tag users who currently have no tag.
          • *Full refresh* — force update tags for all registered users.
      buttons:
        - id: tags_run_keep
          label:
            ru: ▶️ Без замены
            en: ▶️ Keep existing
          action: run_group_member_tags
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 1
        - id: tags_run_clear
          label:
            ru: 🧹 С заменой
            en: 🧹 Replace all
          action: run_group_member_tags
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 1
        - id: tags_run_rollback
          label:
            ru: ↩️ Откатить ручные теги
            en: ↩️ Roll back manual tags
          action: rollback_group_member_tags
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 2
        - id: tags_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_MEMBER_TAGS_MENU

  GROUP_MEMBER_TAGS_FORMAT:
    type: interactive
    description: Настройка формата тегов
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          🏷 *Формат тега*

          Как должна выглядеть подпись?

          1️⃣ `login` — просто логин (коротко и ясно).
          2️⃣ `login [lvl]` — логин и уровень (сразу видно дедов).

          Сейчас выбрано: `{member_tag_format_label_ru}`
        en: |
          🏷 *Tag Format*

          How should the tag look?

          1️⃣ `login` — just login (clean).
          2️⃣ `login [lvl]` — login and level (shows experience).

          Currently: `{member_tag_format_label_en}`
      buttons:
        - id: tags_fmt_login
          label:
            ru: "{member_tag_login_option_label_ru}"
            en: "{member_tag_login_option_label_en}"
          action: set_group_member_tag_format
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 1
        - id: tags_fmt_login_level
          label:
            ru: "{member_tag_login_level_option_label_ru}"
            en: "{member_tag_login_level_option_label_en}"
          action: set_group_member_tag_format
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 1
        - id: tags_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_MEMBER_TAGS_MENU
