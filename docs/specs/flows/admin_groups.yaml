  GROUP_MEMBER_TAGS_MENU:
    type: interactive
    description: Раздел управления тегами участников
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          🛠 *Теги пользователей* / {selected_group_title}

          Я могу вешать участникам «плашки» (Member Tags) с их логином и уровнем. Это помогает сразу понять, кто есть кто.

          • *Авто-режим:* `{member_tags_enabled_label_ru}`
          • *Формат:* `{member_tag_format_label_ru}`

          📊 *Последний запуск:*
          `{member_tags_last_run_summary_ru}`

          _Это работает только для зарегистрированых пользователей._
        en: |
          🛠 *Member Tags* / {selected_group_title}

          I can assign tags with logins and levels. It helps to identify who's who in the chat instantly.

          • *Auto mode:* `{member_tags_enabled_label_en}`
          • *Format:* `{member_tag_format_label_en}`

          📊 *Last run:*
          `{member_tags_last_run_summary_en}`

          _This feature is available only to registered users._
      buttons:
        - id: tags_autotag_settings
          label:
            ru: "⚙️ Настроить авто-режим"
            en: "⚙️ Setup auto-mode"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_format_settings
          label:
            ru: "🏷 Сменить формат тега"
            en: "🏷 Change tag format"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 2
        - id: tags_run_settings
          label:
            ru: "🚀 Ручной запуск"
            en: "🚀 Manual run"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 3
        - id: back_to_groups
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_ADMIN_MENU

  GROUP_MEMBER_TAGS_AUTOTAG:
    type: interactive
    description: Настройка автотегирования
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          ⚙️ *Автотегирование*

          Когда включено, я автоматически:
          1. Ставлю тег новичку при входе.
          2. Обновляю уровень (если выбран формат с `[lvl]`).
          3. Ставлю тег сразу после новой регистрации в боте.

          🙅‍♂️ _Важно: я не могу менять теги другим админам – Telegram не разрешает ботам трогать «боссов»._

          Текущий статус: `{member_tags_enabled_label_ru}`
        en: |
          ⚙️ *Auto Tagging*

          When enabled, I automatically:
          1. Assign a tag to newcomers on join.
          2. Refresh levels (if `[lvl]` format is active)
          3. Tag users right after they register with the bot.

          🙅‍♂️ _Note: I cannot edit tags for other admins – Telegram forbids bots from touching the "bosses"._

          Current status: `{member_tags_enabled_label_en}`
      buttons:
        - id: tags_enable_on
          label:
            ru: ✅ Включить
            en: ✅ Enable
          action: set_group_member_tags_enabled
          condition: "can_manage_selected_group == true && member_tags_enabled == false"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_enable_off
          label:
            ru: ❌ Выключить
            en: ❌ Disable
          action: set_group_member_tags_enabled
          condition: "can_manage_selected_group == true && member_tags_enabled == true"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_MEMBER_TAGS_MENU

