initial_state: ADMIN_MENU
states:
  ADMIN_MENU:
    type: system
    description: Проверка наличия групп
    logic:
      action: load_admin_context
    transitions:
      - condition: is_group_owner == true
        next_state: SELECT_GROUP_TO_MANAGE
      - next_state: NO_GROUPS_INFO

  NO_GROUPS_INFO:
    type: interactive
    description: Инструкция при отсутствии групп
    interface:
      text:
        ru: |
          🦆 *Утиная админка / Клубы*

          Чтобы я могла наводить порядок в твоем комьюнити, меня нужно позвать в чат.

          *Твой план действий:*
          1. Добавь меня в свою группу Telegram.
          2. Выдай права администратора.
          3. Возвращайся сюда – и мы все настроим!

          *Что я возьму на себя:*
          🛡 *Защита:* выгоняю «левых» и отчисленных.
          📨 *PRR-радар:* пересылаю свежие запросы на ревью.
          🏷 *Авто-теги:* ставлю логин и уровень рядом с именем.
          👋 *Onboarding:* встречаю новичков по-человечески.
        en: |
          🦆 *Duck Admin / Clubs*

          To let me manage your community, I need an invite to the pond.

          *Your plan:*
          1. Add me to your Telegram group.
          2. Grant me administrator rights.
          3. Come back here and we'll set everything up!

          *What I'll handle:*
          🛡 *Defender:* kicks outsiders and expelled users.
          📨 *PRR-Radar:* forwards active review requests.
          🏷 *Member Tags:* auto-assigns login and level titles.
          👋 *Onboarding:* greets newcomers properly.
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: CLUBS_MAIN

  SELECT_GROUP_TO_MANAGE:
    type: interactive
    description: Выбор группы (клуба) для управления
    on_enter:
      - action: load_admin_context
    interface:
      text:
        ru: |
          🦆 *Твои группы*

          Выбери группу, в которой мне предстоит поработать клювом. Настроим безопасность, уведомления и теги.

          Где будем настраивать? 👇
        en: |
          🦆 *Your Groups*

          Select a group where I will work. We'll set up security, notifications, and tags.

          Which one are we configuring? 👇
      buttons:
        - id: "{group_button_id_1}"
          label: "{group_title_1}"
          condition: "group_chat_id_1 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_2}"
          label: "{group_title_2}"
          condition: "group_chat_id_2 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_3}"
          label: "{group_title_3}"
          condition: "group_chat_id_3 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_4}"
          label: "{group_title_4}"
          condition: "group_chat_id_4 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_5}"
          label: "{group_title_5}"
          condition: "group_chat_id_5 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_6}"
          label: "{group_title_6}"
          condition: "group_chat_id_6 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_7}"
          label: "{group_title_7}"
          condition: "group_chat_id_7 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_8}"
          label: "{group_title_8}"
          condition: "group_chat_id_8 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_9}"
          label: "{group_title_9}"
          condition: "group_chat_id_9 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_10}"
          label: "{group_title_10}"
          condition: "group_chat_id_10 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: CLUBS_MAIN

  GROUP_ADMIN_MENU:
    type: interactive
    description: Экран выбранной группы
    interface:
      text:
        ru: |
          🛠 *Управление* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          Выбирай нужный раздел.
        en: |
          🛠 *Management* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          Pick a section.
      buttons:
        - id: open_member_tags_settings
          label:
            ru: 🏷 Теги пользователей
            en: 🏷 Member Tags
          next_state: GROUP_MEMBER_TAGS_MENU
        - id: back_to_groups
          label:
            ru: ↩️ К списку групп
            en: ↩️ Back to groups
          row: 99
          next_state: SELECT_GROUP_TO_MANAGE
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: CLUBS_MAIN

  GROUP_MEMBER_TAGS_MENU:
    type: interactive
    description: Раздел управления тегами участников
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          🛠 *Теги пользователей* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          Я могу вешать пирам «плашки» (Member Tags) с их логином и уровнем. Это помогает сразу понять, кто есть кто в чате.

          🦆 _Совет Утк: это работает только для тех, кто хотя бы раз запускал этого бота._

          - *Авто-режим:* `{member_tags_enabled_label_ru}`
          - *Формат:* `{member_tag_format_label_ru}`

          📊 *Последний запуск:*
          `{member_tags_last_run_summary_ru}`
        en: |
          🛠 *Member Tags* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          I can assign Member Tags with logins and levels. It helps to identify who's who in the chat instantly.

          🦆 _Duc's Tip: this only works for users who have started this bot at least once._

          • *Auto mode:* `{member_tags_enabled_label_en}`
          • *Format:* `{member_tag_format_label_en}`

          📊 *Last run:*
          `{member_tags_last_run_summary_en}`
      buttons:
        - id: tags_autotag_settings
          label:
            ru: "⚙️ Настроить авто-режим"
            en: "⚙️ Setup auto-mode"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_format_settings
          label:
            ru: "🏷 Сменить формат тега"
            en: "🏷 Change tag format"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 2
        - id: tags_run_settings
          label:
            ru: "🚀 Ручной запуск"
            en: "🚀 Manual run"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 3
        - id: back_to_groups
          label:
            ru: ↩️ К списку групп
            en: ↩️ Back to groups
          row: 99
          next_state: SELECT_GROUP_TO_MANAGE

  GROUP_MEMBER_TAGS_AUTOTAG:
    type: interactive
    description: Настройка автотегирования
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          ⚙️ *Автотегирование*

          Когда включено, я автоматически:
          1. Ставлю тег новичку при входе.
          2. Обновляю уровень (если выбран формат с `[lvl]`).
          3. Ставлю тег сразу после новой регистрации в боте.

          🙅‍♂️ _Важно: я не могу менять теги другим админам – Telegram не разрешает ботам трогать «боссов»._

          Текущий статус: `{member_tags_enabled_label_ru}`
        en: |
          ⚙️ *Auto Tagging*

          When enabled, I automatically:
          1. Assign a tag to newcomers on join.
          2. Refresh levels (if `[lvl]` format is active)
          3. Tag users right after they register with the bot.

          🙅‍♂️ _Note: I cannot edit tags for other admins – Telegram forbids bots from touching the "bosses"._

          Current status: `{member_tags_enabled_label_en}`
      buttons:
        - id: tags_enable_on
          label:
            ru: ✅ Включить
            en: ✅ Enable
          action: set_group_member_tags_enabled
          condition: "can_manage_selected_group == true && member_tags_enabled == false"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_enable_off
          label:
            ru: ❌ Выключить
            en: ❌ Disable
          action: set_group_member_tags_enabled
          condition: "can_manage_selected_group == true && member_tags_enabled == true"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_MEMBER_TAGS_MENU

  GROUP_MEMBER_TAGS_RUN:
    type: interactive
    description: Ручной запуск тегирования
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          🚀 *Ручной запуск тегирования*

          Хочешь прогнать теги по всем участникам прямо сейчас?

          🙅‍♂️ _Важно: я не могу менять теги другим админам – Telegram не разрешает ботам трогать «боссов»._

          ▶️ *Без замены* — тегирую только тех, у кого пусто.
          🧹 *С заменой* — обновлю теги вообще всем «своим» людям в чате.
        en: |
          🚀 *Manual Tagging Run*

          Want to process all members right now?

          🙅‍♂️ _Note: I cannot edit tags for other admins – Telegram forbids bots from touching the "bosses"._

          ▶️ *Keep existing* — only tag those who have none.
          🧹 *Full refresh* — update tags for all registered users.
      buttons:
        - id: tags_run_keep
          label:
            ru: ▶️ Без замены
            en: ▶️ Keep existing
          action: run_group_member_tags
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 1
        - id: tags_run_clear
          label:
            ru: 🧹 С заменой
            en: 🧹 Replace all
          action: run_group_member_tags
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 1
        - id: tags_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_MEMBER_TAGS_MENU

  GROUP_MEMBER_TAGS_FORMAT:
    type: interactive
    description: Настройка формата тегов
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          🏷 *Формат тега*

          Как должна выглядеть подпись?

          1️⃣ `login` — просто логин (коротко и ясно).
          2️⃣ `login [lvl]` — логин и уровень (сразу видно дедов).

          Сейчас выбрано: `{member_tag_format_label_ru}`
        en: |
          🏷 *Tag Format*

          How should the tag look?

          1️⃣ `login` — just login (clean).
          2️⃣ `login [lvl]` — login and level (shows experience).

          Currently: `{member_tag_format_label_en}`
      buttons:
        - id: tags_fmt_login
          label:
            ru: "{member_tag_login_option_label_ru}"
            en: "{member_tag_login_option_label_en}"
          action: set_group_member_tag_format
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 1
        - id: tags_fmt_login_level
          label:
            ru: "{member_tag_login_level_option_label_ru}"
            en: "{member_tag_login_level_option_label_en}"
          action: set_group_member_tag_format
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 1
        - id: tags_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_MEMBER_TAGS_MENU
