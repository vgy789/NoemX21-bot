  GROUP_DEFENDER_RECOMMENDATION:
    type: interactive
    description: Рекомендация по включению заявок на вступление
    interface:
      text:
        ru: |
          📌 *Рекомендация*

          Представь ситуации:
          – бот перестал работать, и все новички могут свободно проходить мимо фейс-контроля;
          – перед входом пир не зарегистрировался в боте, а тот его *без объяснений* мгновенно удалил из группы.

          Чтобы этого не допустить, *крайне рекомендуется включить* функцию *«Заявки на вступление»*.

          *Как включить:*
          1. Открой свою группу → нажми на название группы вверху.
          2. Нажми *«Управление группой»* (или *«Редактировать»* → *«Информация о группе»*).
          3. Перейди в раздел *«Пригласительные ссылки»* (Invite Links).
          4. Нажми *«Создать новую ссылку»* (или отредактируй существующую).
          5. Включи переключатель *«Заявки на вступление»* / *«Одобрять новых участников»* / *«Request admin approval»*.
          6. Сохрани ссылку.

          Теперь все, кто перейдёт по этой ссылке, будут видеть кнопку *«Подать заявку»* вместо автоматического вступления.

          Если бот внезапно отключился, то админ группы сможет вручную обработать заявки. Или он может дождаться когда бот заработает снова, отклонить новые заявки, и в ЛС пользователей попросить подать её снова (т.к. бот может только *перехватывать* заявки в реальном времени).

          📌 Не забудь указать новую ссылку на группу в разделе *Клубы*.
        en: |
          📌 *Recommendation*

          Imagine these situations:
          – The bot stops working, and all newcomers can freely bypass the face control;
          – A user didn't register in the bot before entering, and the bot instantly removes them from the group *without explanation*.

          To prevent this from happening, it is *highly recommended to enable* the *«Request Admin Approval»* feature.

          *How to enable:*
          1. Open your group → tap on the group name at the top.
          2. Tap *«Manage Group»* (or *«Edit»* → *«Group Info»*).
          3. Go to the *«Invite Links»* section.
          4. Tap *«Create a New Link»* (or edit an existing one).
          5. Turn on the *«Request Admin Approval»* toggle.
          6. Save the link.

          Now, everyone who follows this link will see the *«Request to Join»* button instead of joining automatically.

          If the bot suddenly goes offline, the group admin can process the requests manually. Alternatively, they can wait for the bot to come back online, decline the new requests, and ask the users via private message to submit them again (as the bot can only *intercept* requests in real time).

          📌 Don't forget to specify the link to the new group in the Clubs section.
      buttons:
        - id: recommendation_ok
          label:
            ru: ✅ Понятно
            en: ✅ Got it
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1

