            en: 3. Disable existing member recheck
          action: set_group_defender_recheck_known_members
          condition: "can_manage_selected_group == true && defender_recheck_known_members == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 3
        - id: def_back_menu
