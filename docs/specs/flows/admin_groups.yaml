initial_state: ADMIN_MENU
states:
  ADMIN_MENU:
    type: system
    description: Проверка наличия групп
    logic:
      action: load_admin_context
    transitions:
      - condition: is_group_owner == true
        next_state: SELECT_GROUP_TO_MANAGE
      - next_state: NO_GROUPS_INFO

  NO_GROUPS_INFO:
    type: interactive
    description: Инструкция при отсутствии групп
    interface:
      text:
        ru: |
          🦆 *Утиная админка / Клубы*

          Чтобы я могла наводить порядок в твоем комьюнити, меня нужно пригласить в чат.

          *Твой план действий:*
          1. Добавь меня в свою группу Telegram.
          2. Выдай права администратора.
          3. Возвращайся сюда – и мы всё настроим!

          *Что я возьму на себя:*
          🛡 *Защита:* выгоняю «левых» и отчисленных.
          📨 *PRR-радар:* транслирую свежие запросы на ревью.
          🏷 *Авто-теги:* ставлю логин и уровень рядом с именем.
          👋 *Onboarding:* встречаю новичков по-человечески.
        en: |
          🦆 *Duck Admin / Clubs*

          To let me manage your community, I need an invite to your Telegram group.

          *Your plan:*
          1. Add me to your Telegram group.
          2. Grant me administrator rights.
          3. Come back here, and we'll set everything up!

          *What I'll handle:*
          🛡 *Defender:* kicks outsiders and expelled users.
          📨 *PRR-Radar:* forwards active review requests.
          🏷 *Member Tags:* auto-assigns login and level titles.
          👋 *Onboarding:* greets newcomers properly.
      buttons:
        - id: back
          label:
            ru: ⚙️ Назад в настройки
            en: ⚙️ Back to settings
          next_state: SETTINGS_MENU

  SELECT_GROUP_TO_MANAGE:
    type: interactive
    description: Выбор группы (клуба) для управления
    on_enter:
      - action: load_admin_context
    interface:
      text:
        ru: |
          🦆 *Твои группы*

          Выбери группу, в которой мне предстоит поработать. Настроим безопасность, уведомления и теги.

          Где наводим порядок? 👇
        en: |
          🦆 *Your Groups*

          Select a group where I’ll be working. We'll set up security, notifications, and tags.

          Which one are we configuring? 👇
      buttons:
        - id: "{group_button_id_1}"
          label: "{group_title_1}"
          condition: "group_chat_id_1 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_2}"
          label: "{group_title_2}"
          condition: "group_chat_id_2 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_3}"
          label: "{group_title_3}"
          condition: "group_chat_id_3 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_4}"
          label: "{group_title_4}"
          condition: "group_chat_id_4 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_5}"
          label: "{group_title_5}"
          condition: "group_chat_id_5 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_6}"
          label: "{group_title_6}"
          condition: "group_chat_id_6 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_7}"
          label: "{group_title_7}"
          condition: "group_chat_id_7 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_8}"
          label: "{group_title_8}"
          condition: "group_chat_id_8 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_9}"
          label: "{group_title_9}"
          condition: "group_chat_id_9 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_10}"
          label: "{group_title_10}"
          condition: "group_chat_id_10 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: back
          label:
            ru: ⚙️ Назад в настройки
            en: ⚙️ Back to settings
          row: 99
          next_state: SETTINGS_MENU

  GROUP_ADMIN_MENU:
    type: interactive
    description: Экран выбранной группы
    interface:
      text:
        ru: |
          🛠 *Управление чатом*
          📌 Группа: `{selected_group_title}`
          🆔 Chat ID: `{selected_group_chat_id}`

          Выбери нужный раздел для настройки:
        en: |
          🛠 *Management*
          📌 Group: `{selected_group_title}`
          🆔 Chat ID: `{selected_group_chat_id}`

          Pick a section to configure:
      buttons:
        - id: open_prr_notifications_settings
          label:
            ru: 📨 PRR-радар
            en: 📨 PRR Radar
          next_state: GROUP_PRR_NOTIFICATIONS_MENU
        - id: open_defender_settings
          label:
            ru: 🛡 Безопасность
            en: 🛡 Security
          next_state: GROUP_DEFENDER_MENU
        - id: open_member_tags_settings
          label:
            ru: 🏷 Теги пользователей
            en: 🏷 Member Tags
          next_state: GROUP_MEMBER_TAGS_MENU
        - id: back_to_groups
          label:
            ru: ↩️ К списку групп
            en: ↩️ Back to groups
          row: 99
          next_state: SELECT_GROUP_TO_MANAGE
        - id: back
          label:
            ru: ⚙️ Назад в настройки
            en: ⚙️ Back to settings
          row: 99
          next_state: SETTINGS_MENU

  GROUP_PRR_NOTIFICATIONS_MENU:
    type: interactive
    description: Настройки PRR-уведомлений выбранной группы
    on_enter:
      - action: load_group_prr_notifications_context
      - action: clear_group_prr_filter_draft
    interface:
      text:
        ru: |
          📨 *PRR-радар* / {selected_group_title}

          Здесь настраивается автоматическая публикация новых PRR-запросов.

          *Текущие настройки:*
          • Статус: `{prr_notifications_enabled_label_ru}`
          • Куда: `{prr_notifications_destination_label}`
          • При отзыве: `{prr_withdrawn_behavior_label_ru}`
          • Проекты: `{group_prr_project_filters_label_ru}`
          • Кампусы: `{group_prr_campus_filters_label_ru}`

          💡 *Чтобы выбрать конкретный тред, отправь команду* `/prr_here` *в нужную тему внутри группы.*
        en: |
          📨 *PRR Radar* / {selected_group_title}

          Configure automatic publishing of new PRR requests to this group.

          *Current settings:*
          • Status: `{prr_notifications_enabled_label_en}`
          • Destination: `{prr_notifications_destination_label_en}`
          • On withdraw: `{prr_withdrawn_behavior_label_en}`
          • Projects: `{group_prr_project_filters_label_en}`
          • Campuses: `{group_prr_campus_filters_label_en}`

          💡 *To select a specific thread, run `/prr_here` in that topic inside the group.*
      buttons:
        - id: prr_enable_on
          label:
            ru: ✅ Включить PRR-радар
            en: ✅ Enable PRR radar
          action: set_group_prr_notifications_enabled
          condition: "can_manage_selected_group == true && prr_notifications_enabled == false"
          next_state: GROUP_PRR_NOTIFICATIONS_MENU
          row: 1
        - id: prr_enable_off
          label:
            ru: ❌ Выключить PRR-радар
            en: ❌ Disable PRR radar
          action: set_group_prr_notifications_enabled
          condition: "can_manage_selected_group == true && prr_notifications_enabled == true"
          next_state: GROUP_PRR_NOTIFICATIONS_MENU
          row: 1
        - id: prr_destination
          label:
            ru: 🧵 Тред и цель отправки
            en: 🧵 Thread destination
          condition: "can_manage_selected_group == true"
          next_state: GROUP_PRR_DESTINATION_INFO
          row: 2
        - id: prr_filters_projects
          label:
            ru: 🎯 Фильтр проектов
            en: 🎯 Project filters
          condition: "can_manage_selected_group == true"
          next_state: GROUP_PRR_FILTERS_MENU
          row: 3
        - id: prr_filters_campuses
          label:
            ru: 🏫 Фильтр кампусов
            en: 🏫 Campus filters
          condition: "can_manage_selected_group == true"
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 4
        - id: prr_withdrawn_behavior
          label:
            ru: 🧹 При отзыве запроса
            en: 🧹 On withdraw
          condition: "can_manage_selected_group == true"
          next_state: GROUP_PRR_WITHDRAWN_BEHAVIOR
          row: 5
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: GROUP_ADMIN_MENU
          row: 99

  GROUP_PRR_DESTINATION_INFO:
    type: interactive
    on_enter:
      - action: load_group_prr_notifications_context
    interface:
      text:
        ru: |
          🧵 *Цель PRR-уведомлений*

          Текущая цель: `{prr_notifications_destination_label}`

          Чтобы назначить тред:
          1. Открой нужный тред в группе
          2. Отправь туда команду `/prr_here`

          Если треды не нужны — оставь публикацию в общем чате.
        en: |
          🧵 *PRR Destination*

          Current destination: `{prr_notifications_destination_label_en}`

          To bind a topic:
          1. Open a topic in the group
          2. Send `/prr_here` there

          If topics are not needed, keep general chat destination.
      buttons:
        - id: prr_destination_reset
          label:
            ru: ♻️ Сбросить в общий чат
            en: ♻️ Reset to general chat
          action: set_group_prr_destination_general
          condition: "can_manage_selected_group == true"
          next_state: GROUP_PRR_DESTINATION_INFO
          row: 1
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: GROUP_PRR_NOTIFICATIONS_MENU
          row: 99

  GROUP_PRR_WITHDRAWN_BEHAVIOR:
    type: interactive
    on_enter:
      - action: load_group_prr_notifications_context
    interface:
      text:
        ru: |
          🧹 *Что делать при отзыве запроса*

          Текущий режим: `{prr_withdrawn_behavior_label_ru}`
        en: |
          🧹 *Behavior on request withdraw*

          Current mode: `{prr_withdrawn_behavior_label_en}`
      buttons:
        - id: prr_withdrawn_stub
          label:
            ru: 🧩 Оставить заглушку
            en: 🧩 Leave stub message
          action: set_group_prr_withdrawn_behavior
          condition: "can_manage_selected_group == true && prr_withdrawn_behavior != 'stub'"
          next_state: GROUP_PRR_WITHDRAWN_BEHAVIOR
          row: 1
        - id: prr_withdrawn_delete
          label:
            ru: 🗑 Удалять сообщение
            en: 🗑 Delete message
          action: set_group_prr_withdrawn_behavior
          condition: "can_manage_selected_group == true && prr_withdrawn_behavior != 'delete'"
          next_state: GROUP_PRR_WITHDRAWN_BEHAVIOR
          row: 1
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: GROUP_PRR_NOTIFICATIONS_MENU
          row: 99

  GROUP_PRR_FILTERS_MENU:
    type: interactive
    on_enter:
      - action: load_group_prr_filter_draft
      - action: prepare_prr_project_filters
        payload:
          page: $context.project_filter_page
    interface:
      text:
        ru: |
          🎯 *Фильтр проектов для PRR-радара*

          🔍 Раздел: `{project_filter_mode_text}`
          🎯 Выбрано: `{current_project_filters_text}`
          🏫 Кампусы: {current_campus_filters_text}
          📝 Поиск: `{project_filter_query_text}`

          {project_filter_list_formatted}
        en: |
          🎯 *Project filters for PRR Radar*

          🔍 Mode: `{project_filter_mode_text}`
          🎯 Current: `{current_project_filters_text}`
          🏫 Campuses: {current_campus_filters_text}
          📝 Search: `{project_filter_query_text}`

          {project_filter_list_formatted}
      buttons:
        - id: mode_projects
          label: "{project_filter_mode_projects}"
          action: set_project_filter_mode_projects
          next_state: GROUP_PRR_FILTERS_MENU
          row: 1
        - id: mode_courses
          label: "{project_filter_mode_courses}"
          action: set_project_filter_mode_courses
          next_state: GROUP_PRR_FILTERS_MENU
          row: 1
        - id: mode_nodes
          label: "{project_filter_mode_nodes}"
          action: set_project_filter_mode_nodes
          next_state: GROUP_PRR_FILTERS_MENU
          row: 1
        - id: "{project_filter_id_1}"
          label: "{project_filter_btn_label_1}"
          condition: "project_filter_id_1 != ''"
          action: toggle_project_filter
          next_state: GROUP_PRR_FILTERS_MENU
          row: 2
        - id: "{project_filter_id_2}"
          label: "{project_filter_btn_label_2}"
          condition: "project_filter_id_2 != ''"
          action: toggle_project_filter
          next_state: GROUP_PRR_FILTERS_MENU
          row: 3
        - id: "{project_filter_id_3}"
          label: "{project_filter_btn_label_3}"
          condition: "project_filter_id_3 != ''"
          action: toggle_project_filter
          next_state: GROUP_PRR_FILTERS_MENU
          row: 4
        - id: "{project_filter_id_4}"
          label: "{project_filter_btn_label_4}"
          condition: "project_filter_id_4 != ''"
          action: toggle_project_filter
          next_state: GROUP_PRR_FILTERS_MENU
          row: 5
        - id: "{project_filter_id_5}"
          label: "{project_filter_btn_label_5}"
          condition: "project_filter_id_5 != ''"
          action: toggle_project_filter
          next_state: GROUP_PRR_FILTERS_MENU
          row: 6
        - id: search_query
          label:
            ru: 🔎 Ввести поиск
            en: 🔎 Enter search
          next_state: GROUP_PRR_FILTERS_SEARCH_INPUT
          row: 7
        - id: clear_query
          label:
            ru: 🧹 Очистить поиск
            en: 🧹 Clear search
          condition: "project_filter_query != ''"
          action: clear_project_filter_query
          next_state: GROUP_PRR_FILTERS_MENU
          row: 7
        - id: prev_filter_page
          label:
            ru: ⬅️ Назад
            en: ⬅️ Back
          action: prr_project_filter_prev_page
          next_state: GROUP_PRR_FILTERS_MENU
          row: 8
        - id: filter_page
          label:
            ru: "{project_filter_page_caption_ru}"
            en: "{project_filter_page_caption_en}"
          action: none
          row: 8
        - id: next_filter_page
          label:
            ru: Вперёд ➡️
            en: Next ➡️
          action: prr_project_filter_next_page
          next_state: GROUP_PRR_FILTERS_MENU
          row: 8
        - id: reset
          label:
            ru: ♻️ Сбросить фильтры
            en: ♻️ Reset filters
          action: reset_project_filters
          next_state: GROUP_PRR_FILTERS_MENU
          row: 9
        - id: apply
          label:
            ru: ✅ Применить
            en: ✅ Apply
          action: save_group_prr_filters
          next_state: GROUP_PRR_NOTIFICATIONS_MENU
          row: 9
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          action: clear_group_prr_filter_draft
          next_state: GROUP_PRR_NOTIFICATIONS_MENU
          row: 10

  GROUP_PRR_CAMPUS_FILTERS_MENU:
    type: interactive
    on_enter:
      - action: load_group_prr_filter_draft
      - action: prepare_prr_campus_filters
        payload:
          page: $context.campus_filter_page
    interface:
      text:
        ru: |
          🏫 *Фильтр кампусов для PRR-радара*

          🏫 Текущие кампусы: {current_campus_filters_text}

          {campus_filter_list_formatted}
        en: |
          🏫 *Campus filters for PRR Radar*

          🏫 Current campuses: {current_campus_filters_text}

          {campus_filter_list_formatted}
      buttons:
        - id: "{campus_filter_id_1}"
          label: "{campus_filter_btn_label_1}"
          condition: "campus_filter_id_1 != ''"
          action: toggle_campus_filter
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 1
        - id: "{campus_filter_id_2}"
          label: "{campus_filter_btn_label_2}"
          condition: "campus_filter_id_2 != ''"
          action: toggle_campus_filter
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 2
        - id: "{campus_filter_id_3}"
          label: "{campus_filter_btn_label_3}"
          condition: "campus_filter_id_3 != ''"
          action: toggle_campus_filter
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 3
        - id: "{campus_filter_id_4}"
          label: "{campus_filter_btn_label_4}"
          condition: "campus_filter_id_4 != ''"
          action: toggle_campus_filter
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 4
        - id: "{campus_filter_id_5}"
          label: "{campus_filter_btn_label_5}"
          condition: "campus_filter_id_5 != ''"
          action: toggle_campus_filter
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 5
        - id: "{campus_filter_id_6}"
          label: "{campus_filter_btn_label_6}"
          condition: "campus_filter_id_6 != ''"
          action: toggle_campus_filter
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 6
        - id: "{campus_filter_id_7}"
          label: "{campus_filter_btn_label_7}"
          condition: "campus_filter_id_7 != ''"
          action: toggle_campus_filter
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 7
        - id: prev_campus_filter_page
          label:
            ru: ⬅️ Назад
            en: ⬅️ Back
          action: prr_campus_filter_prev_page
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 8
        - id: campus_filter_page
          label:
            ru: "{campus_filter_page_caption_ru}"
            en: "{campus_filter_page_caption_en}"
          action: none
          row: 8
        - id: next_campus_filter_page
          label:
            ru: Вперёд ➡️
            en: Next ➡️
          action: prr_campus_filter_next_page
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 8
        - id: clear_campus_filters
          label:
            ru: 🧹 Очистить кампусы
            en: 🧹 Clear campuses
          condition: "current_campus_filters_text != 'Все кампусы' && current_campus_filters_text != 'All campuses'"
          action: clear_campus_filters
          next_state: GROUP_PRR_CAMPUS_FILTERS_MENU
          row: 9
        - id: apply
          label:
            ru: ✅ Применить
            en: ✅ Apply
          action: save_group_prr_filters
          next_state: GROUP_PRR_NOTIFICATIONS_MENU
          row: 10
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: GROUP_PRR_FILTERS_MENU
          row: 10

  GROUP_PRR_FILTERS_SEARCH_INPUT:
    type: input
    interface:
      text:
        ru: |
          🔍 *Поиск по проектам*

          Введи часть названия, код, ID проекта, курса или node.
        en: |
          🔍 *Project search*

          Type part of title, code, project id, course id or node.
      buttons:
        - id: cancel
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: GROUP_PRR_FILTERS_MENU
          row: 1
    transitions:
      - trigger: on_input
        next_state: GROUP_PRR_FILTERS_APPLY_QUERY

  GROUP_PRR_FILTERS_APPLY_QUERY:
    type: system
    logic:
      action: save_project_filter_query
    transitions:
      - next_state: GROUP_PRR_FILTERS_MENU

  GROUP_MEMBER_TAGS_MENU:
    type: interactive
    description: Раздел управления тегами участников
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          🛠 *Теги пользователей* / {selected_group_title}

          Я могу вешать участникам «плашки» (Member Tags) с их логином и уровнем. Это помогает сразу понять, кто есть кто.

          • *Авто-режим:* `{member_tags_enabled_label_ru}`
          • *Формат:* `{member_tag_format_label_ru}`

          📊 *Последний запуск:*
          `{member_tags_last_run_summary_ru}`

          🦆 _Совет Утк: это работает только для тех, кто хотя бы раз запускал этого бота._
        en: |
          🛠 *Member Tags* / {selected_group_title}

          I can assign tags with logins and levels. It helps to identify who's who in the chat instantly.

          • *Auto mode:* `{member_tags_enabled_label_en}`
          • *Format:* `{member_tag_format_label_en}`

          📊 *Last run:*
          `{member_tags_last_run_summary_en}`

          🦆 *Tip: this only works for users who have started this bot at least once.*
      buttons:
        - id: tags_autotag_settings
          label:
            ru: "⚙️ Настроить авто-режим"
            en: "⚙️ Setup auto-mode"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_format_settings
          label:
            ru: "🏷 Сменить формат тега"
            en: "🏷 Change tag format"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 2
        - id: tags_run_settings
          label:
            ru: "🚀 Ручной запуск"
            en: "🚀 Manual run"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 3
        - id: back_to_groups
          label:
            ru: ↩️ К списку групп
            en: ↩️ Back to groups
          row: 99
          next_state: SELECT_GROUP_TO_MANAGE

  GROUP_MEMBER_TAGS_AUTOTAG:
    type: interactive
    description: Настройка автотегирования
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          ⚙️ *Автотегирование*

          Когда включено, я автоматически:
          1. Ставлю тег новичку при входе.
          2. Обновляю уровень (если выбран формат с `[lvl]`).
          3. Ставлю тег сразу после новой регистрации в боте.

          🙅‍♂️ _Важно: я не могу менять теги другим админам – Telegram не разрешает ботам трогать «боссов»._

          Текущий статус: `{member_tags_enabled_label_ru}`
        en: |
          ⚙️ *Auto Tagging*

          When enabled, I automatically:
          1. Assign a tag to newcomers on join.
          2. Refresh levels (if `[lvl]` format is active)
          3. Tag users right after they register with the bot.

          🙅‍♂️ _Note: I cannot edit tags for other admins – Telegram forbids bots from touching the "bosses"._

          Current status: `{member_tags_enabled_label_en}`
      buttons:
        - id: tags_enable_on
          label:
            ru: ✅ Включить
            en: ✅ Enable
          action: set_group_member_tags_enabled
          condition: "can_manage_selected_group == true && member_tags_enabled == false"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_enable_off
          label:
            ru: ❌ Выключить
            en: ❌ Disable
          action: set_group_member_tags_enabled
          condition: "can_manage_selected_group == true && member_tags_enabled == true"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_MEMBER_TAGS_MENU

  GROUP_DEFENDER_MENU:
    type: interactive
    description: Раздел безопасности (фильтрации) группы
    on_enter:
      - action: load_group_defender_context
    interface:
      text:
        ru: |
          🛡 *Безопасность* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          Я слежу за тем, чтобы в чат не просочились «левые» люди. Могу проверять каждого на входе или устроить генеральную уборку.

          - Автоматический фейс-контроль: `{defender_enabled_label_ru}`
          - Удалять BLOCKED/EXPELLED: `{defender_remove_blocked_label_ru}`
          - Фильтр по кампусу: `{defender_filter_campus_label_ru}`
          - Фильтр по трайбу: `{defender_filter_tribe_label_ru}`
          - Whitelist: `{defender_whitelist_count}`
        en: |
          🛡 *Security* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          I make sure no outsiders sneak into the flock. I can check everyone at the gate or perform a full pond cleanup.

          - **Automatic gatekeeper:** `{defender_enabled_label_en}`
          - **Expelled filter:** `{defender_remove_blocked_label_en}`
          - **Campus filter:** `{defender_filter_campus_label_en}`
          - **Tribe filter:** `{defender_filter_tribe_label_en}`
          - **Whitelist:** `{defender_whitelist_count}`
      buttons:
        - id: def_open_toggle
          label:
            ru: ⚙️ Автоматический фейс-контроль
            en: ⚙️ Automatic gatekeeper
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1
        - id: def_open_run
          label:
            ru: 🚀 Генеральная уборка
            en: 🚀 Full Cleanup
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_RUN
          row: 2
        - id: def_open_whitelist
          label:
            ru: ✅ Белый список
            en: ✅ Whitelist
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_WHITELIST
          row: 3
        - id: def_open_logs
          label:
            ru: 📜 История действий
            en: 📜 Action Log
          condition: "can_manage_selected_group == true"
          action: load_group_defender_logs
          next_state: GROUP_DEFENDER_LOGS
          row: 4
        - id: def_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
