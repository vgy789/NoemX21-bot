  GROUP_DEFENDER_AUTOMODE:
    type: interactive
    description: Настройки авто-защиты
    on_enter:
      - action: load_group_defender_context
    interface:
      text:
        ru: |
          🛑 *Отключение старого фейс-контроля*

          Defender retired. Автоматические удаления участников не выполняются,
          но у старых групп в БД могли остаться включённые флаги. Здесь их можно выключить.

          🛡 *Мои фильтры:*

          *1. Регистрация в боте:*
          `{defender_enabled_label_ru}` _(старый флаг; если включён, его нужно выключить)_

          *2. Статус (Заблокирован/Отчислен):*
          `{defender_remove_blocked_label_ru}` _(старый флаг; если включён, его нужно выключить)_

          *3. Фильтр по кампусам:*
          `{defender_filter_campus_label_ru}` _(только для чтения; фейс-контроль больше не применяет фильтр)_

          *4. Фильтр по трайбам:*
          `{defender_filter_tribe_label_ru}` _(только для чтения; фейс-контроль больше не применяет фильтр)_

          *5. Проверять уже вошедших:*
          `{defender_recheck_known_members_label_ru}` _(старый флаг; если включён, его нужно выключить)_
        en: |
          🛑 *Disable old face-control flags*

          Defender is retired. Automatic member removals do not run,
          but old groups may still have enabled DB flags. You can turn them off here.

          🛡 *My filters:*

          *1. Registration in the bot:*
          `{defender_enabled_label_en}` _(old flag; turn it off if enabled)_

          *2. Status (Banned/Expelled):*
          `{defender_remove_blocked_label_en}` _(old flag; turn it off if enabled)_

          *3. Campus filter:*
          `{defender_filter_campus_label_en}` _(read-only; face control no longer applies this filter)_

          *4. Tribe filter:*
          `{defender_filter_tribe_label_en}` _(read-only; face control no longer applies this filter)_

          *5. Check already joined members:*
          `{defender_recheck_known_members_label_en}` _(old flag; turn it off if enabled)_
      buttons:
        - id: def_enable_off
          label:
            ru: 1. Выключить автоматический фейс-контроль
            en: 1. Disable automatic gatekeeper
          action: set_group_defender_enabled
          condition: "can_manage_selected_group == true && defender_enabled == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1
        - id: def_blocked_off
