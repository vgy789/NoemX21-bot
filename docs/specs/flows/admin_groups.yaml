initial_state: ADMIN_MENU
states:
  ADMIN_MENU:
    type: system
    description: Проверка наличия групп
    logic:
      action: load_admin_context
    transitions:
      - condition: is_group_owner == true
        next_state: SELECT_GROUP_TO_MANAGE
      - next_state: NO_GROUPS_INFO

  NO_GROUPS_INFO:
    type: interactive
    description: Инструкция при отсутствии групп
    interface:
      text:
        ru: |
          🦆 *Утиная админка / Клубы*

          Чтобы я могла наводить порядок в твоем комьюнити, меня нужно позвать в чат.

          *Твой план действий:*
          1. Добавь меня в свою группу Telegram.
          2. Выдай права администратора.
          3. Возвращайся сюда – и мы все настроим!

          *Что я возьму на себя:*
          🛡 *Защита:* выгоняю «левых» и отчисленных.
          📨 *PRR-радар:* пересылаю свежие запросы на ревью.
          🏷 *Авто-теги:* ставлю логин и уровень рядом с именем.
          👋 *Onboarding:* встречаю новичков по-человечески.
        en: |
          🦆 *Duck Admin / Clubs*

          To let me manage your community, I need an invite to the pond.

          *Your plan:*
          1. Add me to your Telegram group.
          2. Grant me administrator rights.
          3. Come back here and we'll set everything up!

          *What I'll handle:*
          🛡 *Defender:* kicks outsiders and expelled users.
          📨 *PRR-Radar:* forwards active review requests.
          🏷 *Member Tags:* auto-assigns login and level titles.
          👋 *Onboarding:* greets newcomers properly.
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: CLUBS_MAIN

  SELECT_GROUP_TO_MANAGE:
    type: interactive
    description: Выбор группы (клуба) для управления
    on_enter:
      - action: load_admin_context
    interface:
      text:
        ru: |
          🦆 *Твои группы*

          Выбери группу, в которой мне предстоит поработать клювом. Настроим безопасность, уведомления и теги.

          Где будем настраивать? 👇
        en: |
          🦆 *Your Groups*

          Select a group where I will work. We'll set up security, notifications, and tags.

          Which one are we configuring? 👇
      buttons:
        - id: "{group_button_id_1}"
          label: "{group_title_1}"
          condition: "group_chat_id_1 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_2}"
          label: "{group_title_2}"
          condition: "group_chat_id_2 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_3}"
          label: "{group_title_3}"
          condition: "group_chat_id_3 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_4}"
          label: "{group_title_4}"
          condition: "group_chat_id_4 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_5}"
          label: "{group_title_5}"
          condition: "group_chat_id_5 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_6}"
          label: "{group_title_6}"
          condition: "group_chat_id_6 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_7}"
          label: "{group_title_7}"
          condition: "group_chat_id_7 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_8}"
          label: "{group_title_8}"
          condition: "group_chat_id_8 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_9}"
          label: "{group_title_9}"
          condition: "group_chat_id_9 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: "{group_button_id_10}"
          label: "{group_title_10}"
          condition: "group_chat_id_10 != ''"
          action: select_admin_group
          next_state: GROUP_ADMIN_MENU
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: CLUBS_MAIN

  GROUP_ADMIN_MENU:
    type: interactive
    description: Экран выбранной группы
    interface:
      text:
        ru: |
          🛠 *Управление* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          Выбирай нужный раздел.
        en: |
          🛠 *Management* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          Pick a section.
      buttons:
        - id: open_defender_settings
          label:
            ru: 🛡 Безопасность
            en: 🛡 Security
          next_state: GROUP_DEFENDER_MENU
        - id: open_member_tags_settings
          label:
            ru: 🏷 Теги пользователей
            en: 🏷 Member Tags
          next_state: GROUP_MEMBER_TAGS_MENU
        - id: back_to_groups
          label:
            ru: ↩️ К списку групп
            en: ↩️ Back to groups
          row: 99
          next_state: SELECT_GROUP_TO_MANAGE
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: CLUBS_MAIN

  GROUP_MEMBER_TAGS_MENU:
    type: interactive
    description: Раздел управления тегами участников
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          🛠 *Теги пользователей* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          Я могу вешать пирам «плашки» (Member Tags) с их логином и уровнем. Это помогает сразу понять, кто есть кто в чате.

          🦆 _Совет Утк: это работает только для тех, кто хотя бы раз запускал этого бота._

          - *Авто-режим:* `{member_tags_enabled_label_ru}`
          - *Формат:* `{member_tag_format_label_ru}`

          📊 *Последний запуск:*
          `{member_tags_last_run_summary_ru}`
        en: |
          🛠 *Member Tags* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          I can assign Member Tags with logins and levels. It helps to identify who's who in the chat instantly.

          🦆 _Duc's Tip: this only works for users who have started this bot at least once._

          • *Auto mode:* `{member_tags_enabled_label_en}`
          • *Format:* `{member_tag_format_label_en}`

          📊 *Last run:*
          `{member_tags_last_run_summary_en}`
      buttons:
        - id: tags_autotag_settings
          label:
            ru: "⚙️ Настроить авто-режим"
            en: "⚙️ Setup auto-mode"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_format_settings
          label:
            ru: "🏷 Сменить формат тега"
            en: "🏷 Change tag format"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 2
        - id: tags_run_settings
          label:
            ru: "🚀 Ручной запуск"
            en: "🚀 Manual run"
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 3
        - id: back_to_groups
          label:
            ru: ↩️ К списку групп
            en: ↩️ Back to groups
          row: 99
          next_state: SELECT_GROUP_TO_MANAGE

  GROUP_MEMBER_TAGS_AUTOTAG:
    type: interactive
    description: Настройка автотегирования
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          ⚙️ *Автотегирование*

          Когда включено, я автоматически:
          1. Ставлю тег новичку при входе.
          2. Обновляю уровень (если выбран формат с `[lvl]`).
          3. Ставлю тег сразу после новой регистрации в боте.

          🙅‍♂️ _Важно: я не могу менять теги другим админам – Telegram не разрешает ботам трогать «боссов»._

          Текущий статус: `{member_tags_enabled_label_ru}`
        en: |
          ⚙️ *Auto Tagging*

          When enabled, I automatically:
          1. Assign a tag to newcomers on join.
          2. Refresh levels (if `[lvl]` format is active)
          3. Tag users right after they register with the bot.

          🙅‍♂️ _Note: I cannot edit tags for other admins – Telegram forbids bots from touching the "bosses"._

          Current status: `{member_tags_enabled_label_en}`
      buttons:
        - id: tags_enable_on
          label:
            ru: ✅ Включить
            en: ✅ Enable
          action: set_group_member_tags_enabled
          condition: "can_manage_selected_group == true && member_tags_enabled == false"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_enable_off
          label:
            ru: ❌ Выключить
            en: ❌ Disable
          action: set_group_member_tags_enabled
          condition: "can_manage_selected_group == true && member_tags_enabled == true"
          next_state: GROUP_MEMBER_TAGS_AUTOTAG
          row: 1
        - id: tags_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_MEMBER_TAGS_MENU

  GROUP_DEFENDER_MENU:
    type: interactive
    description: Раздел безопасности (фильтрации) группы
    on_enter:
      - action: load_group_defender_context
    interface:
      text:
        ru: |
          🛡 *Безопасность* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          Я слежу за тем, чтобы в чат не просочились «левые» люди. Могу проверять каждого на входе или устроить генеральную уборку.

          - Автоматический фейс-контроль: `{defender_enabled_label_ru}`
          - Удалять BLOCKED/EXPELLED: `{defender_remove_blocked_label_ru}`
          - Фильтр по кампусу: `{defender_filter_campus_label_ru}`
          - Фильтр по трайбу: `{defender_filter_tribe_label_ru}`
          - Whitelist: `{defender_whitelist_count}`
        en: |
          🛡 *Security* / {selected_group_title}
          🆔 Chat ID: `{selected_group_chat_id}`

          I make sure no outsiders sneak into the flock. I can check everyone at the gate or perform a full pond cleanup.

          - **Automatic gatekeeper:** `{defender_enabled_label_en}`
          - **Expelled filter:** `{defender_remove_blocked_label_en}`
          - **Campus filter:** `{defender_filter_campus_label_en}`
          - **Tribe filter:** `{defender_filter_tribe_label_en}`
          - **Whitelist:** `{defender_whitelist_count}`
      buttons:
        - id: def_open_toggle
          label:
            ru: ⚙️ Автоматический фейс-контроль
            en: ⚙️ Automatic gatekeeper
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1
        - id: def_open_run
          label:
            ru: 🚀 Генеральная уборка
            en: 🚀 Full Cleanup
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_RUN
          row: 2
        - id: def_open_whitelist
          label:
            ru: ✅ Белый список
            en: ✅ Whitelist
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_WHITELIST
          row: 3
        - id: def_open_logs
          label:
            ru: 📜 История действий
            en: 📜 Action Log
          condition: "can_manage_selected_group == true"
          action: load_group_defender_logs
          next_state: GROUP_DEFENDER_LOGS
          row: 4
        - id: def_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_ADMIN_MENU

  GROUP_DEFENDER_AUTOMODE:
    type: interactive
    description: Настройки авто-защиты
    on_enter:
      - action: load_group_defender_context
    interface:
      text:
        ru: |
          ⚙️ *Настройки фейс-контроля*

          Если режим включён, я проверяю *каждого новичка* прямо на пороге.
          _Важно: авто-режим не влияет на старых участников._

          🦆 *Мои фильтры:*

          *1. Незарегистрированные в боте:*
          `{defender_enabled_label_ru}` _(Когда включено – не пускаю, не залогинился в боте пользователей.)_

          *2. Отчисленные (BLOCKED/EXPELLED):*
          `{defender_remove_blocked_label_ru}` _(Когда включено – не пускаю отчисленных, но ранее зарегистрированных студентов.)_

          *3. Кампус:*
          `{defender_filter_campus_label_ru}` _(Можно выбрать несколько. Если есть выбор — пускаю только из этих кампусов.)_

          *4. Трайб:*
          `{defender_filter_tribe_label_ru}` _(Можно выбрать несколько, но только из твоего кампуса. При выборе трайбов кампус фиксируется на твоём.)_

          *5. Срок временной блокировки:*
          `{defender_ban_duration_label_ru}` _(Бан действует ограниченное время, разбан произойдёт автоматически.)_
        en: |
          ⚙️ *Gatekeeper Settings*

          When enabled, I check *every newcomer* right at the gate.
          _Note: auto-mode does not affect existing members._

          🦆 *My filters:*

          *1. Unregistered in the bot:*
          `{defender_enabled_label_en}` _(When enabled – I won't allow users who haven't logged into the bot.)_

          *2. Expelled (BLOCKED/EXPELLED):*
          `{defender_remove_blocked_label_en}` _(When enabled – I won't allow expelled students, even if they are previously registered.)_

          *3. Campus:*
          `{defender_filter_campus_label_en}` _(Multi-select. If set — allow only these campuses.)_

          *4. Tribe:*
          `{defender_filter_tribe_label_en}` _(Multi-select, but only from your campus. Enabling tribe filters locks campus to yours.)_

          *5. Temporary ban duration:*
          `{defender_ban_duration_label_en}` _(Ban is time-limited, Telegram unbans automatically after expiry.)_
      buttons:
        - id: def_enable_on
          label:
            ru: 1. Не пускать незарегистрированных в боте
            en: 1. Don‘t allow unregistered users in the bot
          action: set_group_defender_enabled
          condition: "can_manage_selected_group == true && defender_enabled == false"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1
        - id: def_enable_off
          label:
            ru: 1. Пускать незарегистрироанных в боте
            en: 1. Allow unregistered users in the bot
          action: set_group_defender_enabled
          condition: "can_manage_selected_group == true && defender_enabled == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 1
        - id: def_blocked_on
          label:
            ru: 2. Не пускать отчисленных
            en: 2. Don‘t allow blocked users
          action: set_group_defender_remove_blocked
          condition: "can_manage_selected_group == true && defender_remove_blocked == false"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 2
        - id: def_blocked_off
          label:
            ru: 2. Пускать отчисленных
            en: 2. Allow blocked users
          action: set_group_defender_remove_blocked
          condition: "can_manage_selected_group == true && defender_remove_blocked == true"
          next_state: GROUP_DEFENDER_AUTOMODE
          row: 2
        - id: def_open_filter_campus
          label:
            ru: 3. Настроить фильтр по кампусу
            en: 3. Configure campus filter
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 3
        - id: def_open_filter_tribe
          label:
            ru: 4. Настроить фильтр по трайбу
            en: 4. Configure tribe filter
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_FILTER_TRIBE
          row: 4
        - id: def_ban_custom
          label:
            ru: 5. Ввести срок блокировки
            en: 5. Enter ban duration
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_BAN_DURATION_INPUT
          row: 5
        - id: def_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_DEFENDER_MENU

  GROUP_DEFENDER_FILTER_CAMPUS:
    type: interactive
    description: Настройка фильтра по кампусу
    on_enter:
      - action: load_group_defender_campus_filter_options
    interface:
      text:
        ru: |
          🏫 *Фильтр по кампусу*

          Текущий фильтр: `{defender_filter_campus_label_ru}`

          Мультивыбор: нажми по кампусу, чтобы включить/выключить.
          Если выбрать любой "чужой" кампус, фильтр по трайбам будет автоматически сброшен.
        en: |
          🏫 *Campus filter*

          Current filter: `{defender_filter_campus_label_en}`

          Multi-select: tap campus to toggle on/off.
          If any external campus is selected, tribe filters are reset automatically.
      buttons:
        - id: "{defender_campus_button_id_1}"
          label: "{defender_campus_button_label_1}"
          action: set_group_defender_filter_campus
          condition: "defender_campus_button_id_1 != ''"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 2
        - id: "{defender_campus_button_id_2}"
          label: "{defender_campus_button_label_2}"
          action: set_group_defender_filter_campus
          condition: "defender_campus_button_id_2 != ''"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 3
        - id: "{defender_campus_button_id_3}"
          label: "{defender_campus_button_label_3}"
          action: set_group_defender_filter_campus
          condition: "defender_campus_button_id_3 != ''"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 4
        - id: "{defender_campus_button_id_4}"
          label: "{defender_campus_button_label_4}"
          action: set_group_defender_filter_campus
          condition: "defender_campus_button_id_4 != ''"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 5
        - id: "{defender_campus_button_id_5}"
          label: "{defender_campus_button_label_5}"
          action: set_group_defender_filter_campus
          condition: "defender_campus_button_id_5 != ''"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 6
        - id: "{defender_campus_button_id_6}"
          label: "{defender_campus_button_label_6}"
          action: set_group_defender_filter_campus
          condition: "defender_campus_button_id_6 != ''"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 7
        - id: "{defender_campus_button_id_7}"
          label: "{defender_campus_button_label_7}"
          action: set_group_defender_filter_campus
          condition: "defender_campus_button_id_7 != ''"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 8
        - id: "{defender_campus_button_id_8}"
          label: "{defender_campus_button_label_8}"
          action: set_group_defender_filter_campus
          condition: "defender_campus_button_id_8 != ''"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 9
        - id: def_fc_prev
          label:
            ru: ◀️ Назад
            en: ◀️ Back
          action: defender_campus_prev_page
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 10
        - id: def_fc_page
          label:
            ru: "{defender_campus_page_caption_ru}"
            en: "{defender_campus_page_caption_en}"
          action: load_group_defender_campus_filter_options
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 10
        - id: def_fc_next
          label:
            ru: Вперёд ▶️
            en: Next ▶️
          action: defender_campus_next_page
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 10
        - id: def_fc_none
          label:
            ru: ♻️ Сбросить
            en: ♻️ Clear filter
          action: set_group_defender_filter_campus
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_FILTER_CAMPUS
          row: 99
        - id: def_back_automode
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_DEFENDER_AUTOMODE

  GROUP_DEFENDER_FILTER_TRIBE:
    type: interactive
    description: Настройка фильтра по трайбу
    on_enter:
      - action: load_group_defender_tribe_filter_options
    interface:
      text:
        ru: |
          🛡 *Фильтр по трайбу*

          Текущий фильтр: `{defender_filter_tribe_label_ru}`
          Доступные трайбы кампуса: `{defender_filter_tribe_scope_ru}`

          Мультивыбор: нажми по трайбу, чтобы включить/выключить.
          При выборе трайба кампус автоматически фиксируется на твоём.
        en: |
          🛡 *Tribe filter*

          Current filter: `{defender_filter_tribe_label_en}`
          Available tribes for your campus: `{defender_filter_tribe_scope_en}`

          Multi-select: tap tribe to toggle on/off.
          Selecting a tribe automatically locks campus filter to your campus.
      buttons:
        - id: "{defender_tribe_button_id_1}"
          label: "{defender_tribe_button_label_1}"
          action: set_group_defender_filter_tribe
          condition: "defender_tribe_button_id_1 != ''"
          next_state: GROUP_DEFENDER_FILTER_TRIBE
          row: 2
        - id: "{defender_tribe_button_id_2}"
          label: "{defender_tribe_button_label_2}"
          action: set_group_defender_filter_tribe
          condition: "defender_tribe_button_id_2 != ''"
          next_state: GROUP_DEFENDER_FILTER_TRIBE
          row: 3
        - id: "{defender_tribe_button_id_3}"
          label: "{defender_tribe_button_label_3}"
          action: set_group_defender_filter_tribe
          condition: "defender_tribe_button_id_3 != ''"
          next_state: GROUP_DEFENDER_FILTER_TRIBE
          row: 4
