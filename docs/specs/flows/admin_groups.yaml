            en: 🧹 Remove unregistered
          condition: "can_manage_selected_group == true"
          next_state: GROUP_DEFENDER_RUN_UNREGISTERED
          row: 1
        - id: def_clean_blocked
          label:
            ru: 🧹 Выкинуть отчисленных
            en: 🧹 Remove expelled
          condition: "can_manage_selected_group == true"
