          🚀 *Ручное обновление тегов*

          Запустить обновление подписей (админ-тегов) для всех участников чата?

          ⚠️ *Важно:* Я не могу изменять теги другим администраторам – Telegram запрещает ботам редактировать профили владельцев и коллег-админов.

          *Варианты*
          • *Без замены* — добавлю теги только тем, у кого их сейчас нет.
          • *С заменой* — полностью обновлю подписи у всех «своих» пользователей.
        en: |
          🚀 *Manual Tag Update*

          Would you like to process admin tags for all group members right now?

          ⚠️ *Note:* I cannot edit tags for other admins. Telegram restrictions prevent bots from modifying the profiles of owners or other administrators.

          *Options:*
          • *Keep existing* — only tag users who currently have no tag.
          • *Full refresh* — force update tags for all registered users.
      buttons:
        - id: tags_run_keep
          label:
            ru: ▶️ Без замены
            en: ▶️ Keep existing
          action: run_group_member_tags
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 1
        - id: tags_run_clear
          label:
            ru: 🧹 С заменой
            en: 🧹 Replace all
          action: run_group_member_tags
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 1
        - id: tags_run_rollback
          label:
            ru: ↩️ Откатить ручные теги
            en: ↩️ Roll back manual tags
          action: rollback_group_member_tags
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 2
        - id: tags_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_MEMBER_TAGS_MENU

  GROUP_MEMBER_TAGS_DISCOVERY_CONFIRM:
    type: interactive
    description: Owner confirmation for exhaustive group member-tag discovery
    interface:
      text:
        ru: |
          🔎 *Полная проверка участников* / {selected_group_title}

          Бот проверит в этой группе все зарегистрированные и импортированные Telegram ID, включая ранее неизвестных ему участников.
          Формат тегов: `{member_tag_format_label_ru}`.
          Чужие теги не перезаписываются.
        en: |
          🔎 *Full member check* / {selected_group_title}

          The bot will check every registered and imported Telegram ID in this group.
          Tag format: `{member_tag_format_label_en}`.
          Foreign tags are preserved.
      buttons:
        - id: start_group_tag_discovery
          label:
            ru: 🚀 Запустить
            en: 🚀 Start
          action: start_group_member_tag_discovery
          condition: "is_selected_group_owner == true"
          next_state: GROUP_MEMBER_TAGS_DISCOVERY_STATUS
          row: 1
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 2

  GROUP_MEMBER_TAGS_DISCOVERY_STATUS:
    type: interactive
    description: Group owner status for exhaustive member-tag discovery
    on_enter:
      - action: load_group_member_tag_discovery
    interface:
      text:
        ru: |
          🔎 *Прогресс проверки* / {selected_group_title}

          `{group_member_tag_discovery_summary}`
        en: |
          🔎 *Discovery progress* / {selected_group_title}

          `{group_member_tag_discovery_summary}`
      buttons:
        - id: refresh_group_tag_discovery
          label:
            ru: 🔄 Обновить
            en: 🔄 Refresh
          next_state: GROUP_MEMBER_TAGS_DISCOVERY_STATUS
          row: 1
        - id: cancel_group_tag_discovery
          label:
            ru: ⛔ Отменить
            en: ⛔ Cancel
          action: cancel_group_member_tag_discovery
          condition: "group_member_tag_discovery_running == true"
          next_state: GROUP_MEMBER_TAGS_DISCOVERY_STATUS
          row: 2
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: GROUP_MEMBER_TAGS_RUN
          row: 3

  GROUP_MEMBER_TAGS_FORMAT:
    type: interactive
    description: Настройка формата тегов
    on_enter:
      - action: load_group_member_tags_context
    interface:
      text:
        ru: |
          🏷 *Формат тега*

          Как должна выглядеть подпись?

          1️⃣ `login` — просто логин (коротко и ясно).
          2️⃣ `login [lvl]` — логин и уровень (сразу видно дедов).
          3️⃣ `login NSK` — логин и сокращение кампуса на английском.
          4️⃣ `login НСК` — логин и сокращение кампуса на русском.

          Для любого статуса кроме ACTIVE после логина добавляется `~`.

          Сейчас выбрано: `{member_tag_format_label_ru}`
        en: |
          🏷 *Tag Format*

          How should the tag look?

          1️⃣ `login` — just login (clean).
          2️⃣ `login [lvl]` — login and level (shows experience).
          3️⃣ `login NSK` — login and English campus short name.
          4️⃣ `login НСК` — login and Russian campus short name.

          Every status except ACTIVE adds `~` directly after the login.

          Currently: `{member_tag_format_label_en}`
      buttons:
        - id: tags_fmt_login
          label:
            ru: "{member_tag_login_option_label_ru}"
            en: "{member_tag_login_option_label_en}"
          action: set_group_member_tag_format
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 1
        - id: tags_fmt_login_level
          label:
            ru: "{member_tag_login_level_option_label_ru}"
            en: "{member_tag_login_level_option_label_en}"
          action: set_group_member_tag_format
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 1
        - id: tags_fmt_login_campus_en
          label:
            ru: "{member_tag_login_campus_en_option_label_ru}"
            en: "{member_tag_login_campus_en_option_label_en}"
          action: set_group_member_tag_format
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 2
        - id: tags_fmt_login_campus_ru
          label:
            ru: "{member_tag_login_campus_ru_option_label_ru}"
            en: "{member_tag_login_campus_ru_option_label_en}"
          action: set_group_member_tag_format
          condition: "can_manage_selected_group == true"
          next_state: GROUP_MEMBER_TAGS_FORMAT
          row: 2
        - id: tags_back_menu
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: GROUP_MEMBER_TAGS_MENU
