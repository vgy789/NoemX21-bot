---
meta:
  feature_id: REG-001
  name: Регистрация нового пользователя
  description: Процесс создания аккаунта с валидацией через S21 API и проверкой OTP в Rocket.Chat
  version: 2.1.0

## интерфейс settings.yaml/SET_LANGUAGE и registration.yaml/SELECT_LANGUAGE должны совпадать
initial_state: SELECT_LANGUAGE
states:
  SELECT_LANGUAGE:
    type: interactive
    description: Первый экран после /start. Выбор локализации.
    interface:
      text:
        en: 🌐 Выберите язык `/` Choose language
        ru: 🌐 Выберите язык `/` Choose language
      buttons:
        - id: set_ru
          label: 🇷🇺 Русский
          next_state: START
          row: 1
        - id: set_en
          label: 🇺🇸 English
          next_state: START
          row: 1
    on_enter:
      action: not_reset_user_context

  START:
    type: system
    description: Проверка статуса регистрации пользователя
    logic:
      check: is_user_registered
    transitions:
      - condition: registered == true
        next_state: main_menu.yaml/MAIN_MENU
      - condition: registered == false
        next_state: INPUT_LOGIN

  INPUT_LOGIN:
    type: input
    description: Ожидание ввода логина School21
    interface:
      text:
        ru: |
          Введи логин School21 (4-9 символов, только латиница):
        en: |
          Enter School21 login (4-9 chars, lowercase a-z):
      error_invalid:
        ru: |
          ⚠️ Неверный формат! Попробуй ещё раз (например: jonnabin):
        en: |
          ⚠️ Invalid format! Try again (example: jonnabin):
    validation:
      regex: ^[a-z]{4,9}$
    transitions:
      - trigger: on_valid_input
        next_state: VALIDATE_VIA_API
      - trigger: on_invalid_input
        next_state: INPUT_LOGIN

  VALIDATE_VIA_API:
    type: system
    description: Проверка существования пользователя в системе Школы
    logic:
      action: validate_school21_user
      payload:
        login: $context.last_input
    transitions:
      - condition: api_status == 200 && user.status == 'ACTIVE' && user.parallelName == 'Core program'
        next_state: FIND_ROCKET_USER
      - condition: api_status == 200 && user.status == 'ACTIVE' && user.parallelName != 'Core program'
        next_state: ERROR_WRONG_PARALLEL
      - condition: api_status == 404
        next_state: ERROR_NOT_FOUND
      - condition: user.status == 'EXPELLED' || user.status == 'BLOCKED'
        next_state: ERROR_ACCESS_DENIED
      - condition: api_status != 200
        next_state: ERROR_API

  FIND_ROCKET_USER:
    type: system
    description: Поиск пользователя в Rocket.Chat с проверкой email для защиты от подмены никнейма
    security_note: Email verification защищает от race condition. Злоумышленник может сменить nickname, но не может подделать verified email
    logic:
      action: find_and_verify_rocket_user
      payload:
        login: $context.last_input
      checks:
        - name: User exists in RocketChat
          api_call: GET /api/v1/users.info?username={login}
          required: true
        - name: Email verification (CRITICAL SECURITY CHECK)
          description: Проверка что email совпадает с School21 email и verified
          steps:
            - Extract user.emails[0].address from RocketChat response
            - 'Verify format: {login}@student.21-school.ru'
            - Verify user.emails[0].verified == true
          critical: true
    transitions:
      - condition: rocket_user_found == true && email_verified == true
        next_state: GENERATE_OTP
        security_level: SAFE
      - condition: rocket_user_found == true && email_mismatch == true
        next_state: ERROR_EMAIL_MISMATCH
        security_level: CRITICAL_REJECT
      - condition: rocket_user_not_found == true
        next_state: ROCKET_USER_NOT_FOUND
      - condition: rocket_api_error == true
        next_state: ROCKET_API_ERROR

  GENERATE_OTP:
    type: system
    description: Генерация и отправка OTP кода в Rocket.Chat
    logic:
      action: generate_otp
      payload:
        login: $context.last_input
    transitions:
      - condition: otp_sent == true
        next_state: AWAITING_OTP

  AWAITING_OTP:
    requirement: Безопасная обработка OTP-кодов в памяти и при передаче (см. security_policy.yaml)
    type: input
    description: Ввод OTP-кода, отправленного в Rocket.Chat
    interface:
      text:
        ru: |
          🔐 Код отправлен в Rocket.Chat. Введи его:
        en: |
          🔐 OTP sent to Rocket.Chat. Enter it here:
      footer:
        ru: |
          Осталось попыток: {attempts}
        en: |
          Attempts left: {attempts}
    validation:
      regex: ^[0-9]{6}$
    transitions:
      - trigger: on_valid_input
        next_state: VALIDATE_OTP
      - trigger: code_expired
        next_state: INPUT_LOGIN
        action: "notify: code_expired"
    verification: Проверка отсутствия OTP в логах при тестах
    risks:
      - Утечка OTP через дампы памяти или логи
    forbidden_practices:
      - Вывод OTP в логи
      - Сохранение OTP в БД

  VALIDATE_OTP:
    type: system
    description: Верификация OTP кода и проверка уникальности email
    logic:
      action: verify_otp
      payload:
        code: "{last_input}"
        student_id: "{s21_login}"
    transitions:
      - condition: code_correct == true && email_unique == true
        next_state: REGISTRATION_COMPLETE
      - condition: code_correct == true && email_unique == false
        next_state: ERROR_EMAIL_ALREADY_REGISTERED
      - condition: code_correct == false
        next_state: AWAITING_OTP

  ERROR_WRONG_PARALLEL:
    type: interactive
    description: Неверная параллель обучения
    interface:
      text:
        ru: |
          ❌ Ты не из программы Core. Регистрация доступна только для студентов основы.
        en: |
          ❌ You are not in Core program. Registration available only for Core students.
      buttons:
        - id: retry
          label:
            ru: Попробовать снова
            en: Try again
          next_state: INPUT_LOGIN

  ERROR_ACCESS_DENIED:
    type: interactive
    description: Доступ запрещен
    interface:
      text:
        ru: |
          ❌ Твой статус не подходит для регистрации.
        en: |
          ❌ Your status does not allow registration.
      buttons:
        - id: retry
          label:
            ru: Попробовать снова
            en: Try again
          next_state: INPUT_LOGIN

  ERROR_NOT_FOUND:
    type: interactive
    description: Пользователь не найден
    interface:
      text:
        ru: |
          ❌ Пользователь не найден в School21. Проверь логин.
        en: |
          ❌ User not found in School21. Check your login.
      buttons:
        - id: retry
          label:
            ru: Попробовать снова
            en: Try again
          next_state: INPUT_LOGIN

  ERROR_API:
    type: interactive
    description: Ошибка API School21
    interface:
      text:
        ru: |
          ❌ Временная ошибка связи с School21. Попробуй позже.
        en: |
          ❌ Temporary School21 API error. Try again later.
      buttons:
        - id: retry
          label:
            ru: Попробовать снова
            en: Try again
          next_state: INPUT_LOGIN

  ROCKET_USER_NOT_FOUND:
    type: interactive
    description: Пользователь не найден в Rocket.Chat
    interface:
      text:
        ru: |
          ❌ Пользователь не найден в Rocket.Chat. Проверь, зарегистрирован ли ты в системе School21.
        en: |
          ❌ User not found in Rocket.Chat. Check if you are registered in School21 system.
      buttons:
        - id: retry
          label:
            ru: Попробовать снова
            en: Try again
          next_state: INPUT_LOGIN

  ROCKET_API_ERROR:
    type: interactive
    description: Ошибка API Rocket.Chat
    interface:
      text:
        ru: |
          ❌ Временная ошибка Rocket.Chat. Попробуй через 1 минуту.
        en: |
          ❌ Temporary Rocket.Chat API error. Try again in 1 minute.
      buttons:
        - id: retry
          label:
            ru: Попробовать снова
            en: Try again
          next_state: INPUT_LOGIN

  ERROR_EMAIL_MISMATCH:
    type: interactive
    description: Email в RocketChat не совпадает с логином School21
    interface:
      text:
        ru: |
          ❌ Ошибка верификации!

          Email в твоём профиле RocketChat не совпадает с {login}@student.21-school.ru

          Это защитный механизм от подмены личности.
          Убедись что ты используешь правильный логин.
        en: |
          ❌ Verification failed!

          Email in your RocketChat profile doesn't match {login}@student.21-school.ru

          This is a security measure against identity theft.
          Make sure you're using the correct login.
      buttons:
        - id: retry
          label:
            ru: Попробовать снова
            en: Try again
          next_state: INPUT_LOGIN

  ERROR_EMAIL_ALREADY_REGISTERED:
    type: interactive
    description: Этот email уже был использован для другого аккаунта
    interface:
      text:
        ru: |
          ❌ Email уже занят!
        en: |
          ❌ Email already in use!
    transitions:
      - next_state: INPUT_LOGIN

  REGISTRATION_COMPLETE:
    type: final
    interface:
      text:
        ru: |
          🎉 Регистрация завершена! Добро пожаловать, {name}.
        en: |
          🎉 Registration successful! Welcome, {name}.
      buttons:
        - label:
            ru: В меню
            en: To menu
          next_state: main_menu.yaml/MAIN_MENU
