initial_state: SELECT_LANGUAGE
states:
  SELECT_LANGUAGE:
    type: interactive
    description: Инициализация локализации
    interface:
      text:
        ru: |
          🌐 Выбери язык / Choose language
        en: |
          🌐 Choose language / Выбери язык
      buttons:
        - id: set_ru
          label: 🇷🇺 Русский
          next_state: START
          row: 1
        - id: set_en
          label: 🇺🇸 English
          next_state: START
          row: 1

  START:
    type: system
    description: Проверка текущей сессии
    logic:
      action: is_user_registered
    transitions:
      - condition: registered == true
        next_state: MAIN_MENU
      - condition: registered == false
        next_state: INPUT_LOGIN
    interface:
      text:
        ru: "🦆 Проверяю, свой ты или залётный…"
        en: "🦆 Checking if you're part of the flock…"

  INPUT_LOGIN:
    type: input
    description: Идентификация по логину S21
    interface:
      text:
        ru: |
          👋 *Представься, пир!*

          Напиши свой логин от Школы 21, чтобы я могла найти тебя.

          _Например:_ `verter`
        en: |
          👋 *Identify yourself, peer!*

          Enter your School 21 login so I can find you in the school.

          _Example:_ `verter`
      error_invalid:
        ru: |
          🦆 *Кря?* Непохоже на логин.
          Должно быть от 4 до 9 латинских букв.

          👇 Попробуй еще раз:
        en: |
          🦆 *Quack?* Doesn't look like a login.
          Must be 4 to 9 Latin letters.

          👇 Try again:
    validation:
      regex: ^[A-Za-z]{4,9}$
    transitions:
      - trigger: on_valid_input
        next_state: VALIDATE_VIA_API

  VALIDATE_VIA_API:
    type: system
    description: Синхронизация с API Школы
    logic:
      action: validate_school21_user
      payload:
        login: $context.last_input
    transitions:
      - condition: api_status == 404
        next_state: ERROR_NOT_FOUND
      - condition: api_status == 200 && s21_user.status == 'ACTIVE' && s21_user.parallelName != 'Core program'
        next_state: ERROR_WRONG_PARALLEL
      - condition: s21_user.status == 'EXPELLED' || s21_user.status == 'BLOCKED'
        next_state: ERROR_ACCESS_DENIED
      - condition: api_status == 200 && s21_user.status == 'ACTIVE' && s21_user.parallelName == 'Core program'
        next_state: SELECT_OTP_METHOD
      - next_state: ERROR_API
    interface:
      text:
        ru: "📡 *Ныряю в базу данных Школы...* `HOLD ON`"
        en: "📡 *Diving into School database...* `HOLD ON`"

  SELECT_OTP_METHOD:
    type: interactive
    description: Выбор способа подтверждения
    interface:
      text:
        ru: |
          ✅ Отлично. Выбери способ подтверждения:
        en: |
          ✅ Great. Choose verification method:
      buttons:
        - id: auth_email
          label:
            ru: 📧 Email
            en: 📧 Email
          condition: otp_email_enabled == true
          next_state: GENERATE_EMAIL_OTP
          row: 1
        - id: auth_rocket_token
          label:
            ru: 🔐 Токен Rocket.Chat
            en: 🔐 Rocket.Chat token
          next_state: INPUT_ROCKET_USER_ID
          row: 1
        #- id: auth_rocketchat
        #  label:
        #    ru: ❌ Rocket.Chat (недоступно)
        #    en: ❌ Rocket.Chat (unavailable)
        #  next_state: ROCKETCHAT_UNAVAILABLE
        #  row: 2
        - id: back
          label:
            ru: "🔙 Назад"
            en: "🔙 Back"
          next_state: INPUT_LOGIN
          row: 3

  ROCKETCHAT_UNAVAILABLE:
    type: interactive
    description: Rocket.Chat авторизация временно недоступна
    interface:
      text:
        ru: |
          Запланированный способ. Будет доступно, как только администрация школы выдаст мне аккаунт для интеграции с Rocket.Chat (хотя сомневаюсь что это возможно, не отвечают на просьбу уже пару месяцев).
        en: |
          This method is planned. It will become available once school administration provides an integration account for Rocket.Chat.
      buttons:
        - id: back
          label:
            ru: "🔙 Назад"
            en: "🔙 Back"
          next_state: SELECT_OTP_METHOD

  INPUT_ROCKET_USER_ID:
    type: input
    description: Ввод Rocket.Chat user id
    interface:
      text:
        ru: |
          🔐 Введи свой `Rocket.Chat user Id`:


          ℹ️ *Как получить ID и Токен*

          1. [Зайди в Rocket через браузер](https://rocketchat-student.21-school.ru/account/tokens) (в мобильном приложении функции нет):
           `Аватар` → `Настройки` → `Токены для личного доступа`.
          2. Впиши любое название в поле имени.
          3. В выпадающем списке рядом с кнопкой выбери *«Игнорировать двухфакторную авторизацию»*.
          4. Нажми «Добавить», скопируй появившиеся `id` и `Token` и отправь их боту.
          5. Как только бот подтвердит вход, токен можно сразу удалить (иконка корзины).

          _Бот использует эти данные только один раз для проверки личности и не хранит их у себя._
        en: |
          🔐 Enter your `Rocket.Chat user Id`:


          ℹ️ *How to get your ID and Token*

          1. *[Open Rocket in a browser](https://rocketchat-student.21-school.ru/account/tokens)* (this feature is not available in the mobile app):
           `Avatar` → `Settings` → `Personal Access Tokens`.
          2. *Create a token*: enter any name in the "Token Name" field.
          3. *Bypass 2FA*: in the dropdown menu next to the button, select *"Ignore Two-Factor Authentication."*
          4. *Save the data*: click "Add," copy the generated `id` and `Token`, and send them to the bot.
          5. *Delete when done*: once the bot confirms your login, you can immediately delete the token (trash icon).

          _The bot uses this data only once to verify your identity and does not store it._
      error_invalid:
        ru: |
          ❌ Неверный формат user id.
          Используй только латинские буквы и цифры.
        en: |
          ❌ Invalid user id format.
          Use Latin letters and digits only.
      buttons:
        - id: back
          label:
            ru: "🔙 Назад"
            en: "🔙 Back"
          next_state: SELECT_OTP_METHOD
    validation:
      regex: ^[A-Za-z0-9]{8,64}$
    transitions:
      - trigger: on_valid_input
        next_state: STORE_ROCKET_USER_ID

  STORE_ROCKET_USER_ID:
    type: system
    description: Сохраняет Rocket user id
    logic:
      action: store_rocket_user_id
      payload:
        rocket_user_id: $context.last_input
    transitions:
      - next_state: INPUT_ROCKET_TOKEN

  INPUT_ROCKET_TOKEN:
    type: input
    description: Ввод Rocket.Chat auth token
    interface:
      text:
        ru: |
          🔐 Теперь введи `Token`, полученный в предыдущем шаге:
        en: |
          🔐 Now enter the `Token` you received in the previous step:
      error_invalid:
        ru: |
          ❌ Неверный формат токена.
          Проверь, что вставил его полностью.
        en: |
          ❌ Invalid token format.
          Check that you pasted it fully.
      buttons:
        - id: back
          label:
            ru: "🔙 Назад"
            en: "🔙 Back"
          next_state: INPUT_ROCKET_USER_ID
    validation:
      regex: ^[A-Za-z0-9_-]{16,300}$
    transitions:
      - trigger: on_valid_input
        next_state: VERIFY_ROCKET_TOKEN

  VERIFY_ROCKET_TOKEN:
    type: system
    description: Проверка Rocket.Chat токена через profile API
    logic:
      action: verify_rocketchat_token
      payload:
        login: $context.s21_login
        rocket_user_id: $context.rocket_user_id
        rocket_auth_token: $context.last_input
    transitions:
      - condition: email_already_registered == true
        next_state: ERROR_EMAIL_ALREADY_REGISTERED
      - condition: email_mismatch == true
        next_state: ERROR_EMAIL_MISMATCH
      - condition: rocket_token_verified == true
        next_state: LOAD_PROFILE
      - condition: rocket_token_invalid == true
        next_state: ERROR_ROCKET_TOKEN_INVALID
      - next_state: ERROR_ROCKET_TOKEN_INVALID
    interface:
      text:
        ru: "🔎 *Проверяю токен Rocket.Chat...*"
        en: "🔎 *Verifying Rocket.Chat token...*"

  ERROR_NOT_FOUND:
    type: interactive
    description: Пользователь не найден
    interface:
      text:
        ru: |
          🦆 *Упс! Пустое гнездо.*

          Пользователь с таким логином не найден. Проверь, нет ли опечаток, или ты всё-таки вертер?
        en: |
          🦆 *Oops! Empty nest.*

          User with this login not found. Check for typos, or are you actually verter?
      buttons:
        - id: retry
          label:
            ru: 🔄 Попробовать снова
            en: 🔄 Try again
          next_state: INPUT_LOGIN

  FIND_ROCKET_USER:
    type: system
    description: Верификация узла Rocket.Chat
    logic:
      action: find_and_verify_rocket_user
      payload:
        login: $context.s21_login
    transitions:
      - condition: email_already_registered == true
        next_state: ERROR_EMAIL_ALREADY_REGISTERED
      - condition: rocket_user_found == true && email_verified == true
        next_state: GENERATE_OTP
      - condition: rocket_user_found == true && email_unavailable == true
        next_state: ERROR_EMAIL_UNAVAILABLE
      - condition: rocket_user_found == true && email_mismatch == true
        next_state: ERROR_EMAIL_MISMATCH
      - condition: rocket_user_not_found == true
        next_state: ROCKET_USER_NOT_FOUND
      - condition: rocket_api_error == true
        next_state: ROCKET_API_ERROR
      - next_state: ROCKET_API_ERROR
    interface:
      text:
        ru: "📡 *Ищу тебя в Rocket.Chat...* `LOOKING`"
        en: "📡 *Searching for you in Rocket.Chat...* `LOOKING`"

  GENERATE_OTP:
    type: system
    description: Инициация протокола OTP
    logic:
      action: generate_otp
      payload:
        login: $context.s21_login
        delivery_method: rocketchat
    transitions:
      - condition: otp_sent == true
        next_state: AWAITING_OTP
      - condition: otp_rate_limited == true
        next_state: ERROR_RATE_LIMIT
      - next_state: ERROR_OTP_SEND_FAILED
    interface:
      text:
        ru: "🔐 *Шифрую секретное кря…*"
        en: "🔐 *Encrypting secret quack…*"

  GENERATE_EMAIL_OTP:
    type: system
    description: Отправка OTP на почту
    logic:
      action: generate_otp
      payload:
        login: $context.s21_login
        delivery_method: email
    transitions:
      - condition: otp_sent == true
        next_state: AWAITING_OTP
      - condition: otp_rate_limited == true
        next_state: ERROR_RATE_LIMIT
      - next_state: ERROR_OTP_SEND_FAILED
    interface:
      text:
        ru: "📧 *Готовлю письмо с кодом…*"
        en: "📧 *Preparing your code email…*"

  AWAITING_OTP:
    type: input
    description: Ввод проверочного кода
    interface:
      text:
        ru: |
          📥 *Лови код!*

          Я отправила 6-значный код тебе {otp_delivery_label_ru}.
          Скорее проверяй и пиши его сюда, пока он не истёк!

          ---
          Письмо должно прийти с адреса `{otp_email_from}`. Если письма нет, проверь папку «Спам».
        en: |
          📥 *Catch the code!*

          I've sent a 6-digit code {otp_delivery_label_en}.
          Go check it and enter it here before it expires!

          ---
          The message should come from `{otp_email_from}`. If you don't see it, check your Spam folder.
      error_invalid:
        ru: |
          ❌ *Что-то не сходится.*

          Код неверный или время вышло. Попробуй еще раз или запроси новый код.
        en: |
          ❌ *Something's wrong.*

          Invalid code or time's up. Try again or request a new code.
      buttons:
        - id: resend_otp
          label:
            ru: "🔄 Пришли ещё раз"
            en: "🔄 Resend code"
          next_state: "{otp_resend_state}"
          row: 1
        - id: back
          label:
            ru: "🔙 Назад"
            en: "🔙 Back"
          next_state: SELECT_OTP_METHOD
          row: 1
    validation:
      regex: ^[0-9]{6}$
    transitions:
      - trigger: on_valid_input
        next_state: VALIDATE_OTP
      - trigger: code_expired
        next_state: INPUT_LOGIN
        action: "notify: code_expired"

  VALIDATE_OTP:
    type: system
    description: Финальная сверка OTP
    logic:
      action: verify_otp
      payload:
        code: "{last_input}"
        student_id: "{s21_login}"
    transitions:
      - condition: email_unique == false && is_own_email == false
        next_state: ERROR_EMAIL_ALREADY_REGISTERED
      - condition: code_correct == true
        next_state: LOAD_PROFILE
      - next_state: AWAITING_OTP

  LOAD_PROFILE:
    type: system
    description: Загрузка данных профиля
    logic:
      action: load_user_profile
    transitions:
      - condition: profile_loaded == true
        next_state: REGISTRATION_COMPLETE
      - next_state: INPUT_LOGIN
    interface:
      text:
        ru: "💾 *Складываю данные в клюв…*"
        en: "💾 *Gathering data into my beak…*"

  REGISTRATION_COMPLETE:
    type: system
    description: Успешный финиш
    interface:
      text:
        ru: |
          🎉 *Добро пожаловать в стаю!*

          Теперь аккаунт привязан к `{s21_login}`.
        en: |
          🎉 *Welcome to the flock!*

          Account linked to `{s21_login}`.
    transitions:
      - next_state: MAIN_MENU

  ERROR_WRONG_PARALLEL:
    type: interactive
    interface:
      text:
        ru: |
          ❌ *Сорри, пир.* Я работаю только со студентами Core Program.

          Бассейн позади, но ты пока в другой акватории.
        en: |
          ❌ *Sorry, peer.* I only work with Core Program students.

          The Pool is behind, but you're in different waters.
      buttons:
        - id: retry
          label:
            ru: 🔄 Попробовать другой логин
            en: 🔄 Try another login
          next_state: INPUT_LOGIN

  ERROR_ACCESS_DENIED:
    type: interactive
    interface:
      text:
        ru: |
          ❌ *Ой-ой.* Кажется, на платформе твой аккаунт заблокирован (Expelled/Blocked).
        en: |
          ❌ *Oops.* Looks like your account on the platform is blocked (Expelled/Blocked).
      buttons:
        - id: retry
          label:
            ru: "🔄 Попробовать снова"
            en: "🔄 Try again"
          next_state: INPUT_LOGIN

  ERROR_EMAIL_MISMATCH:
    type: interactive
    interface:
      text:
        ru: |
          ❌ *Ошибка безопасности*

          Твой email в Rocket.Chat не совпадает с логином S21. Ты точно тот, за кого себя выдаешь?
        en: |
          ❌ *Security Alert*

          Your Rocket.Chat email doesn't match your S21 login. Are you an impostor duck?
      buttons:
        - id: retry
          label:
            ru: "🔄 Попробовать снова"
            en: "🔄 Try again"
          next_state: INPUT_LOGIN

  ERROR_EMAIL_UNAVAILABLE:
    type: interactive
    interface:
      text:
        ru: |
          ❌ *Утк в тумане*

          Не вижу твой email в Rocket.Chat. Пни админа, либо попробуй позже.
        en: |
          ❌ *Duck in the fog*

          Can't see your email in Rocket.Chat. Poke an admin, or try again later.
      buttons:
        - id: retry
          label:
            ru: "🔄 Попробовать снова"
            en: "🔄 Try again"
          next_state: INPUT_LOGIN

  ERROR_RATE_LIMIT:
    type: interactive
    interface:
      text:
        ru: |
          ⏳ *Слишком часто запрашиваешь код*

          Новый код можно запросить примерно через *{otp_retry_after_secs} сек.*
        en: |
          ⏳ *Too many code requests*

          You can request a new code in about *{otp_retry_after_secs} sec.*
      buttons:
        - id: retry
          label:
            ru: 🔄 Запросить снова
            en: 🔄 Request again
          next_state: "{otp_resend_state}"
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: SELECT_OTP_METHOD

  HELP:
    type: interactive
    description: Помощь
    interface:
      text:
        ru: |
          ℹ️ *Правило одной утки:* 1 профиль Telegram = 1 логин S21.

          Если хочешь перепривязать, иди в старый аккаунт и жми `Настройки→Отвязать профиль`.
        en: |
          ℹ️ *One duck rule:* 1 Telegram profile = 1 S21 login.

          If you want to re-link, go to your old account and click `Settings → Unlink profile`.
      buttons:
        - id: retry
          label:
            ru: 👌 Понятно
            en: 👌 Got it
          next_state: INPUT_LOGIN
        - id: goodbye
          label:
            ru: 🖐️ Уплываю
            en: 🖐️ Swimming away
          next_state: GOODBYE

  GOODBYE:
    type: final
    interface:
      text:
        ru: |
          Кря! Еще увидимся в кластерах. 👋
        en: |
          Quack! See you in the clusters. 👋
      buttons:
        - id: start
          label:
            ru: /start
            en: /start
          next_state: START

  ERROR_OTP_SEND_FAILED:
    type: interactive
    description: Ошибка отправки OTP кода
    interface:
      text:
        ru: |
          ❌ *Код застрял в камышах.*

          Не смогла отправить тебе одноразовый код. Попробуй через минуту, вдруг отлагает.
        en: |
          ❌ *The code is stuck in the reeds.*

          Failed to send your one-time code. Try again in a minute, maybe it'll clear up.
      buttons:
        - id: retry
          label:
            ru: 🔄 Постучать еще раз
            en: 🔄 Knock again
          next_state: INPUT_LOGIN

  ERROR_API:
    type: interactive
    description: Ошибка School21 API
    interface:
      text:
        ru: |
          ❌ *API Школы приуныло.*

          Сервер не отвечает. Похоже, кто-то уронил базу. Попробуй позже!
        en: |
          ❌ *School API is down.*

          Server is not responding. Looks like someone dropped the database. Try again later!
      buttons:
        - id: retry
          label:
            ru: 🔄 Повторить попытку
            en: 🔄 Retry
          next_state: START

  ROCKET_USER_NOT_FOUND:
    type: interactive
    description: Пользователь не найден в Rocket.Chat
    interface:
      text:
        ru: |
          ❌ *В Рокете тебя нет.*

          Сначала активируй свой аккаунт в Rocket.Chat, а потом возвращайся.
        en: |
          ❌ *Not found in Rocket.*

          Activate your Rocket.Chat account first, then come back.
      buttons:
        - id: retry
          label:
            ru: 🔄 Повторить попытку
            en: 🔄 Retry
          next_state: START
  ROCKET_API_ERROR:
    type: interactive
    description: Ошибка Rocket.Chat API
    interface:
      text:
        ru: |
          ❌ *Рокет глючит или со мной что-то не так…*

          Не могу достучаться до мессенджера. Попробуй зайти через пару минут.
        en: |
          ❌ *Rocket is glitching or there's something wrong with me…*

          Can't reach the messenger. Try again in a few minutes.
      buttons:
        - id: retry
          label:
            ru: 🔄 Повторить попытку
            en: 🔄 Retry
          next_state: START

  ERROR_ROCKET_TOKEN_INVALID:
    type: interactive
    description: Токен Rocket.Chat не прошёл проверку
    interface:
      text:
        ru: |
          ❌ *Токен не подошёл.*

          Проверь `user Id` и `auth Token` в Rocket.Chat и попробуй снова.
        en: |
          ❌ *Token verification failed.*

          Check your Rocket.Chat `user Id` and `auth Token`, then try again.
      buttons:
        - id: retry
          label:
            ru: 🔄 Ввести заново
            en: 🔄 Re-enter
          next_state: INPUT_ROCKET_USER_ID
        - id: back
          label:
            ru: "🔙 Назад"
            en: "🔙 Back"
          next_state: SELECT_OTP_METHOD

  ERROR_EMAIL_ALREADY_REGISTERED:
    type: interactive
    description: Логин уже зарегистрирован
    interface:
      text:
        ru: |
          ❌ *Этот логин уже используется другим Telegram аккаунтом!*

          Выйди из всех аккаунтов, которые могли быть связаны с этим логином, и попробуй снова.
        en: |
          ❌ *This login is already used by another Telegram account!*

          Log out of any accounts that might be linked to this login and try again.
      buttons:
        - id: retry
          label:
            ru: 🔄 Повторить попытку
            en: 🔄 Retry
          next_state: START
