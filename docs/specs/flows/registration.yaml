---

initial_state: SELECT_LANGUAGE
states:
  SELECT_LANGUAGE:
    type: interactive
    description: Инициализация локализации
    interface:
      text:
        ru: "🌐 Выбери язык / Choose language"
        en: "🌐 Выбери язык / Choose language"
      buttons:
        - id: set_ru
          label: 🇷🇺 Русский
          next_state: START
          row: 1
        - id: set_en
          label: 🇺🇸 English
          next_state: START
          row: 1

  START:
    type: system
    description: Проверка текущей сессии
    logic:
      action: is_user_registered
    transitions:
      - condition: registered == true
        next_state: MAIN_MENU
      - condition: registered == false
        next_state: INPUT_LOGIN
    interface:
      text:
        ru: "🔍 *Auth Check:* Проверка статуса..."
        en: "🔍 *Auth Check:* Verifying status..."

  INPUT_LOGIN:
    type: input
    description: Идентификация по логину S21
    interface:
      text:
        ru: |
          🔑 *Идентификация*

          Укажи свой School21 Login.

          > Например: `verter`
        en: |
          🔑 *Identification*

          Specify your School21 Login:

          Example: `verter`
      error_invalid:
        ru: |
          ⚠️ *Format Error:* Неверный формат логина.

          👇 Попробуй ввести снова:
        en: |
          ⚠️ *Format Error:* Invalid login format.

          👇 Try again:
    validation:
      regex: ^[A-Za-z]{4,9}$
    transitions:
      - trigger: on_valid_input
        next_state: VALIDATE_VIA_API

  VALIDATE_VIA_API:
    type: system
    description: Синхронизация с API Школы
    logic:
      action: validate_school21_user
      payload:
        login: $context.last_input
    transitions:
      - condition: api_status == 404
        next_state: ERROR_NOT_FOUND
      - condition: api_status == 200 && s21_user.status == 'ACTIVE' && s21_user.parallelName != 'Core program'
        next_state: ERROR_WRONG_PARALLEL
      - condition: s21_user.status == 'EXPELLED' || s21_user.status == 'BLOCKED'
        next_state: ERROR_ACCESS_DENIED
      - condition: api_status == 200 && s21_user.status == 'ACTIVE' && s21_user.parallelName == 'Core program'
        next_state: FIND_ROCKET_USER
      - next_state: ERROR_API
    interface:
      text:
        ru: "📡 *API Request:* School21... `WAIT`"
        en: "📡 *API Request:* School21... `WAIT`"

  ERROR_NOT_FOUND:
    type: interactive
    description: Пользователь не найден
    interface:
      text:
        ru: |
          ❌ *Пользователь не найден в School21.*

          Убедись что ты вводишь свой логин правильно.
        en: |
          ❌ *User not found in School21.*

          Make sure you are entering your login correctly.
      buttons:
        - id: retry
          label:
            ru: 🔁 Попробовать снова
            en: 🔁 Try again
          next_state: INPUT_LOGIN

  FIND_ROCKET_USER:
    type: system
    description: Верификация узла Rocket.Chat
    logic:
      action: find_and_verify_rocket_user
      payload:
        login: $context.last_input
    transitions:
      - condition: rocket_user_found == true && email_verified == true
        next_state: GENERATE_OTP
      - condition: rocket_user_found == true && email_unavailable == true
        next_state: ERROR_EMAIL_UNAVAILABLE
      - condition: rocket_user_found == true && email_mismatch == true
        next_state: ERROR_EMAIL_MISMATCH
      - condition: rocket_user_not_found == true
        next_state: ROCKET_USER_NOT_FOUND
      - condition: rocket_api_error == true
        next_state: ROCKET_API_ERROR
      - condition: email_already_registered == true
        next_state: ERROR_EMAIL_ALREADY_REGISTERED
      - next_state: ROCKET_API_ERROR
    interface:
      text:
        ru: "📡 *API Request:* Rocket.Chat... `WAIT`"
        en: "📡 *API Request:* Rocket.Chat... `WAIT`"

  GENERATE_OTP:
    type: system
    description: Инициация протокола OTP
    logic:
      action: generate_otp
      payload:
        login: $context.s21_login
    transitions:
      - condition: otp_sent == true
        next_state: AWAITING_OTP
      - condition: otp_rate_limited == true
        next_state: ERROR_RATE_LIMIT
      - next_state: ERROR_OTP_SEND_FAILED
    interface:
      text:
        ru: "🔐 *Security:* Генерация OTP..."
        en: "🔐 *Security:* OTP Generation..."

  AWAITING_OTP:
    type: input
    description: Ввод проверочного кода
    interface:
      text:
        ru: |
          📥 *Verification Required*

          Код подтверждения отправлен в твой *Rocket.Chat*.
          👇 Введи `6 цифр` для авторизации:
        en: |
          📥 *Verification Required*

          Confirmation code sent to your *Rocket.Chat*.
          👇 Enter `6 digits` to authorize:
      error_invalid:
        ru: |
          ❌ *Invalid Code:* Ошибка ввода или превышено время ожидания.

          👇 Попробуй ввести снова или запроси новый код.
        en: |
          ❌ *Invalid Code:* Input error or time limit exceeded.

          👇 Try entering again or request a new code.
      buttons:
        - id: resend_otp
          label:
            ru: "🔄 Переотправить код"
            en: "🔄 Resend code"
          next_state: GENERATE_OTP
          row: 1
    validation:
      regex: ^[0-9]{6}$
    transitions:
      - trigger: on_valid_input
        next_state: VALIDATE_OTP
      - trigger: code_expired
        next_state: INPUT_LOGIN
        action: "notify: code_expired"

  VALIDATE_OTP:
    type: system
    description: Финальная сверка OTP
    logic:
      action: verify_otp
      payload:
        code: "{last_input}"
        student_id: "{s21_login}"
    transitions:
      - condition: code_correct == true
        next_state: LOAD_PROFILE
      - next_state: AWAITING_OTP

  LOAD_PROFILE:
    type: system
    description: Загрузка данных профиля
    logic:
      action: load_user_profile
    transitions:
      - next_state: REGISTRATION_COMPLETE
    interface:
      text:
        ru: "💾 *Sync:* Загрузка данных профиля..."
        en: "💾 *Sync:* Loading profile data..."

  REGISTRATION_COMPLETE:
    type: system
    description: Успешный финиш
    interface:
      text:
        ru: |
          🎉 *Access Granted*

          Регистрация завершена. Аккаунт привязан к `{s21_login}`.
        en: |
          🎉 *Access Granted*

          Registration complete. Account linked to `{s21_login}`.
    transitions:
      - next_state: MAIN_MENU

  # Ошибки (Interactive)
  ERROR_WRONG_PARALLEL:
    type: interactive
    interface:
      text:
        ru: "❌ *Access Denied:* Только для студентов основной программы."
        en: "❌ *Access Denied:* Core program students only."
      buttons:
        - id: retry
          label:
            ru: "🔄 Повторить"
            en: "🔄 Retry"
          next_state: INPUT_LOGIN

  ERROR_ACCESS_DENIED:
    type: interactive
    interface:
      text:
        ru: "❌ *Access Denied:* Статус аккаунта неактивен (Expelled/Blocked)."
        en: "❌ *Access Denied:* Account status is inactive (Expelled/Blocked)."
      buttons:
        - id: retry
          label:
            ru: "🔄 Повторить"
            en: "🔄 Retry"
          next_state: INPUT_LOGIN

  ERROR_EMAIL_MISMATCH:
    type: interactive
    interface:
      text:
        ru: |
          ❌ *Security Alert*

          Email в Rocket.Chat не совпадает с логином S21.
        en: |
          ❌ *Security Alert*

          Rocket.Chat email mismatch with S21 login.
      buttons:
        - id: retry
          label:
            ru: "🔄 Попробовать снова"
            en: "🔄 Try again"
          next_state: INPUT_LOGIN

  ERROR_EMAIL_UNAVAILABLE:
    type: interactive
    interface:
      text:
        ru: |
          ❌ *Нет доступа к email в Rocket.Chat*

          Похоже, у Rocket.Chat профиля нет прав на просмотр email.
          Обратись к администратору или попробуй позже.
        en: |
          ❌ *Rocket.Chat email not available*

          It looks like this Rocket.Chat profile has no permission to view emails.
          Please contact an admin or try again later.
      buttons:
        - id: retry
          label:
            ru: "🔄 Попробовать снова"
            en: "🔄 Try again"
          next_state: INPUT_LOGIN

  ERROR_RATE_LIMIT:
    type: interactive
    interface:
      text:
        ru: |
          ❌ *Пользователь уже авторизован!*

          Выйди из другого аккаунта и попробуй снова.
        en: |
          ❌ *User is already authorized!*

          Log out of the other account and try again.
      buttons:
        - id: retry
          label:
            ru: 🔁 Попробовать снова
            en: 🔁 Try again
          next_state: INPUT_LOGIN
        - id: help
          label:
            ru: ℹ️ Правила регистрации
            en: ℹ️ Registration rules
          next_state: HELP

  HELP:
    type: interactive
    description: Помощь
    interface:
      text:
        ru: |
          ℹ️ *Зарегистрировать можно только 1 профиль мессенджера.*

          Если у тебя уже есть профиль, отвяжи бота от предыдущего, чтобы зарегистрировать этот. (В меню `Настройки→Отвязать профиль`).
        en: |
          ℹ️ *You can register only 1 messenger profile.*

          If you already have a profile, unlink the bot from the previous one to register this one. (In the menu `Settings → Unlink profile`).
      buttons:
        - id: retry
          label:
            ru: 🔁 Попробовать снова
            en: 🔁 Try again
          next_state: INPUT_LOGIN
        - id: goodbye
          label:
            ru: 🖐️ Ладно, пока
            en: 🖐️ Ok, bye
          next_state: GOODBYE

  GOODBYE:
    type: final
    interface:
      text:
        ru: |
          Чао! 🙃
        en: |
          Chao! 🙃
      buttons:
        - id: start
          label:
            ru: /start
            en: /start
          next_state: START

  ERROR_OTP_SEND_FAILED:
    type: interactive
    description: Ошибка отправки OTP кода
    interface:
      text:
        ru: |
          ❌ *Не удалось отправить код подтверждения.*

          Возможно, временная проблема с сервисом. Попробуй через минуту.
        en: |
          ❌ *Failed to send confirmation code.*

          There might be a temporary service issue. Try again in a minute.
      buttons:
        - id: retry
          label:
            ru: 🔁 Попробовать снова
            en: 🔁 Try again
          next_state: INPUT_LOGIN

  ERROR_API:
    type: interactive
    description: Ошибка School21 API
    interface:
      text:
        ru: |
          ❌ *Ошибка API School21.*

          Попробуй позже.
        en: |
          ❌ *School21 API error.*

          Try again later.
      buttons:
        - id: retry
          label:
            ru: 🔁 Повторить
            en: 🔁 Retry
          next_state: START

  ROCKET_USER_NOT_FOUND:
    type: interactive
    description: Пользователь не найден в Rocket.Chat
    interface:
      text:
        ru: |
          ❌ *Твой логин не найден в Rocket.Chat.*

          Убедись, что ты активировал свой аккаунт.
        en: |
          ❌ *Your login not found in Rocket.Chat.*

          Make sure you have activated your account.

  ROCKET_API_ERROR:
    type: interactive
    description: Ошибка Rocket.Chat API
    interface:
      text:
        ru: |
          ❌ *Ошибка API Rocket.Chat.*

          Попробуй позже.
        en: |
          ❌ *Rocket.Chat API error.*

          Try again later.

  ERROR_EMAIL_ALREADY_REGISTERED:
    type: interactive
    description: Логин уже зарегистрирован
    interface:
      text:
        ru: |
          ❌ *Этот логин уже привязан к другому аккаунту!*
        en: |
          ❌ *This login is already linked to another account!*
