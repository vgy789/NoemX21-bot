---
meta:
  feature_id: STAT-001
  name: Статистика и поиск
  description: 'Центр аналитики: личный прогресс, поиск пиров и сравнение скиллов'
  version: 2.0.0

initial_state: STATS_SEARCH_MENU
states:
  ## TODO: на каком месте в трайбе
  STATS_SEARCH_MENU:
    type: interactive
    description: Главное меню аналитики
    interface:
      text:
        ru: |
          🆔 *{my_s21login}*

          🏰 Кампус | `{my_campus}`
          🛡 Трайб | `{my_coalition}`

          📈 *Мой прогресс*
          ├─ 🎖 Уровень `{my_level}`
          ├─ ✨ Опыт `{my_exp} xp`
          ├─ 🤝 PRP `{my_prps}`
          ├─ 🔎 CRP `{my_crps}`
          └─ 💰 Коины `{my_coins}`

          👇 *Выбери действие:*
        en: |
          🆔 *{my_s21login}*

          🏰 Campus | `{my_campus}`
          🛡 Tribe | `{my_coalition}`

          📈 *My progress*
          ├─ 🎖 Level `{my_level}`
          ├─ ✨ Experience `{my_exp} xp`
          ├─ 🤝 PRP `{my_prps}`
          ├─ 🔎 CRP `{my_crps}`
          └─ 💰 Coins `{my_coins}`

          👇 *Choose action:*
      buttons:
        - id: update
          label:
            ru: 🔄 Обновить
            en: 🔄 Update
          next_state: FETCH_MY_STATS
        - id: skills
          label:
            ru: 🕸️ Мои навыки
            en: 🕸️ My Skills
          row: 1
          next_state: FETCH_MY_SKILLS
        - id: search
          label:
            ru: 🕵️‍♂️ Найти пира
            en: 🕵️‍♂️ Find peer
          row: 1
          next_state: SEARCH_INPUT
        - id: back
          label:
            ru: 🏠 Назад
            en: 🏠 Back
          next_state: MAIN_MENU

  FETCH_MY_STATS:
    type: system
    description: Загрузка статистики текущего пользователя
    logic:
      action: get_user_stats
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: STATS_SEARCH_MENU

  FETCH_MY_SKILLS:
    type: system
    description: Загрузка навыков текущего пользователя
    logic:
      action: get_user_skills
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: GENERATE_MY_SKILLS_CHART

  GENERATE_MY_SKILLS_CHART:
    type: system
    description: Генерация Mermaid диаграммы для своих навыков
    logic:
      action: generate_radar_chart
      payload:
        users:
          - $context.user_id
    transitions:
      - next_state: DISPLAY_MY_SKILLS

  DISPLAY_MY_SKILLS:
    type: interactive
    description: Отображение радар-диаграммы навыков
    interface:
      text:
        ru: |
          🕸️ *Карта навыков*
          Визуализация твоего текущего стека:

          {radar_chart_mermaid}
        en: |
          🕸️ *Skill Map*
          Visualization of your current stack:

          {radar_chart_mermaid}
      buttons:
        - id: back
          label:
            ru: 🔙 В меню статистики
            en: 🔙 Stats menu
          next_state: STATS_SEARCH_MENU

  SEARCH_INPUT:
    type: input
    description: Ввод логина для поиска
    interface:
      text:
        ru: |
          🕵️‍♂️ *Поиск пира*

          Введи никнейм студента, чтобы посмотреть его профиль.
          _Например:_ `jonnabin`
        en: |
          🕵️‍♂️ *Find a Peer*

          Enter a student's nickname to view their profile.
          _Example:_ `jonnabin`
      buttons:
        - id: back
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: STATS_SEARCH_MENU
    validation:
      regex: ^[a-z0-9_]{4,9}$
    transitions:
      - trigger: on_valid_input
        next_state: FETCH_PEER_DATA

  FETCH_PEER_DATA:
    type: system
    description: Загрузка данных и разрешений пира
    logic:
      action: get_peer_data_with_permissions
      payload:
        login: $context.last_input
        requester_id: $context.user_id
    transitions:
      - condition: peer_found == true
        next_state: DISPLAY_PEER_STATS
      - condition: peer_found == false
        next_state: ERROR_PEER_NOT_FOUND

  DISPLAY_PEER_STATS:
    type: interactive
    description: Отображение статистики найденного пира
    interface:
      text:
        ru: |
          📂 *Профиль пира: {peer_login}*

          📍 `{peer_campus}` | 🛡 `{peer_coalition}`

          📊 *Статистика:*
          ├─ Уровень: `{peer_level}`
          ├─ Опыт: `{peer_exp} XP`
          └─ Баланс: `{peer_coins} 💰`

          📞 *Связь:* @{peer_telegram}
        en: |
          📂 *Peer Profile: {peer_login}*

          📍 `{peer_campus}` | 🛡 `{peer_coalition}`

          📊 *Stats:*
          ├─ Level: `{peer_level}`
          ├─ XP: `{peer_exp}`
          └─ Balance: `{peer_coins} 💰`

          📞 *Contact:* @{peer_telegram}
      buttons:
        - id: compare_stats
          label:
            ru: ⚔️ Сравнить статы
            en: ⚔️ Compare stats
          next_state: COMPARE_STATS
        - id: compare_skills
          label:
            ru: 🕸️ Сравнить навыки
            en: 🕸️ Compare skills
          next_state: COMPARE_SKILLS
        - id: new_search
          label:
            ru: 🔍 Найти другого
            en: 🔍 Find another
          next_state: SEARCH_INPUT
        - id: back
          label:
            ru: 🔙 В меню
            en: 🔙 To menu
          next_state: STATS_SEARCH_MENU

  COMPARE_STATS:
    type: interactive
    description: Сравнение статистики двух пользователей
    interface:
      text:
        ru: |
          ⚔️ *Сравнение показателей*

          🦁 *Ты* VS  🦄 *{peer_login}*
          ──────────────────
          🏅 *Lvl:* `{my_level}`  ⚡️  `{peer_level}`
          ✨ *XP:* `{my_exp}`  ⚡️  `{peer_exp}`
          💰 *Coins:* `{my_coins}`  ⚡️  `{peer_coins}`
        en: |
          ⚔️ *Stats Comparison*

          🦁 *You* VS  🦄 *{peer_login}*
          ──────────────────
          🏅 *Lvl:* `{my_level}`  ⚡️  `{peer_level}`
          ✨ *XP:* `{my_exp}`  ⚡️  `{peer_exp}`
          💰 *Coins:* `{my_coins}`  ⚡️  `{peer_coins}`
      buttons:
        - id: back
          label:
            ru: 🔙 К профилю пира
            en: 🔙 To peer profile
          next_state: DISPLAY_PEER_STATS

  COMPARE_SKILLS:
    type: system
    description: Генерация сравнительной Mermaid диаграммы
    logic:
      action: generate_radar_chart
      payload:
        users:
          - $context.user_id
          - $context.peer_id
    transitions:
      - next_state: DISPLAY_SKILLS_COMPARISON

  DISPLAY_SKILLS_COMPARISON:
    type: interactive
    description: Отображение сравнения навыков
    interface:
      text:
        ru: |
          🕸️ *Битва скиллов*

          🔵 Ты vs 🔴 {peer_login}

          {radar_comparison_mermaid}
        en: |
          🕸️ *Skill Battle*

          🔵 You vs 🔴 {peer_login}

          {radar_comparison_mermaid}
      buttons:
        - id: back
          label:
            ru: 🔙 К профилю пира
            en: 🔙 To peer profile
          next_state: DISPLAY_PEER_STATS

  ERROR_PEER_NOT_FOUND:
    type: interactive
    description: Пользователь не найден
    interface:
      text:
        ru: |
          🤷‍♂️ *Пир не найден*

          Мы искали везде, но пользователя с логином `{last_input}` не видно. Возможно, опечатка?
        en: |
          🤷‍♂️ *Peer not found*

          We looked everywhere, but `{last_input}` is nowhere to be seen. Maybe a typo?
      buttons:
        - id: retry
          label:
            ru: 🔄 Попробовать снова
            en: 🔄 Try again
          next_state: SEARCH_INPUT
        - id: back
          label:
            ru: 🔙 В меню
            en: 🔙 To menu
          next_state: STATS_SEARCH_MENU
