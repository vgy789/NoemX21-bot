---
meta:
  feature_id: STAT-001
  name: Статистика и поиск
  description: 'Центр аналитики: личный прогресс, поиск пиров и сравнение скиллов'
  version: 2.1.0

initial_state: STATS_SEARCH_MENU
states:
  ## TODO: на каком месте в трайбе
  STATS_SEARCH_MENU:
    type: interactive
    description: Личный профиль
    interface:
      text:
        ru: |
          👤 *Твой профиль: {my_s21login}*

          📍 {my_campus}
          🎓 {my_class} | {my_coalition}
          ⚙️ {my_status} | {my_parallel}

          🏆 *Уровень:* `{my_level}`
          ⭐️ *Опыт:* `{my_exp} XP`
          💰 *Коины:* `{my_coins} ₡`
          🤝 PRP: `{my_prps}` | CRP: `{my_crps}`

          *Social:*
          🧐 ИНТ: `{my_interest}` | 🙂 ДОБ: `{my_friendliness}`
          🕑 ПНК: `{my_punctuality}` | ⚖️ СТР: `{my_thoroughness}`
        en: |
          👤 *Profile: {my_s21login}*

          📍 {my_campus}
          🎓 {my_class} | {my_coalition}
          ⚙️ {my_status} | {my_parallel}

          🏆 *Level:* `{my_level}`
          ⭐️ *XP:* `{my_exp}`
          💰 *Coins:* `{my_coins} ₡`
          🤝 PRP: `{my_prps}` | CRP: `{my_crps}`

          *Social:*
          🧐 INT: `{my_interest}` | 🙂 FRD: `{my_friendliness}`
          🕑 PNC: `{my_punctuality}` | ⚖️ THO: `{my_thoroughness}`
      buttons:
        - id: search
          label:
            ru: 🔎 Найти пира
            en: 🔎 Find peer
          next_state: SEARCH_INPUT
        - id: skills
          label:
            ru: 🕸 Мои навыки
            en: 🕸 My Skills
          row: 1
          next_state: FETCH_MY_SKILLS
        - id: update
          label:
            ru: 🔄 Обновить данные
            en: 🔄 Refresh data
          row: 1
          next_state: FETCH_MY_STATS
        - id: back
          label:
            ru: 🏠 В главное меню
            en: 🏠 Main menu
          next_state: MAIN_MENU

  FETCH_MY_STATS:
    type: system
    description: Загрузка статистики текущего пользователя
    logic:
      action: get_user_stats
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: STATS_SEARCH_MENU

  FETCH_MY_SKILLS:
    type: system
    description: Загрузка навыков текущего пользователя
    logic:
      action: get_user_skills
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: GENERATE_MY_SKILLS_CHART

  GENERATE_MY_SKILLS_CHART:
    type: system
    description: Генерация Mermaid диаграммы для своих навыков
    logic:
      action: generate_radar_chart
      payload:
        users:
          - $context.user_id
    transitions:
      - next_state: DISPLAY_MY_SKILLS

  DISPLAY_MY_SKILLS:
    type: interactive
    description: Отображение радар-диаграммы навыков
    interface:
      text:
        ru: |
          🕸 *Карта твоих навыков*

          Это визуализация твоего опыта на основе сданных проектов.

          {radar_chart_mermaid}
        en: |
          🕸 *Your Skill Map*

          Visualization of your experience based on completed projects.

          {radar_chart_mermaid}
      buttons:
        - id: update
          label:
            ru: 🔄 Обновить
            en: 🔄 Update
          next_state: FETCH_MY_SKILLS
        - id: back
          label:
            ru: 🔙 Назад в меню
            en: 🔙 Back to menu
          next_state: STATS_SEARCH_MENU

  SEARCH_INPUT:
    type: input
    description: Ввод логина для поиска
    interface:
      text:
        ru: |
          🕵️ *Поиск пира*

          Введи логин студента.
          _Например:_ `verter`
        en: |
          🕵️ *Find a Peer*

          Enter the student's login.
          _Example:_ `verter`
      buttons:
        - id: back
          label:
            ru: 🙅‍♂️ Отмена
            en: 🙅‍♂️ Cancel
          next_state: STATS_SEARCH_MENU
    validation:
      regex: ^[a-z0-9_]{4,9}$
    transitions:
      - trigger: on_valid_input
        next_state: FETCH_PEER_DATA

  FETCH_PEER_DATA:
    type: system
    description: Загрузка данных и разрешений пира
    logic:
      action: get_peer_data_with_permissions
      payload:
        login: $context.last_input
        requester_id: $context.user_id
    transitions:
      - condition: peer_found == true
        next_state: DISPLAY_PEER_STATS
      - condition: peer_found == false
        next_state: ERROR_PEER_NOT_FOUND

  DISPLAY_PEER_STATS:
    type: interactive
    description: Отображение статистики найденного пира
    interface:
      text:
        ru: |
          📂 *Пир: {peer_login}*
          📍 {peer_campus}
          🎓 {peer_class} | {peer_coalition}
          ⚙️ {peer_status} | {peer_parallel}

          📊 *Показатели:*
          • Уровень: `{peer_level}`
          • Опыт: `{peer_exp} XP`
          • Коины: `{peer_coins} ₡`
          • PRP: `{peer_prps}` | CRP: `{peer_crps}`

          *Social:*
          • ИНТ: `{peer_interest}` | ДОБ: `{peer_friendliness}`
          • ПНК: `{peer_punctuality}` | СТР: `{peer_thoroughness}`

          📬 *Связь:* @{peer_telegram}
        en: |
          📂 *Peer: {peer_login}*

          📍 {peer_campus}
          🎓 {peer_class} | {peer_coalition}
          ⚙️ {peer_status} | {peer_parallel}

          📊 *Stats:*
          • Level: `{peer_level}`
          • XP: `{peer_exp}`
          • Coins: `{peer_coins} ₡`
          • PRP: `{peer_prps}` | CRP: `{peer_crps}`

          *Social:*
          • INT: `{peer_interest}` | FRD: `{peer_friendliness}`
          • PNC: `{peer_punctuality}` | THO: `{peer_thoroughness}`

          📬 *Contact:* @{peer_telegram}
      buttons:
        # Функция отключена
        # 1. Надо нормально выводить текст
        # 2. Если хочется сравнить, то можно посмотреть на свои немногочисленные показатели на предыдущем экране
        # - id: compare_stats
        #   label:
        #     ru: ⚖️ Сравнить с собой
        #     en: ⚖️ Compare with me
        #   next_state: COMPARE_STATS
        - id: compare_skills
          label:
            ru: 🕸 Сравнить навыки
            en: 🕸 Compare skills
          next_state: COMPARE_SKILLS
        - id: new_search
          label:
            ru: 🔍 Искать другого
            en: 🔍 Find another
          row: 1
          next_state: SEARCH_INPUT
        - id: back
          label:
            ru: 🔙 В мой профиль
            en: 🔙 My profile
          row: 1
          next_state: STATS_SEARCH_MENU

  COMPARE_STATS:
    type: interactive
    description: Сравнение статистики двух пользователей
    interface:
      text:
        ru: |
          *Сравнение показателей*

          🦁 *Ты* ...... 🦄 *{peer_login}*

          {my_campus} | {peer_campus}
          {my_coalition} | {peer_coalition}
          {my_class} | {peer_class}
          {my_status} | {peer_status}
          {my_parallel} | {peer_parallel}

          🏅 Lvl: `{my_level}` | `{peer_level}`
          ✨ XP: `{my_exp}` | `{peer_exp}`
          💰 Coins: `{my_coins}` | `{peer_coins}`

          *Social:*
          🧐 ИНТ: `{my_interest}` | `{peer_interest}`
          🙂 ДОБ: `{my_friendliness}` | `{peer_friendliness}`
          🕑 ПНК: `{my_punctuality}` | `{peer_punctuality}`
          ⚖️ СТР: `{my_thoroughness}` | `{peer_thoroughness}`
        en: |
          *Progress Comparison*

          🦁 *You* ............... 🦄 *{peer_login}*
          {my_campus} | {peer_campus}
          {my_class} | {peer_class}
          {my_coalition} | {peer_coalition}
          {my_status} | {peer_status}
          {my_parallel} | {peer_parallel}

          🏅 Lvl: `{my_level}` | `{peer_level}`
          ✨ XP: `{my_exp}` | `{peer_exp}`
          💰 Coins: `{my_coins}` | `{peer_coins}`

          *Social:*
          🧐 INT: `{my_interest}` | `{peer_interest}`
          🙂 FRD: `{my_friendliness}` | `{peer_friendliness}`
          🕑 PNC: `{my_punctuality}` | `{peer_punctuality}`
          ⚖️ THO: `{my_thoroughness}` | `{peer_thoroughness}`

      buttons:
        - id: back
          label:
            ru: 🔙 Назад к пиру
            en: 🔙 Back to peer
          next_state: DISPLAY_PEER_STATS

  COMPARE_SKILLS:
    type: system
    description: Генерация сравнительной Mermaid диаграммы
    logic:
      action: generate_radar_chart
      payload:
        users:
          - $context.user_id
          - $context.peer_id
    transitions:
      - next_state: DISPLAY_SKILLS_COMPARISON

  DISPLAY_SKILLS_COMPARISON:
    type: interactive
    description: Отображение сравнения навыков
    interface:
      text:
        ru: |
          🕸 *Наложение графов*

          🔵 Ты vs 🔴 {peer_login}

          {radar_comparison_mermaid}
        en: |
          🕸 *Stack Overlay*

          🔵 You vs 🔴 {peer_login}

          {radar_comparison_mermaid}
      buttons:
        - id: back
          label:
            ru: 🔙 Назад к пиру
            en: 🔙 Back to peer
          next_state: DISPLAY_PEER_STATS

  ERROR_PEER_NOT_FOUND:
    type: interactive
    description: Пользователь не найден
    interface:
      text:
        ru: |
          👻 *Пир не найден*

          Мы не нашли `{last_input}` в базе.
          Проверь, правильно ли написан логин (нужен именно Intra login, не Telegram).
        en: |
          👻 *Peer not found*

          We couldn't find `{last_input}`.
          Check the spelling (we need the Intra login, not Telegram username).
      buttons:
        - id: retry
          label:
            ru: 🔄 Попробовать снова
            en: 🔄 Try again
          next_state: SEARCH_INPUT
        - id: back
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: STATS_SEARCH_MENU
