---

initial_state: AUTO_SYNC_STATS

states:
  AUTO_SYNC_STATS:
    type: system
    description: "Automatically refresh user stats on entry"
    logic:
      action: get_user_stats
    transitions:
      - next_state: STATS_SEARCH_MENU

  STATS_SEARCH_MENU:
    type: interactive
    description: Личный профиль
    interface:
      text:
        ru: |
          👤 *Твой профиль: {my_s21login}*

          📍 {my_campus}
          🎓 {my_class} | {my_coalition}
          ⚙️ {my_status} | {my_parallel}

          🏆 *Уровень:* `{my_level}`
          ⭐️ *Опыт:* `{my_exp} XP`
          💰 *Коины:* `{my_coins} ₡`
          🤝 PRP: `{my_prps}` | CRP: `{my_crps}`

          *Social:*
          🧐 ИНТ: `{my_interest}` | 🙂 ДОБ: `{my_friendliness}`
          🕑 ПНК: `{my_punctuality}` | ⚖️ СТР: `{my_thoroughness}`
        en: |
          👤 *Profile: {my_s21login}*

          📍 {my_campus}
          🎓 {my_class} | {my_coalition}
          ⚙️ {my_status} | {my_parallel}

          🏆 *Level:* `{my_level}`
          ⭐️ *XP:* `{my_exp}`
          💰 *Coins:* `{my_coins} ₡`
          🤝 PRP: `{my_prps}` | CRP: `{my_crps}`

          *Social:*
          🧐 INT: `{my_interest}` | 🙂 FRD: `{my_friendliness}`
          🕑 PNC: `{my_punctuality}` | ⚖️ THO: `{my_thoroughness}`
          {cooldown_msg}
      buttons:
        - id: search
          label:
            ru: 🔎 Найти пира
            en: 🔎 Find peer
          next_state: SEARCH_INPUT
        - id: skills
          label:
            ru: 🕸 Мои навыки
            en: 🕸 My Skills
          row: 1
          next_state: TRY_SHOW_SKILLS
        - id: update
          label:
            ru: 🔄 Обновить данные
            en: 🔄 Refresh data
          row: 1
          next_state: FETCH_MY_STATS
        - id: back
          label:
            ru: 🏠 В главное меню
            en: 🏠 Main menu
          next_state: MAIN_MENU

  FETCH_MY_STATS:
    type: system
    description: Загрузка статистики текущего пользователя
    logic:
      action: get_user_stats
      payload:
        user_id: $context.user_id
        request_type: full_update
    transitions:
      - next_state: STATS_SEARCH_MENU

  TRY_SHOW_SKILLS:
    type: system
    description: Проверка состояния обновления навыков
    transitions:
      - condition: is_generating_chart == true
        next_state: SKILLS_UPDATING_INFO
      - next_state: FETCH_MY_SKILLS

  SKILLS_UPDATING_INFO:
    type: interactive
    interface:
      text:
        ru: |
          ⏳ *Ваши навыки обновляются...*

          Мы запросили свежие данные в Школе 21 и перерисовываем график.
          Попробуйте нажать кнопку ещё раз через пару секунд.
        en: |
          ⏳ *Your skills are being updated...*

          We requested fresh data from School 21 and are redrawing the chart.
          Please try again in a few seconds.
      buttons:
        - id: back
          label:
            ru: "⬅️ Назад"
            en: "⬅️ Back"
          next_state: STATS_SEARCH_MENU

  FETCH_MY_SKILLS:
    type: system
    description: Загрузка навыков текущего пользователя
    logic:
      action: get_user_skills
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: GENERATE_MY_SKILLS_CHART

  GENERATE_MY_SKILLS_CHART:
    type: system
    description: Генерация Mermaid диаграммы для своих навыков
    logic:
      action: generate_radar_chart
      payload:
        users:
          - $context.user_id
    transitions:
      - next_state: DISPLAY_MY_SKILLS

  DISPLAY_MY_SKILLS:
    type: interactive
    description: "Display user's skills radar chart"
    interface:
      image: "$context.radar_chart_path"
      text:
        ru: "📊 *Ваш профиль навыков*\n\nЭтот график показывает владение различными доменами разработки на основе ваших достижений в Школе 21."
        en: "📊 *Your Skills Profile*\n\nThis chart shows your proficiency in various development domains based on your achievements in School 21."
      buttons:
        - id: back
          label:
            ru: "⬅️ Назад"
            en: "⬅️ Back"
          next_state: STATS_SEARCH_MENU

  SEARCH_INPUT:
    type: input
    description: Ввод логина для поиска
    interface:
      text:
        ru: |
          🕵️ *Поиск пира*

          Введи логин студента.

          > Например: `verter`
        en: |
          🕵️ *Find a Peer*

          Enter the student's login.

          > Example: `verter`
      buttons:
        - id: back
          label:
            ru: 🙅‍♂️ Отмена
            en: 🙅‍♂️ Cancel
          next_state: STATS_SEARCH_MENU
    validation:
      regex: ^[A-Za-z]{4,9}$
    transitions:
      - trigger: on_valid_input
        next_state: FETCH_PEER_DATA

  FETCH_PEER_DATA:
    type: system
    description: Загрузка данных и разрешений пира
    logic:
      action: get_peer_data_with_permissions
      payload:
        login: $context.last_input
        requester_id: $context.user_id
    transitions:
      - condition: peer_found == true && peer_status == 'EXPELLED'
        next_state: DISPLAY_EXPELLED_PEER_STATS
      - condition: peer_found == true
        next_state: DISPLAY_PEER_STATS
      - condition: peer_found == false
        next_state: ERROR_PEER_NOT_FOUND

  DISPLAY_PEER_STATS:
    type: interactive
    description: Отображение статистики найденного пира
    interface:
      text:
        ru: |
          📂 *Пир: {peer_login}*
          📍 {peer_campus}
          🎓 {peer_class} | {peer_coalition}
          ⚙️ {peer_status} | {peer_parallel}

          📊 *Показатели:*
          • Уровень: `{peer_level}`
          • Опыт: `{peer_exp} XP`
          • Коины: `{peer_coins} ₡`
          • PRP: `{peer_prps}` | CRP: `{peer_crps}`

          *Social:*
          • ИНТ: `{peer_interest}` | ДОБ: `{peer_friendliness}`
          • ПНК: `{peer_punctuality}` | СТР: `{peer_thoroughness}`

          {peer_contact_line}
          {alternative_contact_line}
        en: |
          📂 *Peer: {peer_login}*

          📍 {peer_campus}
          🎓 {peer_class} | {peer_coalition}
          ⚙️ {peer_status} | {peer_parallel}

          📊 *Stats:*
          • Level: `{peer_level}`
          • XP: `{peer_exp}`
          • Coins: `{peer_coins} ₡`
          • PRP: `{peer_prps}` | CRP: `{peer_crps}`

          *Social:*
          • INT: `{peer_interest}` | FRD: `{peer_friendliness}`
          • PNC: `{peer_punctuality}` | THO: `{peer_thoroughness}`

          📬 *Contact:* {peer_contact_line}
          *Alt:* {alternative_contact_line}
      buttons:
        - id: compare_skills
          label:
            ru: 🕸 Сравнить навыки
            en: 🕸 Compare skills
          next_state: COMPARE_SKILLS
        - id: new_search
          label:
            ru: 🔍 Искать другого
            en: 🔍 Find another
          row: 1
          next_state: SEARCH_INPUT
        - id: back
          label:
            ru: 🔙 В мой профиль
            en: 🔙 My profile
          row: 1
          next_state: STATS_SEARCH_MENU

  DISPLAY_EXPELLED_PEER_STATS:
    type: interactive
    description: Отображение статистики найденного отчисленного пира
    interface:
      text:
        ru: |
          📂 *Пир: {peer_login}*
          📍 {peer_campus}
          ⚙️ {peer_status}

          📊 *Показатели:*
          • Уровень: `{peer_level}`
          • Опыт: `{peer_exp} XP`
          • Коины: `{peer_coins} ₡`
          • PRP: `{peer_prps}` | CRP: `{peer_crps}`
        en: |
          📂 *Peer: {peer_login}*

          📍 {peer_campus}
          ⚙️ {peer_status}

          📊 *Stats:*
          • Level: `{peer_level}`
          • XP: `{peer_exp}`
          • Coins: `{peer_coins} ₡`
          • PRP: `{peer_prps}` | CRP: `{peer_crps}`
      buttons:
        - id: compare_skills
          label:
            ru: 🕸 Сравнить навыки
            en: 🕸 Compare skills
          next_state: COMPARE_SKILLS
        - id: new_search
          label:
            ru: 🔍 Искать другого
            en: 🔍 Find another
          row: 1
          next_state: SEARCH_INPUT
        - id: back
          label:
            ru: 🔙 В мой профиль
            en: 🔙 My profile
          row: 1
          next_state: STATS_SEARCH_MENU

  COMPARE_SKILLS:
    type: system
    description: Генерация сравнительной диаграммы
    logic:
      action: generate_radar_chart
      payload:
        users:
          - $context.user_id
          - $context.peer_login
    transitions:
      - next_state: DISPLAY_SKILLS_COMPARISON

  DISPLAY_SKILLS_COMPARISON:
    type: interactive
    description: Отображение сравнения навыков
    interface:
      image: "{radar_comparison_path}"
      text:
        ru: |
          🕸 *Наложение графов*

          🔵 Ты vs 🔴 {peer_login}
        en: |
          🕸 *Stack Overlay*

          🔵 You vs 🔴 {peer_login}
      buttons:
        - id: back
          label:
            ru: 🔙 Назад к пиру
            en: 🔙 Back to peer
          next_state: DISPLAY_PEER_STATS

  ERROR_PEER_NOT_FOUND:
    type: interactive
    description: Пользователь не найден
    interface:
      text:
        ru: |
          👻 *Пир не найден*

          Мы не нашли `{last_input}` в базе.
          Проверь, правильно ли написан логин (нужен именно S21 login, не Telegram).
        en: |
          👻 *Peer not found*

          We couldn't find `{last_input}`.
          Check the spelling (we need the S21 login, not Telegram username).
      buttons:
        - id: retry
          label:
            ru: 🔄 Попробовать снова
            en: 🔄 Try again
          next_state: SEARCH_INPUT
        - id: back
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: STATS_SEARCH_MENU
