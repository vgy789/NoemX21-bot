initial_state: SETTINGS_MENU
states:
  SETTINGS_MENU:
    type: interactive
    description: Главное меню конфигурации
    interface:
      text:
        ru: |
          ⚙️ *Настройки*

          Здесь можно кастомизировать профиль, настроить связь и получить доступ к API.
        en: |
          ⚙️ *Settings*

          Here you can customize your profile, set up contacts, and access the API.
      buttons:
        - id: profile
          label:
            ru: 👤 Мой профиль
            en: 👤 My Profile
          next_state: PROFILE_SETTINGS
          row: 1
        - id: api
          label:
            ru: 👨‍💻 Мой API
            en: 👨‍💻 My API
          next_state: LOAD_API_TOKEN
          row: 1
        - id: language
          label:
            ru: "🌐 Язык: {my_lang_emoji}"
            en: "🌐 Lang: {my_lang_emoji}"
          next_state: SET_LANGUAGE
        - id: back
          label:
            ru: 🏠 На главную
            en: 🏠 Main menu
          next_state: MAIN_MENU

  PROFILE_SETTINGS:
    type: interactive
    description: Меню настроек профиля
    on_enter:
      - action: load_profile_settings
    interface:
      text:
        ru: |
          👤 *Настройки / Профиль*

          Что видят пиры в разделе статистики и поиска.

          👁️ *Видят ли твой Telegram @username:* `{my_searchable_status_ru}`

          📞 *Запасной канал связи:* `{my_alt_contact_display_ru}`

        en: |
          👤 *Settings / Profile*

          What peers see in the stats and search sections.

          👁️ *Telegram visibility:* `{my_searchable_status_en}`

          📞 *Alternative contact:* `{my_alt_contact_display_en}`
      buttons:
        - id: searchable
          label:
            ru: "👁️ Скрыть/Показать TG"
            en: "👁️ Toggle TG visibility"
          next_state: CHECK_TELEGRAM_USERNAME
          row: 1
        - id: contact
          label:
            ru: 📞 Изменить контакт
            en: 📞 Change contact
          next_state: SET_ALTERNATIVE_CONTACT
          row: 1
        - id: unlink_profile
          label:
            ru: 🚪 Отвязать профиль
            en: 🚪 Unlink Profile
          next_state: UNLINK_PROFILE_CONFIRMATION
          row: 2
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: SETTINGS_MENU
          row: 2

  CHECK_TELEGRAM_USERNAME:
    type: system
    description: Проверка Telegram @username
    logic:
      action: check_telegram_username
      payload:
        user_id: $context.user_id
    transitions:
      - condition: has_telegram_username == true
        next_state: TOGGLE_SEARCHABLE
      - next_state: NO_TELEGRAM_USERNAME

  NO_TELEGRAM_USERNAME:
    type: interactive
    description: Уведомление об отсутствии Telegram @username
    interface:
      text:
        ru: |
          👁️ *Проблема с маскировкой*

          У тебя в настройках Telegram не задан `@username`.
          Без него другие пиры не смогут тебе написать, даже если я покажу им твой профиль.

          Укажи его в настройках самого Telegram и возвращайся!
        en: |
          👁️ *Visibility Issue*

          You don't have a Telegram `@username` set.
          Other peers won't be able to message you unless you set one.

          Go to Telegram settings, fix it, and come back!
      buttons:
        - id: back
          label:
            ru: 🔙 Понятно
            en: 🔙 Got it
          next_state: PROFILE_SETTINGS

  TOGGLE_SEARCHABLE:
    type: system
    description: Переключение видимости
    logic:
      action: toggle_searchable
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: SEARCHABLE_STATUS_NOTIFICATION

  SEARCHABLE_STATUS_NOTIFICATION:
    type: interactive
    description: Уведомление о смене видимости
    interface:
      text:
        ru: |
          👁️ *Видимость изменена*

          Теперь твой Telegram @username виден другим пирам.
          *Статус:* `✅ Виден`
        en: |
          👁️ *Visibility Update*

          Your Telegram @username is now visible to other peers.
          *Status:* `✅ Visible`
      buttons:
        - id: back
          label:
            ru: 👌 Понятно
            en: 👌 Got it
          next_state: PROFILE_SETTINGS

  SEARCHABLE_STATUS_HIDDEN:
    type: interactive
    description: Уведомление о выключенной видимости
    interface:
      text:
        ru: |
          👁️ *Видимость изменена*

          Теперь твой Telegram @username скрыт от других пиров.
          *Статус:* `❌ Не виден`
        en: |
          👁️ *Visibility Update*

          Your Telegram @username is now hidden from other peers.
          *Status:* `❌ Not visible`
      buttons:
        - id: back
          label:
            ru: 👌 Понятно
            en: 👌 Got it
          next_state: PROFILE_SETTINGS

  SET_ALTERNATIVE_CONTACT:
    type: input
    description: Ввод альтернативного контакта
    interface:
      text:
        ru: |
          📞 *Профиль / Запасной контакт*

          Напиши, как ещё с тобой связаться (почта, другой мессенджер, сигнал дымом).

          _Максимум 42 символа._
        en: |
          📞 *Profile / Backup Contact*

          Tell us how else to reach you (email, other messenger, smoke signals).

          _Max 42 characters._
      error_invalid:
        ru: |
          ⚠️ *Много букв!* (или слишком мало).
          Нужно уложиться в 42 символа. Попробуй еще раз.
        en: |
          ⚠️ *Invalid length!* Must be between 1 and 42 characters. Try again.
      buttons:
        - id: delete
          label:
            ru: 🧹 Стереть текущий
            en: 🧹 Delete current
          condition: has_alt_contact == true
          next_state: DELETE_ALTERNATIVE_CONTACT
          row: 1
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: PROFILE_SETTINGS
          row: 1
    validation:
      regex: ^.{4,42}$
    transitions:
      - trigger: on_valid_input
        next_state: CONFIRM_ALTERNATIVE_CONTACT
      - button: delete
        next_state: DELETE_ALTERNATIVE_CONTACT
      - button: back
        next_state: PROFILE_SETTINGS

  DELETE_ALTERNATIVE_CONTACT:
    type: system
    description: Удаление контакта
    logic:
      action: delete_alternative_contact
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: PROFILE_SETTINGS

  CONFIRM_ALTERNATIVE_CONTACT:
    type: interactive
    description: Подтверждение сохранения контакта
    on_enter:
      - action: set_alternative_contact
    interface:
      text:
        ru: |
          ✅ *Записала в блокнот!*

          Контакт обновлён: `{my_alt_contact}`
        en: |
          ✅ *Beak-marked!*

          Contact updated: `{my_alt_contact}`
      buttons:
        - id: back
          label:
            ru: 👌 Понятно
            en: 👌 Got it
          next_state: PROFILE_SETTINGS

  UNLINK_PROFILE_CONFIRMATION:
    type: interactive
    description: Подтверждение отвязки профиля
    interface:
      text:
        ru: |
          *Профиль / Отвязать от аккаунта*

          Ты хочешь отвязать свой Telegram от логина `{my_s21login}`.
          Я забуду твои настройки и API-ключи. Придётся логиниться заново, если захочешь вернуться.
        en: |
          *Profile / Unlink from Account*

          You're about to unlink your Telegram from `{my_s21login}`.
          I'll forget your settings and API keys. You'll need to log in again via Rocket.Chat to return.
      buttons:
        - id: confirm
          label:
            ru: 🚪 Отвязать
            en: 🚪 Unlink
          next_state: UNLINK_PROFILE
          row: 1
        - id: cancel
          label:
            ru: 🔙 Не нужно
            en: 🔙 No need
          next_state: PROFILE_SETTINGS
          row: 1

  UNLINK_PROFILE:
    type: system
    description: Процесс отвязки
    logic:
      action: delete_profile
      payload:
        user_id: $context.user_id
    transitions:
      - condition: success == true
        next_state: START
      - next_state: UNLINK_PROFILE_BLOCKED

  UNLINK_PROFILE_BLOCKED:
    type: interactive
    description: Блокировка отвязки (активные обязательства)
    interface:
      text:
        ru: |
          🦆 *Не так быстро, пир!*

          Ты не можешь просто так уплыть, пока за тобой числятся долги перед кампусом:

          📚 Книг на руках: `{delete_profile_active_loans}`
          🗓 Забронировано переговорок: `{delete_profile_active_room_bookings}`

          Сдай книги и отмени брони, тогда и поговорим.
        en: |
          🦆 *Hold your feathers!*

          You can't leave while you still have active commitments:

          📚 Borrowed books: `{delete_profile_active_loans}`
          🗓 Room bookings: `{delete_profile_active_room_bookings}`

          Return the books and cancel your bookings first.
      buttons:
        - id: back
          label:
            ru: 🔙 Пойду разберусь
            en: 🔙 I'll handle it
          next_state: PROFILE_SETTINGS

  LOAD_API_TOKEN:
    type: system
    description: Загрузка токена
    logic:
      action: load_api_token
    transitions:
      - next_state: MANAGE_API_TOKEN

  MANAGE_API_TOKEN:
    type: interactive
    description: Управление токеном
    interface:
      text:
        ru: |
          👨‍💻 *Настройки / API*

          Используй этот ключ для доступа к моим данным. Не показывай его никому – это только между нами, кря! 🤫🦆

          🔑 *Твой ключ:*
          `{my_botapi_token}`
        en: |
          👨‍💻 *Settings / API*

          Use this key to access my data. Don't share it with anyone – it's just between us, quack! 🤫🦆

          🔑 *Your Token:*
          `{my_botapi_token}`
      buttons:
        - id: regenerate
          label:
            ru: 🔁 Сгенерировать новый
            en: 🔁 Regenerate token
          row: 1
          next_state: GENERATE_API_TOKEN
        - id: explain_token
          label:
            ru: ❓ Что это?
            en: ❓ What is this?
          row: 2
          next_state: API_TOKEN_EXPLANATION
        - id: back
          label:
            ru: 🔙 К настройкам
            en: 🔙 To settings
          row: 2
          next_state: SETTINGS_MENU

  API_TOKEN_EXPLANATION:
    type: interactive
    description: Пояснение про API токен
    interface:
      text:
        ru: |
          ❓ *Что такое?*

          Это персональный ключ для запросов к API бота от твоего имени.

          Метод `/check` позволяет проверить зарегистрирован ли пользователь в боте.
          - `external_id` (string): ID пользователя в Telegram.
          - `login` (string): Логин с платформы.
          - `platform` (string): Название платформы (например, "telegram").
          Ответ:
          - registered: true/false
        en: |
          ❓ *What is this?*

          This is a personal key for making API requests to the bot on your behalf.

          The /check method allows you to verify if a user is registered with the bot.
          - `external_id` (string): User ID in Telegram.
          - `login` (string): Login from the platform.
          - `platform` (string): Name of the platform (e.g., "telegram").
          Response:
          - registered: true/false
      buttons:
        - id: back
          label:
            ru: 🔙 Назад к API
            en: 🔙 Back to API
          next_state: MANAGE_API_TOKEN

  GENERATE_API_TOKEN:
    type: system
    description: Создание нового токена
    logic:
      action: generate_api_token
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: SHOW_NEW_API_TOKEN

  SHOW_NEW_API_TOKEN:
    type: interactive
    description: Показ нового токена
    interface:
      text:
        ru: |
          ✅ *Новый ключ готов!*

          `{my_botapi_token}`
          Старый ключ теперь превратился в тыкву.
        en: |
          ✅ *New Key Ready!*

          `{my_botapi_token}`
          The old one is now useless.
      buttons:
        - id: back
          label:
            ru: 👌 Понятно
            en: 👌 Got it
          next_state: MANAGE_API_TOKEN

  SET_LANGUAGE:
    type: interactive
    description: Выбор локали
    interface:
      text:
        ru: |
          🌐 Выбери язык / Choose language
        en: |
          🌐 Выбери язык / Choose language
      buttons:
        - id: ru
          label:
            ru: 🇷🇺 Русский
            en: 🇷🇺 Russian
          next_state: SETTINGS_MENU
        - id: en
          label:
            ru: 🇺🇸 English
            en: 🇺🇸 English
          next_state: SETTINGS_MENU
