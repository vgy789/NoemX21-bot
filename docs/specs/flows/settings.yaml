---
meta:
  feature_id: SET-001
  name: Настройки пользователя
  description: Конфигурация профиля и API
  version: 2.2.0

initial_state: SETTINGS_MENU
states:
  SETTINGS_MENU:
    type: interactive
    description: Главное меню конфигурации
    interface:
      text:
        ru: |
          ⚙️ *System Config*

          🆔 *Profile Config*
          Приватность, контакты, уведомления.

          🔑 *Dev Tools*
          API Gateway, токены, Data-Provider.
        en: |
          ⚙️ *System Config*

          🆔 *Profile Config*
          Privacy, contacts, notifications.

          🔑 *Dev Tools*
          API Gateway, tokens, Data-Provider.
      buttons:
        - id: profile
          label:
            ru: 🆔 Профиль
            en: 🆔 Profile
          next_state: PROFILE_SETTINGS
          row: 1
        - id: api
          label:
            ru: 🔑 API / Dev
            en: 🔑 API / Dev
          next_state: API_SETTINGS
          row: 1
        - id: language
          label:
            ru: "🌐 Язык: {my_lang_emoji}"
            en: "🌐 Lang: {my_lang_emoji}"
          next_state: SET_LANGUAGE
        - id: back
          label:
            ru: 🏠 Главное меню
            en: 🏠 Main menu
          next_state: MAIN_MENU

  PROFILE_SETTINGS:
    type: interactive
    description: Меню настроек профиля
    interface:
      text:
        ru: |
          🆔 *Profile Configuration*
        en: |
          🆔 *Profile Configuration*
      buttons:
        - id: searchable
          label:
            ru: "👁️ Видимость: {is_searchable_label_ru}"
            en: "👁️ Visibility: {is_searchable_label_en}"
          next_state: TOGGLE_SEARCHABLE
        - id: contact
          label:
            ru: 📞 Внешний контакт
            en: 📞 Ext. Contact
          next_state: SET_ALTERNATIVE_CONTACT
        - id: delete_profile
          label:
            ru: 🗑️ Удалить профиль
            en: 🗑️ Delete Profile
          next_state: DELETE_PROFILE_CONFIRMATION
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: SETTINGS_MENU

  DELETE_PROFILE_CONFIRMATION:
    type: interactive
    description: Подтверждение удаления профиля
    interface:
      text:
        ru: |
          ⚠️ *Подтверждение удаления*

          Действительно хочешь удалить свой профиль?
        en: |
          ⚠️ *Delete Confirmation*

          Are you sure you want to delete your profile?
      buttons:
        - id: confirm
          label:
            ru: 🗑️ Да, удалить
            en: 🗑️ Yes, delete
          next_state: DELETE_PROFILE
        - id: cancel
          label:
            ru: ❌ Отмена
            en: ❌ Cancel
          next_state: PROFILE_SETTINGS

  DELETE_PROFILE:
    type: system
    description: Удаление профиля
    interface:
      text:
        ru: |
          🗑️ *Profile Deletion*

          Профиль удален. До новых встреч!
          Введите /start для регистрации нового профиля.
        en: |
          🗑️ *Profile Deletion*

          Profile deleted. See you next time!
          Type /start to register a new profile.
    logic:
      action: delete_profile
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: registration.yaml/START

  API_SETTINGS:
    type: interactive
    description: Меню настроек API
    interface:
      text:
        ru: |
          🔑 *Developer Tools*
        en: |
          🔑 *Developer Tools*
      buttons:
        - id: provider
          label:
            ru: 📡 Data-Provider
            en: 📡 Data-Provider
          next_state: CHECK_PROVIDER_CREDENTIALS
        - id: api_token
          label:
            ru: 🔑 Access Token
            en: 🔑 Access Token
          next_state: LOAD_API_TOKEN
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: SETTINGS_MENU

  SET_ALTERNATIVE_CONTACT:
    type: input
    description: Ввод альтернативного контакта
    interface:
      text:
        ru: |
          📞 *Внешний контакт*

          Введи `email` или `telegram_alias` для экстренной связи.
          _Отправь пустую строку для удаления._
        en: |
          📞 *External Contact*

          Input `email` or `telegram_alias` for emergency downlink.
          _Send empty string to purge._
      error_invalid:
        ru: |
          ⚠️ *Ошибка формата*
          Максимум 42 символа.
        en: |
          ⚠️ *Format Error*
          Max 42 characters.
    validation:
      regex: ^.{1,42}$
    transitions:
      - trigger: on_valid_input
        next_state: CONFIRM_ALTERNATIVE_CONTACT
      - button: delete
        next_state: DELETE_ALTERNATIVE_CONTACT
      - button: back
        next_state: PROFILE_SETTINGS

  DELETE_ALTERNATIVE_CONTACT:
    type: system
    description: Удаление контакта
    logic:
      action: delete_alternative_contact
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: PROFILE_SETTINGS

  CONFIRM_ALTERNATIVE_CONTACT:
    type: interactive
    description: Подтверждение сохранения контакта
    interface:
      text:
        ru: |
          ✅ *Контакт обновлен*
          Value: `{my_alt_contact}`
        en: |
          ✅ *Contact Updated*
          Value: `{my_alt_contact}`
      buttons:
        - id: back
          label:
            ru: 💾 OK
            en: 💾 OK
          next_state: PROFILE_SETTINGS

  SET_LANGUAGE:
    type: interactive
    description: Выбор локали
    interface:
      text:
        ru: 🌐 *System Locale*
        en: 🌐 *System Locale*
      buttons:
        - id: ru
          label:
            ru: 🇷🇺 Русский
            en: 🇷🇺 Russian
          next_state: SETTINGS_MENU
        - id: en
          label:
            ru: 🇺🇸 English
            en: 🇺🇸 English
          next_state: SETTINGS_MENU

  LOAD_API_TOKEN:
    type: system
    description: Загрузка токена
    logic:
      action: load_api_token
    transitions:
      - next_state: MANAGE_API_TOKEN

  MANAGE_API_TOKEN:
    type: interactive
    description: Управление токеном
    interface:
      text:
        ru: |
          🔑 *Access Token*

          Используй этот ключ для интеграции внешних сервисов с School 21 API.

          🔰 *Current Token:*
          `{my_botapi_token}`
        en: |
          🔑 *Access Token*

          Use this key to integrate external services with School 21 API.

          🔰 *Current Token:*
          `{my_botapi_token}`
      buttons:
        - id: regenerate
          label:
            ru: 🔁 Регенерация ключа
            en: 🔁 Regenerate Key
          next_state: GENERATE_API_TOKEN
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: API_SETTINGS

  GENERATE_API_TOKEN:
    type: system
    description: Генерация токена
    logic:
      action: generate_api_token
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: SHOW_NEW_API_TOKEN

  SHOW_NEW_API_TOKEN:
    type: interactive
    description: Показ нового токена
    interface:
      text:
        ru: |
          ✅ *Token Generated*

          `{my_botapi_token}`
        en: |
          ✅ *Token Generated*

          `{my_botapi_token}`
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: MANAGE_API_TOKEN

  CHECK_PROVIDER_CREDENTIALS:
    type: system
    description: Проверка статуса провайдера
    logic:
      action: is_provider_credentials
      payload:
        user_id: $context.user_id
    transitions:
      - condition: provider_credentials != null
        next_state: ALREADY_PROVIDER_CREDENTIALS
      - condition: provider_credentials == null
        next_state: NEED_PROVIDER_CREDENTIALS

  ALREADY_PROVIDER_CREDENTIALS:
    type: interactive
    description: Статус активного провайдера
    interface:
      text:
        ru: |
          📡 *Data Provider Status*

          ✅ *Active*
          Твоя нода успешно передает данные.
        en: |
          📡 *Data Provider Status*

          ✅ *Active*
          Your node is successfully transmitting data.
      buttons:
        - id: refuse
          label:
            ru: 🛑 Остановить ноду
            en: 🛑 Stop Node
          next_state: RESET_PROVIDER_CREDENTIALS
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: API_SETTINGS

  RESET_PROVIDER_CREDENTIALS:
    type: system
    description: Отключение провайдера
    interface:
      text:
        ru: |
          🚫 *Node Stopped*
          Провайдер отключен.
        en: |
          🚫 *Node Stopped*
          Provider disabled.
    logic:
      action: reset_provider_credentials
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: API_SETTINGS

  NEED_PROVIDER_CREDENTIALS:
    type: interactive
    description: Предложение стать провайдером
    interface:
      text:
        ru: |
          📡 *Data Provider: Inactive*

          Требуется подключение локальной ноды для синхронизации данных кампуса.

          🟢 *Active Nodes ({my_campus}):* `{count}`
        en: |
          📡 *Data Provider: Inactive*

          Local node connection required for campus data synchronization.

          🟢 *Active Nodes ({my_campus}):* `{count}`
      buttons:
        - id: set_provider_credentials
          label:
            ru: 🔌 Подключить
            en: 🔌 Connect
          next_state: SET_PROVIDER_CREDENTIALS
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: API_SETTINGS

  SET_PROVIDER_CREDENTIALS:
    type: input
    description: Ввод креденшалов
    interface:
      text:
        ru: |
          🔐 *Node Authorization*

          Введи данные для подключения к School 21 API.
          *Format:* `Login` | `Password` | `Token`
        en: |
          🔐 *Node Authorization*

          Enter credentials to connect to School 21 API.
          *Format:* `Login` | `Password` | `Token`
      error_invalid:
        ru: |
          ⚠️ *Auth Error*
          Токен или логин не распознан.
        en: |
          ⚠️ *Auth Error*
          Token or login not recognized.
    validation:
      regex: (?:ey[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+)|(?<![A-Za-z0-9\-_])[a-z]{4,9}(?![A-Za-z0-9\-_])
    transitions:
      - trigger: on_valid_input
        next_state: CONFIRM_PROVIDER_CREDENTIALS
      - trigger: on_invalid_input
        next_state: FAULT_PROVIDER_CREDENTIALS

  FAULT_PROVIDER_CREDENTIALS:
    type: interactive
    description: Ошибка подключения провайдера
    interface:
      text:
        ru: |
          ❌ *Connection Failed*
          API Школы отклонил запрос. Проверь данные.
        en: |
          ❌ *Connection Failed*
          School API rejected request. Verify credentials.
      buttons:
        - id: back
          next_state: SET_PROVIDER_CREDENTIALS

  CONFIRM_PROVIDER_CREDENTIALS:
    type: interactive
    description: Успешное подключение провайдера
    interface:
      text:
        ru: |
          ✅ *Node Connected*
          Синхронизация данных активирована.
        en: |
          ✅ *Node Connected*
          Data synchronization activated.
      buttons:
        - id: back
          next_state: API_SETTINGS

  TOGGLE_SEARCHABLE:
    type: system
    description: Переключение видимости
    logic:
      action: toggle_searchable
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: SEARCHABLE_STATUS_NOTIFICATION

  SEARCHABLE_STATUS_NOTIFICATION:
    type: interactive
    description: Уведомление о смене видимости
    interface:
      text:
        ru: |
          👁️ *Visibility Update*

          Status: {is_searchable_label_ru}
          {search_restriction_ru}
        en: |
          👁️ *Visibility Update*

          Status: {is_searchable_label_en}
          {search_restriction_en}
      buttons:
        - id: back
          next_state: PROFILE_SETTINGS
