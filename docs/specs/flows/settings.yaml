---
meta:
  feature_id: SET-001
  name: Настройки пользователя
  description: Конфигурация профиля и API
  version: 2.3.0

initial_state: SETTINGS_MENU
states:
  SETTINGS_MENU:
    type: interactive
    description: Главное меню конфигурации
    interface:
      text:
        ru: |
          ⚙️ *Настройки*

          Здесь ты можешь управлять своим профилем, настроить резервную связь и получить доступ к API.
        en: |
          ⚙️ *Settings*

          Here you can manage your profile, set up an emergency contact, and access the API.
          > *What do you want to configure?*
      buttons:
        - id: profile
          label:
            ru: 👤 Мой профиль
            en: 👤 My Profile
          next_state: PROFILE_SETTINGS
          row: 1
        - id: api
          label:
            ru: 👨‍💻 API для разработчиков
            en: 👨‍💻 API for dev
          next_state: LOAD_API_TOKEN
          row: 1
        - id: language
          label:
            ru: "Язык: {my_lang_emoji}"
            en: "Lang: {my_lang_emoji}"
          next_state: SET_LANGUAGE
        - id: back
          label:
            ru: 🏠 На главную
            en: 🏠 Main menu
          next_state: MAIN_MENU

  PROFILE_SETTINGS:
    type: interactive
    description: Меню настроек профиля
    on_enter:
      - action: load_profile_settings
    interface:
      text:
        ru: |
          👤 *Мой профиль*

          Настрой то, как тебя видят другие пиры и укажи дополнительный способ связи.

          ```👁️ Видимость Telegram @username:
          {my_searchable_status_ru}
          ```
          ```📞 Дополнительный контакт:
          {my_alt_contact_display_ru}
          ```
        en: |
          👤 *My Profile*

          Configure how peers see you and set up an alternative contact method.

          👁️ *Telegram @username visibility:* `{my_searchable_status_en}`

          📞 *Alternative contact:* `{my_alt_contact_display_en}`
      buttons:
        - id: searchable
          label:
            # Note: по умолчанию виден
            # TODO: изменить SEARCHABLE на более подходящий термин, например, TELEGRAM_USERNAME_VISIBILITY
            ru: "👁️ Изменить видимость"
            en: "👁️ Change visibility"
          next_state: TOGGLE_SEARCHABLE
          row: 1
        - id: contact
          label:
            ru: 📞 Изменить контакт
            en: 📞 Change contact
          next_state: SET_ALTERNATIVE_CONTACT
          row: 1
        - id: delete_profile
          label:
            ru: 🗑️ Удалить профиль
            en: 🗑️ Delete Profile
          next_state: DELETE_PROFILE_CONFIRMATION
          row: 2
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: SETTINGS_MENU
          row: 2

  # Например используется в {peer_contact_line_ru} в статистике пиров
  TOGGLE_SEARCHABLE:
    type: system
    description: Переключение видимости
    logic:
      action: toggle_searchable
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: SEARCHABLE_STATUS_NOTIFICATION

  SEARCHABLE_STATUS_NOTIFICATION:
    type: interactive
    description: Уведомление о смене видимости
    interface:
      text:
        ru: |
          👁️ *Изменение видимости*

          Видимость твоего Telegram @username для других пиров обновлена.

          *Статус:* `{is_searchable_label_ru}`
        en: |
          👁️ *Visibility Update*

          The visibility of your Telegram @username to other parties has been updated.

          *Status:* `{is_searchable_label_en}`
      buttons:
        - id: back
          label:
            ru: 💾 OK
            en: 💾 OK
          next_state: PROFILE_SETTINGS

  # Например, используется как {alternative_contact} в статистике пиров
  SET_ALTERNATIVE_CONTACT:
    type: input
    description: Ввод альтернативного контакта
    interface:
      text:
        ru: |
          📞 *Дополнительный контакт*

          Отправь в чат свой запасной email или другую информацию о связи с тобой.
          Это будут видеть пиры, при просмотре твоего профиля.
        en: |
          📞 *External Contact*

          Send an alternative email or other contact info to be displayed on your profile.
          This will be visible to parties when they view your profile.
      error_invalid:
        ru: |
          ⚠️ Не похоже на корректный контакт (максимум 42 символа).
          Попробуй еще раз!
        en: |
          ⚠️ This does not appear to be a valid contact (maximum 42 characters).
          Please try again!
      buttons:
        # кнопка видна, только если контакт уже задан
        - id: delete
          label:
            ru: 🗑️ Удалить текущий
            en: 🗑️ Delete Current Contact
          condition: has_alt_contact == true
          next_state: DELETE_ALTERNATIVE_CONTACT
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: PROFILE_SETTINGS
    validation:
      regex: ^.{1,42}$
    transitions:
      - trigger: on_valid_input
        next_state: CONFIRM_ALTERNATIVE_CONTACT
      - button: delete
        next_state: DELETE_ALTERNATIVE_CONTACT
      - button: back
        next_state: PROFILE_SETTINGS

  DELETE_ALTERNATIVE_CONTACT:
    type: system
    description: Удаление контакта
    logic:
      action: delete_alternative_contact
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: PROFILE_SETTINGS

  CONFIRM_ALTERNATIVE_CONTACT:
    type: interactive
    description: Подтверждение сохранения контакта
    on_enter:
      - action: set_alternative_contact
    interface:
      text:
        ru: |
          ✅ *Готово!*

          Резервный контакт обновлен: `{my_alt_contact}`
        en: |
          ✅ *Done!*

          Backup contact updated: `{my_alt_contact}`
      buttons:
        - id: back
          label:
            ru: 💾 OK
            en: 💾 OK
          next_state: PROFILE_SETTINGS

  DELETE_PROFILE_CONFIRMATION:
    type: interactive
    description: Подтверждение удаления профиля
    interface:
      text:
        ru: |
          ⚠️ *Удаление профиля*

          Ты собираешься удалить свой профиль из бота. Мы забудем все твои настройки и сохранённые данные.

          Уверен, что хочешь продолжить? Это действие нельзя отменить.
        en: |
          ⚠️ *Delete Profile*

          You are about to delete your profile from the bot. We will forget all your settings and saved data.

          Are you sure you want to proceed? This action cannot be undone.
      buttons:
        - id: confirm
          label:
            ru: 🗑️ Да, удалить
            en: 🗑️ Yes, delete
          next_state: DELETE_PROFILE
          row: 1
        - id: cancel
          label:
            ru: 🔙 Нет, я передумал:а
            en: 🔙 No, I changed my mind
          next_state: PROFILE_SETTINGS
          row: 1

  DELETE_PROFILE:
    type: system
    description: Удаление профиля
    interface:
      text:
        ru: |
          🗑️ *Профиль удален*

          Если захочешь вернуться, просто отправь команду /start.
        en: |
          🗑️ *Profile Deletion*

          If you want to come back, just send the /start command.
    logic:
      action: delete_profile
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: START

  # API_SETTINGS:
  #   type: interactive
  #   description: Меню настроек API
  #   interface:
  #     text:
  #       ru: |
  #         🔌 *Инструменты разработчика*
  #       en: |
  #         🔌 *Developer Tools*
  #     buttons:
  #       - id: api_token
  #         label:
  #           ru: 🔑 API ключ
  #           en: 🔑 API Token
  #         next_state: LOAD_API_TOKEN
  #       - id: back
  #         label:
  #           ru: 🔙 Назад
  #           en: 🔙 Back
  #         next_state: SETTINGS_MENU

  LOAD_API_TOKEN:
    type: system
    description: Загрузка токена
    logic:
      action: load_api_token
    transitions:
      - next_state: MANAGE_API_TOKEN

  MANAGE_API_TOKEN:
    type: interactive
    description: Управление токеном
    interface:
      text:
        ru: |
          👨‍💻 *Токен API*

          Используй этот ключ для доступа к данным NoemX21 по API.

          🔑 *Твой токен:*
          `{my_botapi_token}`
        en: |
          👨‍💻 *API Token*

          Use this key to access NoemX21 data via API.

          🔑 *Current Token:*
          `{my_botapi_token}`
      buttons:
        - id: regenerate
          label:
            ru: 🔁 Выпустить новый токен
            en: 🔁 Generate New Token
          next_state: GENERATE_API_TOKEN
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: SETTINGS_MENU

  GENERATE_API_TOKEN:
    type: system
    description: Создание нового токена
    logic:
      action: generate_api_token
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: SHOW_NEW_API_TOKEN

  SHOW_NEW_API_TOKEN:
    type: interactive
    description: Показ нового токена
    interface:
      text:
        ru: |
          ✅ Новый токен сгенерирован!

          `{my_botapi_token}`
          Старый ключ больше не работает.
        en: |
          ✅ *New Token Generated*

          `{my_botapi_token}`
          The old token is no longer valid.
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: MANAGE_API_TOKEN

  SET_LANGUAGE:
    type: interactive
    description: Выбор локали
    interface:
      text:
        ru: |
          🌐 *Язык интерфейса*

          👇 Выбери язык на котором будет отображаться интерфейс бота.
        en: |
          🌐 *Interface Language*

          👇 Select the language in which the bot interface will be displayed.
      buttons:
        - id: ru
          label:
            ru: 🇷🇺 Русский
            en: 🇷🇺 Russian
          next_state: SETTINGS_MENU
        - id: en
          label:
            ru: 🇺🇸 English
            en: 🇺🇸 English
          next_state: SETTINGS_MENU
