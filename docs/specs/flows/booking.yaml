---
meta:
  feature_id: BOOK-001
  name: Бронирование переговорок
  description: Система бронирования слотов в кампусе (Friendly UI)
  version: 2.1.0

initial_state: AUTO_SYNC_BOOKING

states:
  AUTO_SYNC_BOOKING:
    type: system
    description: "Pre-load campus rooms and current slots"
    logic:
      action: get_booking_data
      payload:
        campus_id: $context.campus_id
    transitions:
      - next_state: BOOKING_MENU

  BOOKING_MENU:
    type: interactive
    description: Главное меню (Слоты на сегодня)
    interface:
      text:
        ru: |
          💬 *Переговорки: {my_campus}*

          Нужно тихое место для созвона или командного кода? 🛋
          Выбирай свободный слот на сегодня.

          📅 *Сегодня:* `{current_date}`
          ---
          {free_slots_list}
        en: |
          💬 *Rooms: {my_campus}*

          Need a quiet spot for a call or group coding? 🛋
          Pick an available slot for today.

          📅 *Today:* `{current_date}`
          ---
          {free_slots_list}
      image: "{schedule_image}"
      buttons:
        - id: slot_{room_id}_{time}
          label: "⚡ {time} | {room_name}"
        - id: select_date
          label:
            ru: 🗓 Выбрать другой день
            en: 🗓 Select another day
          row: 1
          next_state: SELECT_DATE
        - id: my_bookings
          label:
            ru: 👤 Мои брони
            en: 👤 My bookings
          row: 1
          next_state: FETCH_MY_BOOKINGS
        - id: back
          label:
            ru: 🏠 В главное меню
            en: 🏠 Main menu
          next_state: MAIN_MENU
    transitions:
      - trigger: button_click
        condition: id.startswith('slot_')
        next_state: SELECT_DURATION

  SELECT_DATE:
    type: interactive
    description: Календарная навигация
    interface:
      text:
        ru: |
          📅 *Планируем заранее*

          Выбрана дата: *{selected_date}*
          Вот список доступных комнат:
          ---
          {free_slots_list}
        en: |
          📅 *Planning ahead*

          Date selected: *{selected_date}*
          Available rooms:
          ---
          {free_slots_list}
      image: "{schedule_image}"
      buttons:
        - id: slot_{room_id}_{time}
          label: "{time} — {room_name}"
        - id: prev_day
          label: "⬅️"
          next_state: SELECT_DATE
          row: 1
        - id: next_day
          label: "➡️"
          next_state: SELECT_DATE
          row: 1
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: BOOKING_MENU
    transitions:
      - trigger: button_click
        condition: id.startswith('slot_')
        next_state: SELECT_DURATION

  SELECT_DURATION:
    type: interactive
    description: Выбор длительности сессии
    interface:
      text:
        ru: |
          ⏱ *Сколько времени нужно?*

          📍 Комната: *{room_name}*
          🕔 Начало: `{time}`
          ---
          ℹ️ Лимиты бронирования: {min_duration}–{max_duration} мин.
        en: |
          ⏱ *Duration of stay?*

          📍 Room: *{room_name}*
          🕔 Start: `{time}`
          ---
          ℹ️ Booking limits: {min_duration}–{max_duration} min.
      buttons:
        - id: duration_30
          label: "30 мин"
          next_state: CONFIRM_BOOKING
        - id: duration_60
          label: "60 мин"
          next_state: CONFIRM_BOOKING
        - id: back
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: BOOKING_MENU

  CONFIRM_BOOKING:
    type: interactive
    description: Финальная проверка данных
    interface:
      text:
        ru: |
          📝 *Всё верно?*

          📍 *{room_name}*
          🗓 {selected_date}
          🕔 В *{selected_time}*
          ⏳ На {duration} минут
          ---
          Подтверждаешь бронирование?
        en: |
          📝 *Double check*

          📍 *{room_name}*
          🗓 {selected_date}
          🕔 At *{selected_time}*
          ⏳ For {duration} minutes
          ---
          Confirm booking?
      buttons:
        - id: confirm
          label:
            ru: ✅ Да, бронируем
            en: ✅ Yes, book it
          next_state: COMMIT_BOOKING
        - id: cancel
          label:
            ru: ❌ Нет, назад
            en: ❌ No, go back
          next_state: BOOKING_MENU

  COMMIT_BOOKING:
    type: system
    description: Запись в базу данных
    logic:
      action: create_booking
      payload:
        room_id: $context.room_id
        date: $context.date
        time: $context.time
        duration: $context.duration
    transitions:
      - condition: success == true
        next_state: COMPLETED
      - condition: success == false
        next_state: ERROR_SLOT_ALREADY_TAKEN

  ERROR_SLOT_ALREADY_TAKEN:
    type: interactive
    description: Ошибка занятого слота (Race Condition)
    interface:
      text:
        ru: |
          🐢 *Упс, опоздал!*

          Пока ты выбирал, кто-то другой успел занять этот слот.
          Пиры не спят! 🏎

          Выбери другое время или комнату.
        en: |
          🐢 *Too slow!*

          While you were choosing, another peer grabbed this slot.
          Peers are fast! 🏎

          Please try another time or room.
      buttons:
        - id: refresh
          label:
            ru: 🔄 Обновить расписание
            en: 🔄 Refresh schedule
          next_state: BOOKING_MENU

  FETCH_MY_BOOKINGS:
    type: system
    description: Загрузка бронирований пользователя
    logic:
      action: get_user_bookings
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: MY_BOOKINGS

  MY_BOOKINGS:
    type: interactive
    description: Список активных броней пользователя
    interface:
      text:
        ru: |
          👤 *Твои бронирования*

          Вот слоты, которые закреплены за тобой:
          ---
          {my_bookings_list}
        en: |
          👤 *Your bookings*

          Here are the slots reserved for you:
          ---
          {my_bookings_list}
      buttons:
        - id: cancel_{booking_id}
          label:
            ru: 🗑 Отменить бронь
            en: 🗑 Cancel booking
        - id: back
          label:
            ru: 🏠 В меню
            en: 🏠 To menu
          next_state: BOOKING_MENU

  COMPLETED:
    type: interactive
    description: Успешный результат
    interface:
      text:
        ru: |
          🎉 *Готово!*

          Переговорка *{room_name}* твоя на *{time}*.

          Не забудь убрать за собой и оставить место чистым для следующего пира.
          Удачной работы! 👨‍💻
        en: |
          🎉 *Confirmed!*

          Room *{room_name}* is yours at *{time}*.

          Please remember to leave the room tidy for the next peer.
          Have a productive session! 👨‍💻
      buttons:
        - id: menu
          label:
            ru: 🏠 В главное меню
            en: 🏠 Main menu
          next_state: MAIN_MENU
