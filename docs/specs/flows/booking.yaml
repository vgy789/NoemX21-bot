---
meta:
  feature_id: BOOK-001
  name: Бронирование переговорок
  description: Система бронирования слотов в кампусе (Friendly UI)
  version: 2.0.0

initial_state: BOOKING_MENU
states:
  BOOKING_MENU:
    type: interactive
    description: Главное меню (Слоты на сегодня)
    interface:
      text:
        ru: |
          💬 *Бронирование переговорок*

          Нужно тихое место для созвона или командной работы? 🛋

          Ниже список свободных слотов на *сегодня* `{current_date}`:
          {free_slots_list}
        en: |
          💬 *Booking rooms*

          Need a quiet place for a call or teamwork? 🛋

          Below are available slots for *today* `{current_date}`:
          {free_slots_list}
      image: "{schedule_image}"
      buttons:
        - id: slot_{room_id}_{time}
          label: "⚡ {time} | {room_name}"
          next_state: SELECT_DURATION
        - id: tomorrow
          label:
            ru: 🗓 Посмотреть на завтра
            en: 🗓 Check tomorrow
          next_state: SELECT_DATE
        - id: back
          label:
            ru: 🏠 Назад
            en: 🏠 Back
          next_state: main_menu.yaml/MAIN_MENU

  SELECT_DATE:
    type: interactive
    description: Навигация по датам
    interface:
      text:
        ru: |
          🗓 *Планируем заранее*

          Выбрана дата: *{selected_date}*
          Вот что свободно:
          {free_slots_list}
        en: |
          🗓 *Planning ahead*

          Selected date: *{selected_date}*
          Here is what's available:
          {free_slots_list}
      image: "{schedule_image}"
      buttons:
        - id: slot_{room_id}_{time}
          label: "{time} - {room_name}"
          next_state: SELECT_DURATION
        - id: prev_day
          label: ⬅️
          next_state: SELECT_DATE
        - id: next_day
          label: ➡️
          next_state: SELECT_DATE
        - id: back
          label:
            ru: ⬅️ Назад
            en: ⬅️ Back
          next_state: BOOKING_MENU

  SELECT_DURATION:
    type: interactive
    description: Выбор длительности
    interface:
      text:
        ru: |
          ⏱ *Сколько времени нужно?*

          Комната: *{room_name}*
          Начало: {time}

          ℹ️ Лимиты брони: {min_duration} - {max_duration} мин.
        en: |
          ⏱ *How much time do you need?*

          Room: *{room_name}*
          Start: {time}

          ℹ️ Limits: {min_duration} - {max_duration} min.
      buttons:
        - id: duration_15
          label: 15 min
          next_state: CONFIRM_BOOKING
        - id: duration_30
          label: 30 min
          next_state: CONFIRM_BOOKING
        - id: duration_45
          label: 45 min
          next_state: CONFIRM_BOOKING
        - id: duration_60
          label: 60 min
          next_state: CONFIRM_BOOKING
        - id: back
          label:
            ru: ⬅️ Отмена
            en: ⬅️ Cancel
          next_state: BOOKING_MENU
    on_enter: fetch_room_constraints

  CONFIRM_BOOKING:
    type: interactive
    description: Финальное подтверждение
    interface:
      text:
        ru: |
          📝 *Всё верно?*

          📍 *{room_name}*
          🗓 {selected_date} в *{selected_time}*
          ⏳ Длительность: {duration} мин

          Бронируем?
        en: |
          📝 *Is this correct?*

          📍 *{room_name}*
          🗓 {selected_date} at *{selected_time}*
          ⏳ Duration: {duration} min

          Book it?
      buttons:
        - id: confirm
          label:
            ru: ✅ Да, бронируем
            en: ✅ Yes, book it
          next_state: COMMIT_BOOKING
        - id: cancel
          label:
            ru: ❌ Нет, передумал
            en: ❌ No, changed mind
          next_state: BOOKING_MENU

  COMMIT_BOOKING:
    type: system
    description: Системное действие создания брони
    logic:
      action: create_booking
      payload:
        room_id: $context.room_id
        date: $context.date
        time: $context.time
        duration: $context.duration
    transitions:
      - condition: success == true
        next_state: COMPLETED
      - condition: success == false
        next_state: ERROR_SLOT_ALREADY_TAKEN

  ERROR_SLOT_ALREADY_TAKEN:
    type: interactive
    description: Ошибка Race Condition
    interface:
      text:
        ru: |
          🐢 *Упс, опоздал!*

          Пока ты выбирал, кто-то другой успел занять этот слот.
          Попробуй выбрать другое время или комнату.
        en: |
          🐢 *Oops, too slow!*

          While you were choosing, someone else booked this slot.
          Try picking another time or room.
      buttons:
        - id: refresh
          label:
            ru: 🔄 Обновить расписание
            en: 🔄 Refresh schedule
          next_state: BOOKING_MENU

  COMPLETED:
    type: final
    description: Успешный финал
    interface:
      text:
        ru: |
          🎉 *Готово!*

          Переговорка *{room_name}* забронирована на *{time}*.
          Продуктивной работы! 👨‍💻
        en: |
          🎉 *All set!*

          Room *{room_name}* is booked for *{time}*.
          Have a productive session! 👨‍💻
    transitions:
      - next_state: main_menu.yaml/MAIN_MENU
