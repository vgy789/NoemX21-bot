---
meta:
  feature_id: BOOK-001
  name: Бронирование
  description: 'Обновленный флоу с контекстом, гибридным вводом и умной отменой'
  version: 4.0.0

initial_state: BOOKING_DASHBOARD

states:
  # --- ГЛАВНЫЙ ЭКРАН (DASHBOARD) ---
  BOOKING_DASHBOARD:
    type: interactive
    description: Контекст пользователя и главные пути бронирования
    on_enter:
      - action: get_dashboard_data
        payload:
          campus_id: $context.campus_id
          reset: true
    interface:
      text:
        ru: "{dashboard_text}"
        en: "{dashboard_text_en}"
      image: "{dashboard_visualization}"
      buttons:
        - id: "{primary_button_id}"
          label: "{primary_button_label}"
          row: 1
          next_state: "{primary_button_next_state}"
          
        - id: select_schedule
          label:
            ru: 📅 Забронировать на потом
            en: 📅 Book for later
          row: 2
          next_state: SELECT_FULL_SCHEDULE
          
        - id: "{smart_release_id}"
          label: "{smart_release_label}"
          row: 3
          next_state: CONFIRM_EARLY_RELEASE
          
        - id: my_bookings
          label:
            ru: 👤 Мои брони ({bookings_count})
            en: 👤 My bookings ({bookings_count})
          row: 4
          next_state: FETCH_MY_BOOKINGS
          
        - id: main_menu
          label:
            ru: 🏠 Главное меню
            en: 🏠 Main menu
          row: 4
          next_state: MAIN_MENU

  # --- ГИБРИДНЫЙ ЭКРАН (БЫСТРАЯ БРОНЬ) ---
  FAST_BOOK_DURATION:
    type: interactive
    description: Запрос длительности для ближайшей комнаты (кнопки или текст)
    on_enter:
      - action: find_nearest_room
    interface:
      text:
        ru: |
          📍 Комната «{room_name}» (ближайшая к вам) сейчас свободна.

          На сколько минут бронируем?
          Нажми кнопку или просто отправь мне числом нужное количество минут (например, 45).
        en: |
          📍 Room "{room_name}" is free right now.

          For how many minutes?
          Tap a button or type the number of minutes (e.g., 45).
      image: "{dashboard_visualization}"
      buttons:
        - id: set_15_min
          label: 15 мин
          row: 1
          next_state: COMMIT_FAST_BOOK
          action: process_duration_input
        - id: set_30_min
          label: 30 мин
          row: 1
          next_state: COMMIT_FAST_BOOK
          action: process_duration_input
        - id: set_60_min
          label: 1 час
          row: 2
          next_state: COMMIT_FAST_BOOK
          action: process_duration_input
        - id: set_120_min
          label: 2 часа
          row: 2
          next_state: COMMIT_FAST_BOOK
          action: process_duration_input
        - id: back
          label: 🔙 Назад
          row: 3
          next_state: BOOKING_DASHBOARD
    transitions:
      - trigger: message
        condition: is_numeric(message.text)
        action: process_duration_input
        next_state: COMMIT_FAST_BOOK
      - trigger: message
        condition: not is_numeric(message.text)
        next_state: FAST_BOOK_ERROR_NONDIGIT

  # КРАЙНИЕ СЛУЧАИ ДЛЯ ТЕКСТОВОГО ВВОДА (ОШИБКИ)
  FAST_BOOK_ERROR_NONDIGIT:
    type: interactive
    interface:
      text:
        ru: |
          🤔 Я понимаю только цифры. Пожалуйста, отправь количество минут числом (например: 30) или нажми на кнопку ниже.
        en: |
          🤔 I only understand numbers. Please send the number of minutes (e.g., 30) or tap a button below.
      buttons:
        - id: set_30_min
          label: 30 мин
          row: 1
          next_state: COMMIT_FAST_BOOK
          action: process_duration_input
        - id: set_60_min
          label: 60 мин
          row: 1
          next_state: COMMIT_FAST_BOOK
          action: process_duration_input
        - id: set_60_min_alt
          label: 1 час
          row: 1
          next_state: COMMIT_FAST_BOOK
          action: process_duration_input

  FAST_BOOK_ERROR_LIMIT:
    type: interactive
    interface:
      text:
        ru: |
          ⚠️ У нас действует лимит: переговорку можно занять максимум на 120 минут подряд, чтобы всем хватило места.

          Введи число до 120 или выбери вариант:
        en: |
          ⚠️ We have a limit: maximum 120 minutes per booking to ensure availability for everyone.

          Enter a number up to 120 or select:
      buttons:
        - id: set_30_min
          label: 30 мин
          row: 1
          next_state: COMMIT_FAST_BOOK
          action: process_duration_input
        - id: set_60_min
          label: 60 мин
          row: 1
          next_state: COMMIT_FAST_BOOK
          action: process_duration_input
        - id: set_120_min
          label: 120 мин
          row: 1
          next_state: COMMIT_FAST_BOOK
          action: process_duration_input

  FAST_BOOK_ERROR_OVERLAP:
    type: interactive
    interface:
      text:
        ru: |
          ⏱ {room_name} свободна только на ближайшие {available_minutes} минут (в {next_booking_time} туда придут коллеги).

          Забронировать на доступные {available_minutes} минут?
        en: |
          ⏱ {room_name} is only free for the next {available_minutes} minutes (colleagues arriving at {next_booking_time}).

          Book for the available {available_minutes} minutes?
      buttons:
        - id: confirm_available
          label: ✅ Да, занять на {available_minutes} мин
          row: 1
          next_state: COMMIT_FAST_BOOK
        - id: search_other
          label: 🔍 Найти другую комнату на {requested_minutes} мин
          row: 2
          next_state: FIND_OTHER_ROOM

  FIND_OTHER_ROOM:
    type: system
    logic:
      action: find_room_by_duration
    transitions:
      - next_state: FAST_BOOK_DURATION # Loop back to room confirmation with new room

  # ЛОГИКА ЗАПИСИ И УСПЕХ БЫСТРОЙ БРОНИ
  COMMIT_FAST_BOOK:
    type: system
    logic:
      action: create_booking_with_duration
      payload:
        room_id: $context.room_id
        duration: $context.duration
    transitions:
      - condition: success == true
        next_state: COMPLETED
      - condition: error == 'limit_exceeded'
        next_state: FAST_BOOK_ERROR_LIMIT
      - condition: error == 'overlap'
        next_state: FAST_BOOK_ERROR_OVERLAP
      - condition: success == false
        next_state: BOOKING_DASHBOARD # Generic failure fallback

  COMPLETED:
    type: interactive
    interface:
      text:
        ru: |
          🎉 Бронь подтверждена!

          📍 Комната: {room_name}
          ⏳ Длительность: {duration} минут (произошло округление)
          🏁 Занято до: {end_time}
        en: |
          🎉 Booking confirmed!

          📍 Room: {room_name}
          ⏳ Duration: {duration} minutes (rounded)
          🏁 Booked until: {end_time}
      buttons:
        - id: cancel_this
          label: ❌ Отменить бронь
          row: 1
          next_state: CONFIRM_CANCEL_BOOKING
        - id: home
          label: 🏠 В главное меню
          row: 1
          next_state: MAIN_MENU

  # --- МОИ БРОНИ И ОТМЕНА ---
  FETCH_MY_BOOKINGS:
    type: system
    logic:
      action: get_user_bookings
    transitions:
      - next_state: MY_BOOKINGS_LIST

  MY_BOOKINGS_LIST:
    type: interactive
    interface:
      text:
        ru: |
          👤 Твои брони:

          🔥 СЕЙЧАС ИДЕТ:
          {active_bookings_list}

          🗓 БУДУЩИЕ:
          {future_bookings_list}
        en: |
          👤 Your bookings:

          🔥 ONGOING:
          {active_bookings_list}

          🗓 UPCOMING:
          {future_bookings_list}
      buttons:
        # Динамические кнопки генерируются из списка
        - id: "{finish_early_id}"
          label: "🏁 Завершить: {room_name}"
          row: 1
          next_state: CONFIRM_EARLY_RELEASE
        - id: "{cancel_future_id}"
          label: "❌ Отменить: {room_name} ({time})"
          row: 2
          next_state: CONFIRM_CANCEL_BOOKING
        - id: back_home
          label: 🏠 На главную
          row: 3
          next_state: BOOKING_DASHBOARD

  # Сценарий А: Закончить досрочно
  CONFIRM_EARLY_RELEASE:
    type: interactive
    interface:
      text:
        ru: |
          🏁 Подтверди завершение
          Вы освобождаете комнату {room_name} на {minutes_left} минут раньше срока?
        en: |
          🏁 Confirm check-out
          Are you leaving room {room_name} {minutes_left} minutes early?
      buttons:
        - id: confirm_release
          label: ✅ Да, я вышел
          row: 1
          next_state: PROCESS_EARLY_RELEASE
        - id: back_to_list
          label: 🔙 Назад к списку
          row: 1
          next_state: MY_BOOKINGS_LIST

  PROCESS_EARLY_RELEASE:
    type: system
    logic:
      action: release_booking_early
    transitions:
      - next_state: RELEASE_SUCCESS

  RELEASE_SUCCESS:
    type: interactive
    interface:
      text:
        ru: |
          🎉 Готово! Переговорка свободна.
          Спасибо, что заботишься о коллегах.
          Твоя карма выросла на +1 🌟
        en: |
          🎉 Done! Room is released.
          Thanks for caring about colleagues.
          Your karma increased by +1 🌟
      buttons:
        - id: back_home
          label: 🏠 В начало
          row: 1
          next_state: BOOKING_DASHBOARD

  # Сценарий Б: Отмена будущей записи
  CONFIRM_CANCEL_BOOKING:
    type: interactive
    interface:
      text:
        ru: |
          ❌ Отменить бронь в «{room_name}»?

          📅 {date}
          ⏰ {time_start} — {time_end}
        en: |
          ❌ Cancel booking for "{room_name}"?

          📅 {date}
          ⏰ {time_start} — {time_end}
      buttons:
        - id: confirm_cancel
          label: 🔥 Да, отменить
          row: 1
          next_state: PROCESS_CANCEL_BOOKING
        - id: back_to_list
          label: 🔙 Назад к списку
          row: 1
          next_state: MY_BOOKINGS_LIST

  PROCESS_CANCEL_BOOKING:
    type: system
    logic:
      action: cancel_booking
    transitions:
      - next_state: CANCEL_SUCCESS

  CANCEL_SUCCESS:
    type: interactive
    interface:
      text:
        ru: |
          ✅ Бронирование отменено.
          Слот снова доступен для коллег.
        en: |
          ✅ Booking cancelled.
          The slot is available for colleagues again.
      buttons:
        - id: book_more
          label: ➕ Забронировать ещё
          row: 1
          next_state: SELECT_FULL_SCHEDULE
        - id: back_home
          label: 🔙 В начало
          row: 1
          next_state: BOOKING_DASHBOARD

  # --- ПОЛНОЕ РАСПИСАНИЕ ---
  SELECT_FULL_SCHEDULE:
    type: interactive
    description: Календарь и полный список
    on_enter:
      - action: get_booking_data
    interface:
      text:
        ru: |
          📅 *Планировщик*
          Дата: *{selected_date}*
          
          Выбери комнату и время старта:
        en: |
          📅 *Planner*
          Date: *{selected_date}*
          
          Choose room and start time:
      image: "{dashboard_visualization}"
      buttons:
        - id: prev_day
          label: "⬅️ {prev_date_short}"
          row: 0
          next_state: UPDATE_CALENDAR_PREV
        - id: next_day
          label: "{next_date_short} ➡️"
          row: 0
          next_state: UPDATE_CALENDAR_NEXT
        - id: back
          label: "🔙 Назад"
          row: 1
          next_state: BOOKING_DASHBOARD
