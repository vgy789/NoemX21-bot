---
meta:
  feature_id: BOOK-001
  name: Бронирование
  description: 'Оптимизированный процесс с быстрым подтверждением'
  version: 3.0.0

initial_state: BOOKING_DASHBOARD

states:
  # --- ГЛАВНЫЙ ЭКРАН (DASHBOARD) ---
  BOOKING_DASHBOARD:
    type: interactive
    description: Сводка состояния + Быстрые слоты
    on_enter:
      - action: get_dashboard_data
        payload:
          campus_id: $context.campus_id
          reset: true
    interface:
      text:
        ru: |
          🏢 *Кампус: {my_campus}*

          🟢 Свободно комнат: **{free_rooms_count}**
          🔴 Занято сейчас: **{busy_rooms_count}**

          {my_active_bookings_block}👇 *Ближайшие свободные слоты (нажми, чтобы забрать):*
          ---
          {hot_slots_list}
        en: |
          🏢 *Campus: {my_campus}*

          🟢 Free rooms: **{free_rooms_count}**
          🔴 Busy now: **{busy_rooms_count}**

          {my_active_bookings_block}👇 *Hot slots (tap to book):*
          ---
          {hot_slots_list}
      image: "{dashboard_visualization}" # Визуальная карта занятости
      buttons:
        # Динамические кнопки "Горячих слотов"
        - id: "{slot_id_1}"
          label: "{slot_label_1}"
          row: 1
          next_state: CONFIRM_FAST
        - id: "{slot_id_2}"
          label: "{slot_label_2}"
          row: 1
          next_state: CONFIRM_FAST
        - id: "{slot_id_3}"
          label: "{slot_label_3}"
          row: 1
          next_state: CONFIRM_FAST
        - id: "{slot_id_4}"
          label: "{slot_label_4}"
          row: 2
          next_state: CONFIRM_FAST
        - id: "{slot_id_5}"
          label: "{slot_label_5}"
          row: 2
          next_state: CONFIRM_FAST
        - id: "{slot_id_6}"
          label: "{slot_label_6}"
          row: 2
          next_state: CONFIRM_FAST
        - id: "{slot_id_7}"
          label: "{slot_label_7}"
          row: 3
          next_state: CONFIRM_FAST
        - id: "{slot_id_8}"
          label: "{slot_label_8}"
          row: 3
          next_state: CONFIRM_FAST
        - id: "{slot_id_9}"
          label: "{slot_label_9}"
          row: 3
          next_state: CONFIRM_FAST

        # Статичное меню управления
        - id: open_calendar
          label:
            ru: 📅 Выбрать другую дату/время
            en: 📅 Pick another date/time
          row: 5
          next_state: SELECT_FULL_SCHEDULE
        
        - id: my_bookings
          label:
            ru: 👤 Мои брони
            en: 👤 My bookings
          row: 5
          next_state: FETCH_MY_BOOKINGS
          
        - id: refresh
          label: 🔄
          row: 6
          next_state: BOOKING_DASHBOARD

        - id: back
          label:
            ru: 🏠 Главное меню
            en: 🏠 Main menu
          row: 6
          next_state: MAIN_MENU

    transitions:
      - trigger: button_click
        condition: id.startswith('slot_')
        next_state: CONFIRM_FAST

  # --- ПОЛНОЕ РАСПИСАНИЕ (ЕСЛИ НЕ УСТРОИЛИ БЫСТРЫЕ СЛОТЫ) ---
  SELECT_FULL_SCHEDULE:
    type: interactive
    description: Календарь и полный список
    interface:
      text:
        ru: |
          📅 *Планировщик*
          Дата: *{selected_date}*
          
          Выбери комнату и время старта:
        en: |
          📅 *Planner*
          Date: *{selected_date}*
          
          Choose room and start time:
      buttons:
        # Навигация по датам
        - id: prev_day
          label: "⬅️ {prev_date_short}"
          row: 0
          next_state: UPDATE_CALENDAR_PREV
        - id: next_day
          label: "{next_date_short} ➡️"
          row: 0
          next_state: UPDATE_CALENDAR_NEXT
          
        # Список всех слотов
        - id: "{slot_id_1}"
          label: "{time} — {room_name}"
        - id: "{slot_id_2}"
          label: "{time} — {room_name}"
        # ... (список генерируется)

        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: BOOKING_DASHBOARD
    transitions:
      - trigger: button_click
        condition: id.startswith('slot_')
        next_state: CONFIRM_FAST

  # --- ГИБРИДНЫЙ ЭКРАН (ВЫБОР ДЛИТЕЛЬНОСТИ + ПОДТВЕРЖДЕНИЕ) ---
  CONFIRM_FAST:
    type: interactive
    description: Финальный аккорд. Выбор длительности СРАЗУ бронирует.
    on_enter:
      - action: resolve_slot_from_last_input
        payload:
          last_input: $context.last_input
          
    interface:
      text:
        ru: |
          ⚡️ *Почти готово!*
          
          📍 Комната: **{room_name}**
          🕔 Начало: **{start_time}**
          
          На сколько занимаем? (Нажми кнопку для подтверждения)
        en: |
          ⚡️ *Almost done!*
          
          📍 Room: **{room_name}**
          🕔 Start: **{start_time}**
          
          How long? (Tap to confirm booking)
      buttons:
        - id: book_30
          label:
            ru: ✅ На 30 мин
            en: ✅ For 30 min
          row: 1
          next_state: COMMIT_BOOKING_30
          
        - id: book_60
          label:
            ru: ✅ На 1 час
            en: ✅ For 1 hour
          row: 1
          next_state: COMMIT_BOOKING_60
          
        - id: cancel
          label:
            ru: ❌ Отмена
            en: ❌ Cancel
          row: 2
          next_state: BOOKING_DASHBOARD

  # --- ЛОГИКА ЗАПИСИ (Разделена для передачи параметра duration) ---
  COMMIT_BOOKING_30:
    type: system
    logic:
      action: create_booking
      payload:
        campus_id: $context.campus_id
        room_id: $context.room_id
        time: $context.time
        duration: 30
    transitions:
      - condition: success == true
        next_state: COMPLETED
      - condition: success == false
        next_state: ERROR_SLOT_RACE

  COMMIT_BOOKING_60:
    type: system
    logic:
      action: create_booking
      payload:
        campus_id: $context.campus_id
        room_id: $context.room_id
        time: $context.time
        duration: 60
    transitions:
      - condition: success == true
        next_state: COMPLETED
      - condition: conflict == true
        next_state: ERROR_CONFLICT
      - condition: success == false
        next_state: ERROR_SLOT_RACE

  # --- ОШИБКА (RACE CONDITION) ---
  ERROR_SLOT_RACE:
    type: interactive
    description: Умная обработка ошибки
    interface:
      text:
        ru: |
          🏎 *Слот перехватили!*

          Пока мы думали, {room_name} на {time} заняли.
          Но я обновил данные. Попробуем соседнюю?
        en: |
          🏎 *Too slow!*

          {room_name} at {time} was just taken.
          I've refreshed the data. Try the one next door?
      buttons:
        - id: to_dashboard
          label:
            ru: 🔄 Показать, что осталось
            en: 🔄 Show available
          next_state: BOOKING_DASHBOARD

  # --- ОШИБКА (КОНФЛИКТ) ---
  ERROR_CONFLICT:
    type: interactive
    description: Обработка конфликта бронирования
    interface:
      text:
        ru: |
          ⛔️ *Это время уже занято*

          {room_name} на {time} уже забронировано.
          Выберите другое время.
        en: |
          ⛔️ *This slot is taken*

          {room_name} at {time} is already booked.
          Please choose another time.
      buttons:
        - id: to_dashboard
          label:
            ru: 🔄 Выбрать другое время
            en: 🔄 Choose another time
          next_state: BOOKING_DASHBOARD

  # --- УСПЕХ ---
  COMPLETED:
    type: interactive
    interface:
      text:
        ru: |
          🎉 *Бронь подтверждена!*
          
          📍 **{room_name}**
          ⏰ {time_interval}
          
          Продуктивной работы!
        en: |
          🎉 *Booking Confirmed!*
          
          📍 **{room_name}**
          ⏰ {time_interval}
          
          Have a great session!
      buttons:
        - id: home
          label:
            ru: 👌 Спасибо
            en: 👌 Thanks
          next_state: BOOKING_DASHBOARD

  # --- МОИ БРОНИ (Стандартный блок) ---
  FETCH_MY_BOOKINGS:
    type: system
    logic:
      action: get_user_bookings
    transitions:
      - next_state: MY_BOOKINGS_LIST

  MY_BOOKINGS_LIST:
    type: interactive
    interface:
      text:
        ru: |
          👤 Твои активные записи:

          {my_bookings_formatted}
        en: |
          👤 Your active slots:

          {my_bookings_formatted}
      buttons:
        # Динамические кнопки отмены (генерируются в get_user_bookings)
        - id: "{cancel_id_1}"
          label: "{cancel_label_1}"
          row: 1
          next_state: CANCEL_BOOKING
        - id: "{cancel_id_2}"
          label: "{cancel_label_2}"
          row: 1
          next_state: CANCEL_BOOKING
        - id: "{cancel_id_3}"
          label: "{cancel_label_3}"
          row: 2
          next_state: CANCEL_BOOKING
        - id: "{cancel_id_4}"
          label: "{cancel_label_4}"
          row: 2
          next_state: CANCEL_BOOKING
        - id: "{cancel_id_5}"
          label: "{cancel_label_5}"
          row: 2
          next_state: CANCEL_BOOKING

        - id: back
          label:
            ru: "🔙 Назад"
            en: "🔙 Back"
          row: 4
          next_state: BOOKING_DASHBOARD

  # --- ОБРАБОТКА ОТМЕНЫ БРОНИРОВАНИЯ ---
  CANCEL_BOOKING:
    type: system
    logic:
      action: cancel_booking
    transitions:
      - next_state: FETCH_MY_BOOKINGS
