initial_state: BOOKING_DASHBOARD

states:
  BOOKING_DASHBOARD:
    type: interactive
    on_enter:
      - action: get_dashboard_data
        payload:
          campus_id: $context.campus_id
    interface:
      image: "{dashboard_visualization}"
      text:
        ru: |
          *Твои планы и брони*

          {dashboard_text}
        en: |
          *Your plans and bookings*

          {dashboard_text}
      buttons:
        - id: book_now
          label:
            ru: "⚡️ Занять сейчас"
            en: "⚡️ Claim now"
          row: 1
          next_state: BOOKING_ROOM_SELECTION
        - id: plan_ahead
          label:
            ru: "📅 На будущее"
            en: "📅 Plan ahead"
          row: 1
          next_state: BOOKING_PLAN_DAY
        - id: rules
          label:
            ru: "📜 Кодекс переговорок"
            en: "📜 Meeting Code"
          row: 2
          next_state: BOOKING_RULES
        - id: my_bookings
          label:
            ru: "✨ Мои брони ({bookings_count})"
            en: "✨ My bookings ({bookings_count})"
          row: 2
          next_state: FETCH_MY_BOOKINGS
        - id: main_menu
          label:
            ru: 🏠 На главную
            en: 🏠 Main menu
          row: 3
          next_state: MAIN_MENU

  BOOKING_RULES:
    type: interactive
    description: Кодекс поведения в переговорках
    interface:
      text:
        ru: |
          📜 *Утиный кодекс переговорок* 🦆

          Чтобы в кампусе царил мир и порядок, соблюдай эти простые правила:

          1️⃣ *Не бронируй «вхолостую»*
          Занял – приди. Если планы изменились, отмени бронь в «Мои брони», чтобы другие утки могли посетить переговорку.

          2️⃣ *Уважай границы времени*
          Твой слот заканчивается – освободи место. Другой пир может ждать под дверью с горящим дедлайном.

          3️⃣ *Чистота – залог кря-соты*
          Не кушай внутри. Уважай пространство: ни крошек, ни пятен, ни лишних запахов.

          4️⃣ *Тишина в камышах*
          Переговорки не герметичны. Старайся не крякать слишком громко, чтобы не пугать пиров в кластерах.

          ⚠️ Взятие переговорок сейчас полноценно не работает: нужен отдельный процесс согласования с администрацией школы.
          Функция может быть одобрена, если бронирование будет доступно и в Rocket.Chat.
          Для этого нужен отдельный аккаунт бота в Rocket.Chat, но по запросу на аккаунт уже 2 месяца нет ответа.
          Сейчас в этом боте можно бронировать/отменять переговорки только в режиме песочницы.
          Это не влияет на реальное бронирование, которое работает по правилам твоего кампуса.

          🗂 Список переговорок актуализируется через:
          `{bot_content_repo_link}`

          💡 _Помни: занял переговорку – не забудь прийти, иначе утки заклюют!_
        en: |
          📜 *The Duck Code of Meetings* 🦆

          To keep our pond peaceful and organized, please follow these simple rules:

          1️⃣ *No "ghost" booking*
          If you book it, show up. If your plans change, cancel it in "My Nest" so other ducks can use the spot.

          2️⃣ *Respect the clock*
          When your slot is over, leave promptly. Another peer might be waiting at the door with a burning deadline.

          3️⃣ *Cleanliness is quack-tastic*
          No eating inside. Respect the space: no crumbs, no stains, and no lingering smells.

          4️⃣ *Quiet in the reeds*
          Meeting rooms aren't soundproof. Try not to quack too loudly so you don't disturb peers in the clusters.

          ⚠️ Meeting-room booking is currently not fully operational: it requires approval from school administration.
          This feature may be approved if booking is also available in Rocket.Chat.
          For that, a dedicated Rocket.Chat bot account is required, but there has been no response to the account request for 2 months.
          Right now, this bot supports booking/canceling rooms in sandbox mode only.
          It does not affect real booking, which operates under your campus rules.

          🗂 Meeting rooms list is updated via:
          `{bot_content_repo_link}`

          💡 _Remember: if you book a room, show up, or the ducks will peck!_
      buttons:
        - id: back_to_dashboard
          label:
            ru: ✅ Понятно!
            en: ✅ Got it!
          next_state: BOOKING_DASHBOARD

  BOOKING_PLAN_DAY:
    type: interactive
    on_enter:
      - action: prepare_plan_day
        payload:
          campus_id: $context.campus_id
    interface:
      text:
        ru: |
          📅 *Выбираем день для брони*

          Когда тебе нужно место для важных кря-переговоров?
        en: |
          📅 *Choosing the booking day*

          When do you need a spot for important quack-talks?
      buttons:
        - id: "{plan_day_btn_id_1}"
          label: "{plan_day_btn_label_1}"
          row: 1
          next_state: BOOKING_PLAN_TIME
          action: plan_select_day
        - id: "{plan_day_btn_id_2}"
          label: "{plan_day_btn_label_2}"
          row: 2
          next_state: BOOKING_PLAN_TIME
          action: plan_select_day
        - id: "{plan_day_btn_id_3}"
          label: "{plan_day_btn_label_3}"
          row: 3
          next_state: BOOKING_PLAN_TIME
          action: plan_select_day
        - id: plan_day_back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 4
          next_state: BOOKING_DASHBOARD

  BOOKING_PLAN_TIME:
    type: interactive
    on_enter:
      - action: prepare_plan_time
        payload:
          campus_id: $context.campus_id
    interface:
      image: "{dashboard_visualization}"
      text:
        ru: |
          {plan_time_text}

          🕒 *Время – деньги (и знания!)*
          Во сколько планируешь начать?
          Введи `ЧЧ:ММ` или выбери готовый слот:
          {plan_time_error}
        en: |
          {plan_time_text}

          🕒 *Time is money (and wisdom!)*
          What time are you planning to start?
          Enter `HH:MM` or pick a slot:
          {plan_time_error}
      buttons:
        - id: "{plan_time_btn_id_1}"
          label: "{plan_time_btn_label_1}"
          row: 1
          next_state: BOOKING_PLAN_DURATION
          action: plan_process_time
        - id: "{plan_time_btn_id_2}"
          label: "{plan_time_btn_label_2}"
          row: 1
          next_state: BOOKING_PLAN_DURATION
          action: plan_process_time
        - id: "{plan_time_btn_id_3}"
          label: "{plan_time_btn_label_3}"
          row: 2
          next_state: BOOKING_PLAN_DURATION
          action: plan_process_time
        - id: plan_time_back
          label:
            ru: 🔙 К датам
            en: 🔙 To dates
          row: 3
          next_state: BOOKING_PLAN_DAY
    transitions:
      - trigger: message
        action: plan_process_time
        next_state: BOOKING_PLAN_DURATION

  BOOKING_PLAN_DURATION:
    type: interactive
    on_enter:
      - action: prepare_plan_duration
        payload:
          campus_id: $context.campus_id
    interface:
      image: "{dashboard_visualization}"
      text:
        ru: |
          {plan_duration_text}

          ⏳ *Надолго ли бронь?*
          Выбери длительность (или введи в минутах):
        en: |
          {plan_duration_text}

          ⏳ *How long is the booking?*
          Choose duration (or enter in minutes):
      buttons:
        - id: "{plan_dur_15_id}"
          label:
            ru: "15 мин."
            en: "15 min."
          row: 1
          next_state: BOOKING_PLAN_ROOMS
          action: plan_process_duration
        - id: "{plan_dur_30_id}"
          label:
            ru: "30 мин."
            en: "30 min."
          row: 1
          next_state: BOOKING_PLAN_ROOMS
          action: plan_process_duration
        - id: "{plan_dur_45_id}"
          label:
            ru: "45 мин."
            en: "45 min."
          row: 2
          next_state: BOOKING_PLAN_ROOMS
          action: plan_process_duration
        - id: "{plan_dur_60_id}"
          label:
            ru: "1 час"
            en: "1 hour"
          row: 2
          next_state: BOOKING_PLAN_ROOMS
          action: plan_process_duration
        - id: plan_duration_back
          label:
            ru: 🔙 Изменить время
            en: 🔙 Change time
          row: 3
          next_state: BOOKING_PLAN_TIME

  BOOKING_PLAN_ROOMS:
    type: interactive
    on_enter:
      - action: prepare_plan_rooms
        payload:
          campus_id: $context.campus_id
    interface:
      text:
        ru: |
          🦆 *Доступные заводи на это время:*

          {plan_rooms_text}
        en: |
          🦆 *Available ponds for this time:*

          {plan_rooms_text}
      buttons:
        - id: "{room_btn_id_1}"
          label: "{room_btn_label_1}"
          row: 1
          next_state: COMMIT_BOOKING
          action: plan_select_room
        - id: "{room_btn_id_2}"
          label: "{room_btn_label_2}"
          row: 2
          next_state: COMMIT_BOOKING
          action: plan_select_room
        - id: "{room_btn_id_3}"
          label: "{room_btn_label_3}"
          row: 3
          next_state: COMMIT_BOOKING
          action: plan_select_room
        - id: "{room_btn_id_4}"
          label: "{room_btn_label_4}"
          row: 4
          next_state: COMMIT_BOOKING
          action: plan_select_room
        - id: "{room_btn_id_5}"
          label: "{room_btn_label_5}"
          row: 5
          next_state: COMMIT_BOOKING
          action: plan_select_room
        - id: "{room_btn_id_6}"
          label: "{room_btn_label_6}"
          row: 6
          next_state: COMMIT_BOOKING
          action: plan_select_room
        - id: "{room_btn_id_7}"
          label: "{room_btn_label_7}"
          row: 7
          next_state: COMMIT_BOOKING
          action: plan_select_room
        - id: "{room_btn_id_8}"
          label: "{room_btn_label_8}"
          row: 8
          next_state: COMMIT_BOOKING
          action: plan_select_room
        - id: plan_rooms_back
          label:
            ru: 🔙 Изменить длительность
            en: 🔙 Change duration
          row: 9
          next_state: BOOKING_PLAN_DURATION

  BOOKING_ROOM_SELECTION:
    type: interactive
    on_enter:
      - action: prepare_room_selection
        payload:
          campus_id: $context.campus_id
    interface:
      text:
        ru: |
          🛋 *Свободные комнаты*

          Какую переговорку займём прямо сейчас?
          {rooms_tui_list}
        en: |
          🛋 *Free rooms*

          Which meeting room shall we occupy right now?
          {rooms_tui_list}
      buttons:
        - id: "{room_btn_id_1}"
          label: "{room_btn_label_1}"
          row: 1
          next_state: BOOKING_DURATION_CHOICE
        - id: "{room_btn_id_2}"
          label: "{room_btn_label_2}"
          row: 2
          next_state: BOOKING_DURATION_CHOICE
        - id: "{room_btn_id_3}"
          label: "{room_btn_label_3}"
          row: 3
          next_state: BOOKING_DURATION_CHOICE
        - id: "{room_btn_id_4}"
          label: "{room_btn_label_4}"
          row: 4
          next_state: BOOKING_DURATION_CHOICE
        - id: "{room_btn_id_5}"
          label: "{room_btn_label_5}"
          row: 5
          next_state: BOOKING_DURATION_CHOICE
        - id: "{room_btn_id_6}"
          label: "{room_btn_label_6}"
          row: 6
          next_state: BOOKING_DURATION_CHOICE
        - id: "{room_btn_id_7}"
          label: "{room_btn_label_7}"
          row: 7
          next_state: BOOKING_DURATION_CHOICE
        - id: "{room_btn_id_8}"
          label: "{room_btn_label_8}"
          row: 8
          next_state: BOOKING_DURATION_CHOICE
        - id: back_dashboard
          label:
            ru: 🔙 К планам
            en: 🔙 To plans
          row: 9
          next_state: BOOKING_DASHBOARD

  BOOKING_DURATION_CHOICE:
    type: interactive
    on_enter:
      - action: prepare_duration_choice
        payload:
          campus_id: $context.campus_id
    interface:
      text:
        ru: |
          📍 *{selected_room_name}* свободна на _{max_gap} мин._
          {duration_text}

          ⏳ *На сколько бронируем?*
        en: |
          📍 *{selected_room_name}* is free for _{max_gap} min._
          {duration_text}

          ⏳ *For how long?*
      buttons:
        - id: "{duration_15_id}"
          label:
            ru: "15 мин."
            en: "15 min."
          row: 1
          next_state: COMMIT_BOOKING
          action: process_duration_input
        - id: "{duration_30_id}"
          label:
            ru: "30 мин."
            en: "30 min."
          row: 1
          next_state: COMMIT_BOOKING
          action: process_duration_input
        - id: "{duration_45_id}"
          label:
            ru: "45 мин."
            en: "45 min."
          row: 2
          next_state: COMMIT_BOOKING
          action: process_duration_input
        - id: "{duration_60_id}"
          label:
            ru: "1 час"
            en: "1 hour"
          row: 2
          next_state: COMMIT_BOOKING
          action: process_duration_input
        - id: "{duration_max_id}"
          label: "🚀 До упора ({max_gap} мин.)"
          row: 3
          next_state: COMMIT_BOOKING
          action: process_duration_input
        - id: back_rooms
          label:
            ru: 🔙 К списку комнат
            en: 🔙 To rooms
          row: 4
          next_state: BOOKING_ROOM_SELECTION
    transitions:
      - trigger: message
        condition: is_numeric(message.text)
        action: process_duration_input
        next_state: COMMIT_BOOKING
      - trigger: message
        condition: not is_numeric(message.text)
        next_state: BOOKING_DURATION_CHOICE

  COMMIT_BOOKING:
    type: system
    logic:
      action: create_booking_with_duration
      payload:
        campus_id: $context.campus_id
    transitions:
      - condition: success == true
        next_state: BOOKING_SUCCESS
      - condition: error == 'user_overlap'
        next_state: BOOKING_USER_OVERLAP
      - condition: error == 'user_booking_count_limit'
        next_state: BOOKING_USER_LIMIT_COUNT
      - condition: error == 'user_daily_limit'
        next_state: BOOKING_USER_LIMIT_DAILY
      - condition: error == 'conflict' && booking_mode == 'planned'
        next_state: BOOKING_PLAN_ROOMS
      - condition: error == 'conflict'
        next_state: BOOKING_CONFLICT
      - condition: error == 'invalid_duration' && booking_mode == 'planned'
        next_state: BOOKING_PLAN_DURATION
      - condition: error == 'invalid_duration'
        next_state: BOOKING_DURATION_CHOICE
      - next_state: BOOKING_CONFLICT

  BOOKING_SUCCESS:
    type: interactive
    interface:
      text:
        ru: |
          ✅ *Переговорка забронирована!*

          {selected_room_name} твоя до {booking_end_time}.
        en: |
          ✅ *Room booked!*

          {selected_room_name} is yours until {booking_end_time}."
      buttons:
        - id: done_to_dashboard
          label:
            ru: "📊 К дашборду"
            en: "📊 To Dashboard"
          row: 1
          next_state: BOOKING_DASHBOARD
        - id: done_to_my
          label:
            ru: "✨ Мои брони"
            en: "✨ My bookings"
          row: 1
          next_state: FETCH_MY_BOOKINGS

  BOOKING_CONFLICT:
    type: interactive
    interface:
      text:
        ru: |
          ❌ *Кря! Кто-то проплыл быстрее.*

          Пока ты выбирал, комнату уже заняли. Придётся искать другую переговорку.
        en: |
          ❌ *Quack! Someone swam faster.*

          While you were picking, the room was taken. Find another room.
      buttons:
        - id: find_other
          label:
            ru: "🔄 Попробовать другую"
            en: "🔄 Try another"
          row: 1
          next_state: BOOKING_ROOM_SELECTION
        - id: conflict_dashboard
          label:
            ru: "📊 К дашборду"
            en: "📊 Dashboard"
          row: 2
          next_state: BOOKING_DASHBOARD

  BOOKING_USER_OVERLAP:
    type: interactive
    interface:
      image: "{dashboard_visualization}"
      text:
        ru: |
          ❌ *Нельзя быть в двух одновременно!*

          На это время ты уже забронировал другое место. Так что сначала заверши прошлую бронь или выбери другой слот.
        en: |
          ❌ *You can't be in two places at once!*

          You already have a booking for this time. So finish your current booking or pick another slot.
      buttons:
        - id: user_overlap_my
          label:
            ru: "✨ Мои брони"
            en: "✨ My bookings"
          row: 1
          next_state: FETCH_MY_BOOKINGS
        - id: user_overlap_other
          label:
            ru: "🔙 Выбрать другую"
            en: "🔙 Choose another"
          row: 2
          next_state: BOOKING_ROOM_SELECTION

  BOOKING_USER_LIMIT_COUNT:
    type: interactive
    interface:
      text:
        ru: |
          ❌ *Слишком много гнёзд!*

          У тебя уже скопилось слишком много активных броней. Не жадничай, дай другим пирам тоже поработать.
          Чтобы создать новую, нужно освободить одну из старых.
        en: |
          ❌ *Too many nests!*

          You've reached the limit of active bookings. Don't be a hog, let other peers work too.
          To create a new one, you need to release one of your current spots.
      buttons:
        - id: user_limit_count_my
          label:
            ru: "✨ Мои брони"
            en: "✨ My bookings"
          row: 1
          next_state: FETCH_MY_BOOKINGS
        - id: user_limit_count_back
          label:
            ru: "🔙 Назад к выбору"
            en: "🔙 Back to choice"
          row: 2
          next_state: BOOKING_ROOM_SELECTION

  BOOKING_USER_LIMIT_DAILY:
    type: interactive
    interface:
      text:
        ru: |
          🛑 *Всё, наплавался!*

          Дневной лимит (3 часа) исчерпан. Позволь другим уткам тоже немного посидеть в тишене.
        en: |
          🛑 *Daily limit reached!*

          3-hour limit is up. Let other ducks enjoy the quiet.
      buttons:
        - id: user_limit_daily_my
          label:
            ru: "✨ Мои брони"
            en: "✨ My bookings"
          row: 1
          next_state: FETCH_MY_BOOKINGS
        - id: user_limit_daily_back
          label:
            ru: 🔙 К списку комнат
            en: 🔙 To rooms
          row: 2
          next_state: BOOKING_ROOM_SELECTION

  FETCH_MY_BOOKINGS:
    type: system
    logic:
      action: get_user_bookings
    transitions:
      - next_state: MY_BOOKINGS_LIST

  MY_BOOKINGS_LIST:
    type: interactive
    interface:
      text:
        ru: |
          *✨ Твои бронирования*

          {my_bookings_text}

          {my_bookings_hint_ru}
        en: |
          ✨ *Your bookings*

          {my_bookings_text}

          {my_bookings_hint_en}
      buttons:
        - id: "{booking_btn_id_1}"
          label: "❌ Отменить: {booking_btn_label_1}"
          row: 1
          next_state: PROCESS_MY_BOOKING
        - id: "{booking_btn_id_2}"
          label: "{booking_btn_label_2}"
          row: 2
          next_state: PROCESS_MY_BOOKING
        - id: "{booking_btn_id_3}"
          label: "{booking_btn_label_3}"
          row: 3
          next_state: PROCESS_MY_BOOKING
        - id: "{booking_btn_id_4}"
          label: "{booking_btn_label_4}"
          row: 4
          next_state: PROCESS_MY_BOOKING
        - id: "{booking_btn_id_5}"
          label: "{booking_btn_label_5}"
          row: 5
          next_state: PROCESS_MY_BOOKING
        - id: "{booking_btn_id_6}"
          label: "{booking_btn_label_6}"
          row: 6
          next_state: PROCESS_MY_BOOKING
        - id: "{booking_btn_id_7}"
          label: "{booking_btn_label_7}"
          row: 7
          next_state: PROCESS_MY_BOOKING
        - id: "{booking_btn_id_8}"
          label: "{booking_btn_label_8}"
          row: 8
          next_state: PROCESS_MY_BOOKING
        - id: my_back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 9
          next_state: BOOKING_DASHBOARD

  PROCESS_MY_BOOKING:
    type: system
    logic:
      action: cancel_booking
    transitions:
      - next_state: FETCH_MY_BOOKINGS
