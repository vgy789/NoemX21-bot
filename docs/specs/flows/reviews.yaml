          condition: "team_project_id_1 != ''"
          action: select_team_create_project
          next_state: CHECK_DUPLICATE_TEAM_REQUEST
          row: 1
        - id: "{team_project_id_2}"
          label: "{team_project_name_2} ({team_project_type_2})"
          condition: "team_project_id_2 != ''"
          action: select_team_create_project
          next_state: CHECK_DUPLICATE_TEAM_REQUEST
          row: 2
        - id: "{team_project_id_3}"
          label: "{team_project_name_3} ({team_project_type_3})"
          condition: "team_project_id_3 != ''"
          action: select_team_create_project
          next_state: CHECK_DUPLICATE_TEAM_REQUEST
          row: 3
        - id: "{team_project_id_4}"
          label: "{team_project_name_4} ({team_project_type_4})"
          condition: "team_project_id_4 != ''"
          action: select_team_create_project
          next_state: CHECK_DUPLICATE_TEAM_REQUEST
          row: 4
        - id: "{team_project_id_5}"
          label: "{team_project_name_5} ({team_project_type_5})"
          condition: "team_project_id_5 != ''"
          action: select_team_create_project
          next_state: CHECK_DUPLICATE_TEAM_REQUEST
