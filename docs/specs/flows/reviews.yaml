initial_state: PRR_MAIN_MENU

states:
  PRR_MAIN_MENU:
    type: interactive
    description: Главное меню Peer Review Helper
    on_enter:
      - action: school_api_get_participant_projects_in_reviews
        payload:
          participant_login: $context.my_s21login
      - action: db_get_my_prr_summary
        payload:
          user_id: $context.user_id
    interface:
      text:
        ru: |
          🤝 *Ревью проектов*

          _«Если дедлайн горит — значит, время крякать!»_

          {active_prr_notification}
        en: |
          🤝 *Project Reviews*

          _"If the deadline is burning — it's time to quack!"_

          {active_prr_notification}
      buttons:
        - id: list_all
          label:
            ru: 🔎 Найти кого поревьюить
            en: 🔎 Find someone to review
          next_state: GLOBAL_PRR_BOARD
          row: 1
        - id: create_new
          label:
            ru: ➕ Выставить свой проект
            en: ➕ Submit my project
          condition: "available_projects_count > 0"
          next_state: SELECT_PROJECT_FOR_PRR
          row: 2
        - id: create_new_disabled
          label:
            ru: ➕ Выставить свой проект
            en: ➕ Submit my project
          condition: "available_projects_count == 0"
          next_state: ERROR_NO_IN_REVIEWS_PROJECTS
          row: 2
        - id: my_requests
          label:
            ru: 📂 Мои запросы ({my_prr_count})
            en: 📂 My requests ({my_prr_count})
          action: reset_my_prr_page
          next_state: MY_PRR_LIST
          row: 2
        - id: back
          label:
            ru: 🏠 На главную
            en: 🏠 Main menu
          next_state: MAIN_MENU
          row: 3

  SELECT_PROJECT_FOR_PRR:
    type: interactive
    description: Выбор проекта для PRR из API /participants/{login}/projects?status=IN_REVIEWS
    on_enter:
      - action: prepare_available_projects_for_prr
        payload:
          page: $context.create_prr_projects_page
    interface:
      text:
        ru: |
          🦆 **Что отправляем на ревью?**

          Выбери проект, который нужно проверить. Я покажу его остальным пирам.

          {available_projects_list_hint}
        en: |
          🦆 **What are we reviewing?**

          Select the project you want to be reviewed. I'll broadcast it to other peers.

          {available_projects_list_hint}
      buttons:
        - id: "{project_id_1}"
          label: "{project_name_1} ({project_type_1})"
          condition: "project_id_1 != ''"
          action: select_project
          next_state: CHECK_DUPLICATE_PROJECT_PRR
          row: 1
        - id: "{project_id_2}"
          label: "{project_name_2} ({project_type_2})"
          condition: "project_id_2 != ''"
          action: select_project
          next_state: CHECK_DUPLICATE_PROJECT_PRR
          row: 2
        - id: "{project_id_3}"
          label: "{project_name_3} ({project_type_3})"
          condition: "project_id_3 != ''"
          action: select_project
          next_state: CHECK_DUPLICATE_PROJECT_PRR
          row: 3
        - id: "{project_id_4}"
          label: "{project_name_4} ({project_type_4})"
          condition: "project_id_4 != ''"
          action: select_project
          next_state: CHECK_DUPLICATE_PROJECT_PRR
          row: 4
        - id: "{project_id_5}"
          label: "{project_name_5} ({project_type_5})"
          condition: "project_id_5 != ''"
          action: select_project
          next_state: CHECK_DUPLICATE_PROJECT_PRR
          row: 5
        - id: prev_projects
          label:
            ru: ⬅️ Назад
            en: ⬅️ Back
          condition: "available_projects_has_prev_page == true"
          action: available_projects_prev_page
          next_state: SELECT_PROJECT_FOR_PRR
          row: 6
        - id: projects_page
          label:
            ru: "{available_projects_page_caption_ru}"
            en: "{available_projects_page_caption_en}"
          action: none
          row: 6
        - id: next_projects
          label:
            ru: Вперёд ➡️
            en: Next ➡️
          condition: "available_projects_has_next_page == true"
          action: available_projects_next_page
          next_state: SELECT_PROJECT_FOR_PRR
          row: 6
        - id: back
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: PRR_MAIN_MENU
          row: 7

  CHECK_DUPLICATE_PROJECT_PRR:
    type: system
    description: Нельзя создавать второй открытый PRR на тот же проект
    logic:
      action: db_check_open_prr_for_selected_project
      payload:
        user_id: $context.user_id
        project_id: $context.selected_project_id
    transitions:
      - condition: has_open_prr_for_selected_project == true
        next_state: ERROR_PRR_ALREADY_EXISTS_FOR_PROJECT
      - next_state: INPUT_TIME_AVAILABILITY

  INPUT_TIME_AVAILABILITY:
    type: input
    interface:
      text:
        ru: |
          ⏰ *Когда ты на связи?*

          Напиши честно, в какое время ты на связи и готов:а отвечать.

          💡 _Совет Утки: Пиши конкретно, например:_
          • «1 мая до 20:00, 2-го с утра»
          • «Прямо сейчас и ближайшие 2 часа»
          • «Завтра с 10:00 до 15:00 по МСК»
        en: |
          ⏰ *When are you online?*

          Be honest about when you're online and ready to respond.

          💡 _Duck's Tip: Be specific, e.g.:_
          • "May 1st until 8 PM, May 2nd in the morning"
          • "Right now and for the next 2 hours"
          • "Tomorrow from 10 AM – 3 PM (UTC+3)"
      buttons:
        - id: cancel
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: PRR_MAIN_MENU
          row: 1
    transitions:
      - trigger: on_input
        action: save_time_input
        next_state: CONFIRM_PRR_CREATION

  CONFIRM_PRR_CREATION:
    type: interactive
    interface:
      text:
        ru: |
          📝 *Сверяем координаты:*

          📁 Проект: *{selected_project_name}*
          ⏰ Время: `{create_prr_time_description}`
          🌐 Пояс: `{user_timezone_name}` (UTC{user_timezone_formatted})

          _Если всё верно – публикуем в эфир. Пиры увидят твой сигнал на радаре._
        en: |
          📝 *Final check:*

          📁 Project: *{selected_project_name}*
          ⏰ Time: `{create_prr_time_description}`
          🌐 Timezone: `{user_timezone_name}` (UTC{user_timezone_formatted})

          _If everything is correct – let's go live. Peers will see your signal on the radar._
      buttons:
        - id: confirm
          label:
            ru: ✅ Да, публикуем
            en: ✅ Yes, publish
          next_state: SAVE_PRR_SYSTEM
          row: 1
        - id: retry
          label:
            ru: ✍️ Изменить время
            en: ✍️ Edit time
          next_state: INPUT_TIME_AVAILABILITY
          row: 1
        - id: cancel
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: PRR_MAIN_MENU
          row: 2

  SAVE_PRR_SYSTEM:
    type: system
    logic:
      action: db_save_prr
    transitions:
      - condition: save_conflict_same_project == true
        next_state: ERROR_PRR_ALREADY_EXISTS_FOR_PROJECT
      - next_state: PRR_SUCCESS_POSTED

  PRR_SUCCESS_POSTED:
    type: interactive
    interface:
      text:
        ru: |
          🚀 *Полетела утка!*

          Твой запрос на общей доске. Как только кто-то откликнется, я мигом пришлю уведомление.

          _А пока можно выпить кофе или самому спасти чьё-нибудь ревью._ ☕️
        en: |
          🚀 *The Duck has taken flight!*

          Your request is now on the board. I'll notify you the moment someone responds.

          _In the meantime, grab a coffee or save someone else's deadline._ ☕️
      buttons:
        - id: ok
          label:
            ru: 👌 Понятно
            en: 👌 Got it
          next_state: PRR_MAIN_MENU
          row: 1

  GLOBAL_PRR_BOARD:
    type: interactive
    description: Общая доска, сгруппированная по проектам
    on_enter:
      - action: db_get_global_prr_project_groups
        payload:
          project_filter_ids: $context.filter_project_ids
          page: $context.global_prr_board_page
    interface:
      text:
        ru: |
          📋 *Список текущих запросов Peer Review*

          _Кто-то ждёт твоего ревью прямо сейчас. Выбери проект, чтобы увидеть список горящих заявок._

          🎯 Фильтр: `{current_project_filters_text}`
          🏫 *Кампусы:* {current_campus_filters_text}

          {project_groups_formatted}
        en: |
          📋 *List of current Peer Review requests*

          _Someone needs your review right now. Pick a project to see the hottest requests._


          🎯 Filter: `{current_project_filters_text}`
          🏫 *Campuses:* {current_campus_filters_text}
          {project_groups_formatted}
      buttons:
        - id: "{project_group_id_1}"
          label: "{project_group_btn_label_1}"
          condition: "project_group_id_1 != ''"
          action: select_project_group
          next_state: PROJECT_PRR_LIST
          row: 1
        - id: "{project_group_id_2}"
          label: "{project_group_btn_label_2}"
          condition: "project_group_id_2 != ''"
          action: select_project_group
          next_state: PROJECT_PRR_LIST
          row: 2
        - id: "{project_group_id_3}"
          label: "{project_group_btn_label_3}"
          condition: "project_group_id_3 != ''"
          action: select_project_group
          next_state: PROJECT_PRR_LIST
          row: 3
        - id: "{project_group_id_4}"
          label: "{project_group_btn_label_4}"
          condition: "project_group_id_4 != ''"
          action: select_project_group
          next_state: PROJECT_PRR_LIST
          row: 4
        - id: "{project_group_id_5}"
          label: "{project_group_btn_label_5}"
          condition: "project_group_id_5 != ''"
          action: select_project_group
          next_state: PROJECT_PRR_LIST
          row: 5
        - id: prev_board_page
          label:
            ru: ⬅️ Назад
            en: ⬅️ Back
          condition: "global_board_has_prev_page == true"
          action: global_prr_board_prev_page
          next_state: GLOBAL_PRR_BOARD
          row: 6
        - id: board_page
          label:
            ru: "{global_board_page_caption_ru}"
            en: "{global_board_page_caption_en}"
          condition: "project_group_id_1 != '' && global_board_total_pages > 1"
          action: none
          row: 6
        - id: next_board_page
          label:
            ru: Вперёд ➡️
            en: Next ➡️
          condition: "global_board_has_next_page == true"
          action: global_prr_board_next_page
          next_state: GLOBAL_PRR_BOARD
          row: 6
        - id: set_filters
          label:
            ru: ⚙️ Фильтры заявок
            en: ⚙️ Request filters
          next_state: PRR_FILTERS_MENU
          row: 7
        - id: refresh
          label:
            ru: 🔄 Обновить
            en: 🔄 Refresh
          next_state: GLOBAL_PRR_BOARD
          row: 7
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: PRR_MAIN_MENU
          row: 8

  PROJECT_PRR_LIST:
    type: interactive
    description: Все активные запросы внутри выбранного проекта
    on_enter:
      - action: db_get_prr_requests_for_selected_project
        payload:
          project_id: $context.selected_project_id
          include_paused: false
          page: $context.project_prr_page
    interface:
      text:
        ru: |
          📁 *Проект: {selected_project_name_md}*
          Тип: `{selected_project_type}`

          _Выбери пира, которому готов помочь. Утка одобряет взаимовыручку!_ 🦆

          {project_prr_list_formatted}
        en: |
          📁 *Project: {selected_project_name_md}*
          Type: `{selected_project_type}`

          _Pick a peer you're ready to help. Duck approves of peer-to-peer!_ 🦆

          {project_prr_list_formatted}
      buttons:
        - id: "{project_prr_id_1}"
          label: "{project_prr_btn_label_1}"
          condition: "project_prr_id_1 != ''"
          action: select_prr
          next_state: PRR_DETAILS_VIEW
          row: 1
        - id: "{project_prr_id_2}"
          label: "{project_prr_btn_label_2}"
          condition: "project_prr_id_2 != ''"
          action: select_prr
          next_state: PRR_DETAILS_VIEW
          row: 2
        - id: "{project_prr_id_3}"
          label: "{project_prr_btn_label_3}"
          condition: "project_prr_id_3 != ''"
          action: select_prr
          next_state: PRR_DETAILS_VIEW
          row: 3
        - id: "{project_prr_id_4}"
          label: "{project_prr_btn_label_4}"
          condition: "project_prr_id_4 != ''"
          action: select_prr
          next_state: PRR_DETAILS_VIEW
          row: 4
        - id: "{project_prr_id_5}"
          label: "{project_prr_btn_label_5}"
          condition: "project_prr_id_5 != ''"
          action: select_prr
          next_state: PRR_DETAILS_VIEW
          row: 5
        - id: prev_project_prr_page
          label:
            ru: ⬅️ Назад
            en: ⬅️ Back
          condition: "project_prr_has_prev_page == true"
          action: selected_project_prr_prev_page
          next_state: PROJECT_PRR_LIST
          row: 6
        - id: project_prr_page
          label:
            ru: "{project_prr_page_caption_ru}"
            en: "{project_prr_page_caption_en}"
          condition: "project_prr_id_1 != '' && project_prr_total_pages > 1"
          action: none
          row: 6
        - id: next_project_prr_page
          label:
            ru: Вперёд ➡️
            en: Next ➡️
          condition: "project_prr_has_next_page == true"
          action: selected_project_prr_next_page
          next_state: PROJECT_PRR_LIST
          row: 6
        - id: refresh
          label:
            ru: 🔄 Обновить
            en: 🔄 Refresh
          next_state: PROJECT_PRR_LIST
          row: 7
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: GLOBAL_PRR_BOARD
          row: 7

  PRR_DETAILS_VIEW:
    type: interactive
    on_enter:
      - action: db_increment_prr_view_counter
        payload:
          prr_id: $context.selected_prr_id
          viewer_user_id: $context.user_id
    interface:
      text:
        ru: |
          🟢 *Карточка запроса*

          👤 {nickname} (lvl {peer_level})
          📍 Кампус: {peer_campus}
          📁 Проект: {project_name}
          🧩 Тип: {project_type}

          ⏰ *Когда удобно:*
          {time_description}
          _(UTC{requester_timezone_utc_offset}; у тебя: {viewer_local_time_hint})_

          📊 *Статистика:*
          👁 Просмотров: {view_count} | 🙋 Откликов: {response_count}
          🕒 Создан: {prr_opened_at}

          _Готов(а) выручить пира? Жми кнопку, и я выдам контакты._
        en: |
          🟢 *Request Card*

          👤 {nickname} (lvl {peer_level})
          📍 Campus: {peer_campus}
          📁 Project: {project_name}
          🧩 Project type: {project_type}

          ⏰ *Available time:*
          {time_description}
          _(UTC{requester_timezone_utc_offset}; for you: {viewer_local_time_hint})_

          *Statistics:*
          👁 Views: {view_count} | 🙋 Offers: {response_count}
          🕒 Opened: {prr_opened_at}

          _Ready to help? Click the button below to get contacts._
      buttons:
        - id: propose_review
          label:
            ru: 💬 Предложить ревью
            en: 💬 Propose review
          next_state: PRR_PROPOSE_REVIEW_SYSTEM
          row: 1
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: PROJECT_PRR_LIST
          row: 2

  PRR_PROPOSE_REVIEW_SYSTEM:
    type: system
    description: Lazy-check проекта в момент отклика и запрет self-review
    logic:
      action: validate_and_propose_review
      payload:
        prr_id: $context.selected_prr_id
        reviewer_user_id: $context.user_id
    transitions:
      - condition: is_own_prr == true
        next_state: ERROR_CANNOT_REVIEW_SELF
      - condition: project_still_in_reviews == false
        next_state: INFO_PRR_OUTDATED_REMOVED
      - condition: prr_closed == true
        next_state: INFO_PRR_ALREADY_CLOSED
      - next_state: PRR_PROPOSE_REVIEW_SENT

  PRR_PROPOSE_REVIEW_SENT:
    type: interactive
    interface:
      text:
        ru: |
          📨 *Контакт передан!*

          _Я скрыла эту заявку с доски, чтобы автору не спамили другие пиры._ 🦆

          Напиши автору и договаривайся.
          {requester_alternative_contact_line}
        en: |
          📨 *Contact shared!*

          _I've hidden this request from the board so the author doesn't get spammed._ 🦆

          Write to the author and make an arrangement.
          {requester_alternative_contact_line}
      buttons:
        - id: message_author
          label:
            ru: 💬 Написать в Telegram
            en: 💬 Message in Telegram
          condition: "requester_username != ''"
          action: open_url
          url: "https://t.me/{requester_username}"
          row: 1
        - id: message_author_rc
          label:
            ru: 💬 Написать в Rocket.Chat
            en: 💬 Message in Rocket.Chat
          condition: "requester_rocketchat_id != ''"
          action: open_url
          url: "https://rocketchat-student.21-school.ru/direct/{requester_rocketchat_id}"
          row: 1
        - id: back_project
          label:
            ru: 🔙 К запросам проекта
            en: 🔙 Back to project requests
          next_state: PROJECT_PRR_LIST
          row: 2
        - id: board
          label:
            ru: 📋 К доске проектов
            en: 📋 To project board
          next_state: GLOBAL_PRR_BOARD
          row: 3

  MY_PRR_LIST:
    type: interactive
    on_enter:
      - action: db_get_my_active_prr
        payload:
          user_id: $context.user_id
          page: $context.my_prr_page
    interface:
      text:
        ru: |
          📂 *Текущие запросы*

          Здесь можно приостановить поиск, возобновить или закрыть заявку.

          {my_prr_list_formatted}
        en: |
          📂 *Current requests*

          Pause, resume, or close your requests here.

          {my_prr_list_formatted}
      buttons:
        # TODO: возможно в коде осталось от пагинации, которой мы отказались, удалить тогда .go код
        - id: "{my_prr_id_1}"
          label: "{my_prr_btn_label_1}"
          condition: "my_prr_id_1 != ''"
          action: select_my_prr
          next_state: MY_PRR_DETAILS
          row: 1
        - id: "{my_prr_id_2}"
          label: "{my_prr_btn_label_2}"
          condition: "my_prr_id_2 != ''"
          action: select_my_prr
          next_state: MY_PRR_DETAILS
          row: 2
        - id: "{my_prr_id_3}"
          label: "{my_prr_btn_label_3}"
          condition: "my_prr_id_3 != ''"
          action: select_my_prr
          next_state: MY_PRR_DETAILS
          row: 3
        - id: "{my_prr_id_4}"
          label: "{my_prr_btn_label_4}"
          condition: "my_prr_id_4 != ''"
          action: select_my_prr
          next_state: MY_PRR_DETAILS
          row: 4
        - id: "{my_prr_id_5}"
          label: "{my_prr_btn_label_5}"
          condition: "my_prr_id_5 != ''"
          action: select_my_prr
          next_state: MY_PRR_DETAILS
          row: 5
        - id: prev_my_prr_page
          label:
            ru: ⬅️ Назад
            en: ⬅️ Prev
          condition: "my_prr_has_prev_page == true"
          action: my_prr_prev_page
          next_state: MY_PRR_LIST
          row: 6
        - id: my_prr_page
          label:
            ru: "{my_prr_page_caption_ru}"
            en: "{my_prr_page_caption_en}"
          condition: "my_prr_id_1 != ''"
          action: none
          row: 6
        - id: next_my_prr_page
          label:
            ru: Вперёд ➡️
            en: Next ➡️
          condition: "my_prr_has_next_page == true"
          action: my_prr_next_page
          next_state: MY_PRR_LIST
          row: 6
        - id: "{my_prr_id_7}"
          label: "{my_prr_btn_label_7}"
          condition: "my_prr_id_7 != ''"
          action: select_my_prr
          next_state: MY_PRR_DETAILS
          row: 7
        - id: refresh
          label:
            ru: 🔄 Обновить
            en: 🔄 Refresh
          next_state: MY_PRR_LIST
          row: 7
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: PRR_MAIN_MENU
          row: 7

  MY_PRR_DETAILS:
    type: interactive
    on_enter:
      - action: db_get_selected_my_prr
        payload:
          user_id: $context.user_id
          prr_id: $context.selected_my_prr_id
    interface:
      text:
        ru: |
          📌 *Твой запрос на доске*

          📁 Проект: {my_selected_project_name}
          ⏰ Время: {my_selected_time_description}

          📊 *Пульс заявки:*
          🙋 Откликов: {my_selected_response_count}
          👁 Просмотров: {my_selected_view_count}
          🔖 Статус: {my_selected_status_label}

          {my_selected_error_line}
          {my_selected_negotiating_contact_block}

          _Договорились о встрече? Закрой запрос, чтобы не сбивать других уток с курса._
        en: |
          📌 *My request*

          📁 Project: {my_selected_project_name}
          ⏰ Time: {my_selected_time_description}

          📊 *Request Pulse:*
          🙋 Offers: {my_selected_response_count}
          👁 Views: {my_selected_view_count}
          🔖 Status: {my_selected_status_label}

          {my_selected_error_line}
          {my_selected_negotiating_contact_block}

          _Already negotiated? Close the request to keep the radar clear for others._
      buttons:
        - id: pause_search
          label:
            ru: ⏸ Приостановить поиск
            en: ⏸ Pause search
          condition: "my_selected_status == 'SEARCHING'"
          action: pause_my_prr
          next_state: MY_PRR_DETAILS
          row: 1
        - id: resume_search
          label:
            ru: ▶️ Возобновить поиск
            en: ▶️ Resume search
          condition: "my_selected_status == 'PAUSED'"
          action: resume_my_prr
          next_state: MY_PRR_DETAILS
          row: 1
        - id: resume_from_negotiating
          label:
            ru: 🔄 Вернуть на доску
            en: 🔄 Return to board
          condition: "my_selected_status == 'NEGOTIATING'"
          action: resume_my_prr
          next_state: MY_PRR_DETAILS
          row: 1
        - id: close_prr
          label:
            ru: ❌ Закрыть запрос
            en: ❌ Close request
          condition: "my_selected_status != 'CLOSED'"
          action: close_my_prr
          next_state: MY_PRR_LIST
          row: 2
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: MY_PRR_LIST
          row: 3

