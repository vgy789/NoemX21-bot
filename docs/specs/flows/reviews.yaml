        en: |
          ❌ You have no projects in `IN_REVIEWS` status.

          The bot only offers projects from:
          `/participants/{login}/projects?status=IN_REVIEWS`
      buttons:
        - id: ok
          label:
            ru: 👌 ОК
            en: 👌 OK
          next_state: PRR_MAIN_MENU
          row: 1

