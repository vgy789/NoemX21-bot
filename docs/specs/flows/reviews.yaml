---
meta:
  feature_id: REV-001
  name: Проверка проектов (Review)
  description: Система P2P проверок
  version: 2.1.1

initial_state: REVIEW_MENU
states:
  REVIEW_MENU:
    type: interactive
    description: Главное меню P2P модуля
    interface:
      text:
        ru: |
          🤝 *P2P-Обмен слотами*

          📝 *Запросы:* Публикация заявок на проверку.
          🔭 *Лента:* Поиск доступных слотов.
          ⚙️ *Фильтры:* Настройка видимости.
        en: |
          🤝 *P2P Exchange*

          📝 *Requests:* Create review tickets.
          🔭 *Feed:* Browse available slots.
          ⚙️ *Filters:* Visibility config.
      buttons:
        - id: request
          label:
            ru: 📢 Опубликовать запрос
            en: 📢 Publish request
          next_state: FETCH_MY_PROJECTS_IN_REVIEW
        - id: respond
          label:
            ru: 🔭 Лента запросов
            en: 🔭 Requests Feed
          next_state: FETCH_ALL_REVIEW_REQUESTS
        - id: settings
          label:
            ru: ⚙️ Фильтры кампусов
            en: ⚙️ Campus filters
          next_state: MANAGE_NOTIFICATION_FILTERS
          row: 2
        - id: back
          label:
            ru: 🏠 Главное меню
            en: 🏠 Main menu
          next_state: MAIN_MENU
          row: 2

  FETCH_MY_PROJECTS_IN_REVIEW:
    type: system
    description: 'Получение списка проектов (Status: IN_REVIEWS)'
    logic:
      action: get_user_projects
      payload:
        user_id: $context.user_id
        status: IN_REVIEWS
    transitions:
      - condition: projects_count > 0
        next_state: SELECT_PROJECT
      - condition: projects_count == 0
        next_state: ERROR_NO_PROJECTS_IN_REVIEW

  SELECT_PROJECT:
    type: interactive
    description: Выбор проекта
    interface:
      text:
        ru: |
          📂 *Выбор проекта*

          Статус на платформе: `IN_REVIEW`
        en: |
          📂 *Select Project*

          Platform status: `IN_REVIEW`
      buttons:
        - id: project_{project_id}
          label: "{project_name}"
          next_state: INPUT_TIME_DESCRIPTION
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: REVIEW_MENU

  INPUT_TIME_DESCRIPTION:
    type: input
    description: Ввод временного слота
    interface:
      text:
        ru: |
          🕒 *Настройка слота*

          Укажи время или статус доступности.
          _Пример:_ `Сейчас`, `19:00`, `Завтра` (до 20 симв.).
        en: |
          🕒 *Time Slot Config*

          Specify availability status or time slot.
          _Example:_ `Now`, `19:00`, `Tomorrow` (max 20 chars).
      error_invalid:
        ru: |
          ⚠️ *Ошибка формата*
          Лимит: 20 символов.
        en: |
          ⚠️ *Format Error*
          Limit: 20 chars.
    validation:
      regex: ^.{1,20}$
    transitions:
      - trigger: on_valid_input
        next_state: CREATE_REVIEW_REQUEST
        action: set_request_description

  CREATE_REVIEW_REQUEST:
    type: system
    description: Запись запроса в БД
    logic:
      action: create_review_request
      payload:
        student_id: $context.user_id
        project_name: $context.selected_project_name
        description: $context.last_input
    transitions:
      - next_state: REQUEST_SUCCESS_SUMMARY

  REQUEST_SUCCESS_SUMMARY:
    type: interactive
    description: Лог успешного создания
    interface:
      text:
        ru: |
          ✅ *Запрос опубликован*

          📌 Проект: `{project_name}`
          💬 Описание: `{description}`

          📡 *Статус:* Рассылка уведомлений пирам...
        en: |
          ✅ *Request Published*

          📌 Project: `{project_name}`
          💬 Info: `{description}`

          📡 *Status:* Broadcasting to peers...
    transitions:
      - next_state: REVIEW_MENU

  FETCH_ALL_REVIEW_REQUESTS:
    type: system
    description: Загрузка фида запросов
    logic:
      action: get_review_requests
      payload:
        campus_filter: true
        offset: $context.requests_offset
        limit: 5
    transitions:
      - next_state: DISPLAY_REQUESTS

  DISPLAY_REQUESTS:
    type: interactive
    description: Список ревью (Лента)
    interface:
      text:
        ru: |
          🔭 *Лента активных запросов*

          Выбери номер для просмотра деталей:
          {requests_list_numbered}
        en: |
          🔭 *Active Requests Feed*

          Select index for details:
          {requests_list_numbered}
      buttons:
        - id: req_{request_id}
          label: "{index} | {project_short_name}"
        - id: prev_page
          label: ⬅️
          next_state: FETCH_ALL_REVIEW_REQUESTS
          condition: current_page > 1
        - id: next_page
          label: ➡️
          next_state: FETCH_ALL_REVIEW_REQUESTS
          condition: current_page < total_pages
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: REVIEW_MENU
          row: 2
    transitions:
      - trigger: button_click
        condition: id.startswith('req_')
        next_state: VIEW_PEER_PROFILE

  VIEW_PEER_PROFILE:
    type: interactive
    description: Просмотр слота
    interface:
      text:
        ru: |
          📂 *Детали запроса*

          👤 *Пир:* `{peer_login}`
          📍 {peer_campus} | {peer_coalition}
          🏆 Lvl: `{peer_level}`

          🧪 *Проект:* `{project_name}`
          🕒 *Время:* `{request_description}`
        en: |
          📂 *Review Slot Details*

          👤 *Peer:* `{peer_login}`
          📍 {peer_campus} | {peer_coalition}
          🏆 Lvl: `{peer_level}`

          🧪 *Target:* `{project_name}`
          🕒 *Time:* `{request_description}`
      buttons:
        - id: confirm_respond
          label:
            ru: 🤝 Записаться на проверку
            en: 🤝 Confirm Booking
          next_state: COMPLETE_RESPOND
        - id: back
          label:
            ru: ⬅️ К списку
            en: ⬅️ To list
          next_state: DISPLAY_REQUESTS

  COMPLETE_RESPOND:
    type: system
    description: Транзакция бронирования
    logic:
      action: respond_to_review
      payload:
        request_id: $context.selected_request_id
        responder_id: $context.user_id
    transitions:
      - condition: success == true
        next_state: RESPOND_SUCCESS
      - condition: success == false
        next_state: ERROR_REQUEST_TAKEN

  RESPOND_SUCCESS:
    type: interactive
    description: Успешное бронирование
    interface:
      text:
        ru: |
          🔒 *Слот забронирован*

          Проверяющий: *Вы* ➡️ Пир: `{peer_login}`

          📬 *Связь в Telegram:* @{peer_telegram}
        en: |
          🔒 *Slot Reserved*

          Reviewer: *You* ➡️ Peer: `{peer_login}`

          📬 *Telegram Contact:* @{peer_telegram}
    transitions:
      - next_state: REVIEW_MENU

  MANAGE_NOTIFICATION_FILTERS:
    type: interactive
    description: Конфигурация фильтров
    interface:
      text:
        ru: |
          ⚙️ *Настройка фильтров*

          Выбери кампусы для поиска и уведомлений:
        en: |
          ⚙️ *Filter Config*

          Select campuses for search and notifications:
      buttons:
        - id: toggle_{campus_id}
          label: "{status_emoji} {my_campus}"
        - id: back
          label:
            ru: 💾 Готово / Назад
            en: 💾 Done / Back
          next_state: REVIEW_MENU
    transitions:
      - trigger: button_click
        condition: id.startswith('toggle_')
        action: toggle_campus_filter
        next_state: MANAGE_NOTIFICATION_FILTERS

  ERROR_NO_PROJECTS_IN_REVIEW:
    type: interactive
    description: Ошибка - нет проектов
    interface:
      text:
        ru: |
          ⚠️ *Нет данных*

          Не найдено активных проектов в статусе `Review`.
          _Сначала сдай проект на платформе._
        en: |
          ⚠️ *Null Result*

          No active projects with status `Review` found.
          _Submit project on the intranet first._
      buttons:
        - id: back
          label:
            ru: Понятно
            en: OK
          next_state: REVIEW_MENU

  ERROR_REQUEST_TAKEN:
    type: interactive
    description: Ошибка - Race condition
    interface:
      text:
        ru: |
          ❌ *Ошибка бронирования*

          Слот уже занят другим пиром.
        en: |
          ❌ *Race Condition*

          Slot already reserved by another peer.
      buttons:
        - id: back
          label:
            ru: 🔄 Обновить ленту
            en: 🔄 Refresh Feed
          next_state: FETCH_ALL_REVIEW_REQUESTS
