  MY_PRR_DETAILS:
    type: interactive
    on_enter:
      - action: db_get_selected_my_prr
        payload:
          user_id: $context.user_id
          prr_id: $context.selected_my_prr_id
    interface:
      text:
        ru: |
          📌 *Твой запрос на доске*

          📁 Проект: #{my_selected_project_name}
          ⏰ Время: {my_selected_time_description}
          📝 Заметка: {my_selected_request_note_text}

          📊 *Пульс заявки:*
          🙋 Откликов: {my_selected_response_count}
          👁 Просмотров: {my_selected_view_count}
          🔖 Статус: {my_selected_status_label}

          {my_selected_error_line}
          {my_selected_negotiating_contact_block}

          _Договорились о встрече? Закрой запрос, чтобы не сбивать других уток с курса._
        en: |
          📌 *My request*

          📁 Project: #{my_selected_project_name}
          ⏰ Time: {my_selected_time_description}
          📝 Note: {my_selected_request_note_text}

          📊 *Request Pulse:*
          🙋 Offers: {my_selected_response_count}
          👁 Views: {my_selected_view_count}
          🔖 Status: {my_selected_status_label}

          {my_selected_error_line}
          {my_selected_negotiating_contact_block}

          _Already negotiated? Close the request to keep the radar clear for others._
      buttons:
        - id: pause_search
          label:
            ru: ⏸ Приостановить поиск
            en: ⏸ Pause search
          condition: "my_selected_status == 'SEARCHING'"
          action: pause_my_prr
          next_state: MY_PRR_DETAILS
          row: 1
        - id: resume_search
          label:
            ru: ▶️ Возобновить поиск
            en: ▶️ Resume search
          condition: "my_selected_status == 'PAUSED'"
          action: resume_my_prr
          next_state: MY_PRR_DETAILS
          row: 1
        - id: resume_from_negotiating
          label:
            ru: 🔄 Вернуть на доску
            en: 🔄 Return to board
          condition: "my_selected_status == 'NEGOTIATING'"
          action: resume_my_prr
          next_state: MY_PRR_DETAILS
          row: 1
        - id: close_prr
          label:
            ru: ❌ Закрыть запрос
            en: ❌ Close request
          condition: "my_selected_status != 'CLOSED' && my_selected_status != 'WITHDRAWN'"
          action: close_my_prr
          next_state: MY_PRR_LIST
          row: 2
        - id: withdraw_prr
          label:
            ru: 🧹 Отозвать запрос
            en: 🧹 Withdraw request
          condition: "my_selected_status != 'CLOSED' && my_selected_status != 'WITHDRAWN'"
          action: withdraw_my_prr
          next_state: MY_PRR_LIST
          row: 2
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: MY_PRR_LIST
          row: 3

