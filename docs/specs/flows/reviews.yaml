---
meta:
  feature_id: REV-001
  name: Проверка проектов (Review)
  description: 'Система P2P проверок: создание запросов и поиск слотов'
  version: 2.0.0

initial_state: REVIEW_MENU
states:
  REVIEW_MENU:
    type: interactive
    description: Главное меню раздела Review
    interface:
      text:
        ru: |
          🤝 *P2P Review*

          *Нужна проверка?* Опубликуй запрос и дождись отклика пира. 📢

          *Хочешь помочь другим?* Найди проект в списке и заработай Review Points. 💎
        en: |
          🤝 *P2P Review*

          *Need a review?* Publish a request and wait for a peer's response. 📢
          *Want to earn Review Points?* Find someone to check. 💎
      buttons:
        - id: request
          label:
            ru: 📢 Создать запрос
            en: 📢 Create request
          next_state: FETCH_MY_PROJECTS_IN_REVIEW
        - id: respond
          label:
            ru: 🔭 Найти проект
            en: 🔭 Find project
          next_state: FETCH_ALL_REVIEW_REQUESTS
        - id: settings
          label:
            ru: 🔔 Настройки
            en: 🔔 Settings
          next_state: MANAGE_NOTIFICATION_FILTERS
          row: 2
        - id: back
          label:
            ru: 🏠 Назад
            en: 🏠 Back
          next_state: main_menu.yaml/MAIN_MENU
          row: 2

  FETCH_MY_PROJECTS_IN_REVIEW:
    type: system
    description: 'Получение списка проектов пользователя (Status: IN_REVIEWS)'
    logic:
      action: get_user_projects
      payload:
        user_id: $context.user_id
        status: IN_REVIEWS
    transitions:
      - condition: projects_count > 0
        next_state: SELECT_PROJECT
      - condition: projects_count == 0
        next_state: ERROR_NO_PROJECTS_IN_REVIEW

  SELECT_PROJECT:
    type: interactive
    description: Выбор проекта для создания запроса
    interface:
      text:
        ru: |
          📂 *Выбери проект*

          Ниже список твоих проектов, которые уже переведены в статус ревью на платформе.
        en: |
          📂 *Select project*

          Below is the list of your projects currently in review status on the platform.
      buttons:
        - id: project_{project_id}
          label: "{project_name}"
          next_state: INPUT_TIME_DESCRIPTION
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: REVIEW_MENU

  INPUT_TIME_DESCRIPTION:
    type: input
    description: Ввод комментария (времени) к запросу
    interface:
      text:
        ru: |
          🕒 *Когда ты доступен?*

          Напиши коротко время или статус. Это увидят другие пиры в списке.
          _Пример: «Сейчас», «С 18:00», «Завтра утро»._

          ⚠️ *Лимит: 20 символов.*
        en: |
          🕒 *When are you available?*

          Write a short time or status. Peers will see this in the list.
          _Ex: "Now", "From 18:00", "Tomorrow am"._

          ⚠️ *Limit: 20 chars.*
      error_invalid:
        ru: |
          🤏 Слишком длинно! Сократи до 20 символов, пожалуйста.
        en: |
          🤏 Too long! Please shorten to 20 characters.
    validation:
      regex: ^.{1,20}$
    transitions:
      - trigger: on_valid_input
        next_state: CREATE_REVIEW_REQUEST
        action: set_request_description

  CREATE_REVIEW_REQUEST:
    type: system
    description: Сабмит запроса в БД
    logic:
      action: create_review_request
      payload:
        student_id: $context.user_id
        project_name: $context.selected_project_name
        description: $context.last_input
    transitions:
      - next_state: REQUEST_SUCCESS_SUMMARY

  REQUEST_SUCCESS_SUMMARY:
    type: interactive
    description: Подтверждение создания запроса
    interface:
      text:
        ru: |
          ✅ *Запрос опубликован!*

          📌 Проект: `{project_name}`
          💬 Инфо: `{description}`

          Мы уведомим пиров в выбранных кампусах. Жди сообщений!
        en: |
          ✅ *Request published!*

          📌 Project: `{project_name}`
          💬 Info: `{description}`

          We will notify peers in selected campuses. Wait for messages!
    transitions:
      - next_state: REVIEW_MENU

  FETCH_ALL_REVIEW_REQUESTS:
    type: system
    description: Загрузка списка активных запросов (Feed)
    logic:
      action: get_review_requests
      payload:
        campus_filter: true
        offset: $context.requests_offset
        limit: 5
    transitions:
      - next_state: DISPLAY_REQUESTS

  DISPLAY_REQUESTS:
    type: interactive
    description: Список доступных ревью (Пагинация)
    interface:
      text:
        ru: |
          🔭 *Доска объявлений*

          Выбери номер запроса, чтобы посмотреть профиль пира и записаться на проверку.

          {requests_list_numbered}
        en: |
          🔭 *Quest Board*

          Select a request number to view the peer's profile and book the review.

          {requests_list_numbered}
      buttons:
        - id: req_{request_id}
          label: "{index} | {project_short_name}"
        - id: prev_page
          label: ⬅️
          next_state: FETCH_ALL_REVIEW_REQUESTS
          condition: current_page > 1
        - id: next_page
          label: ➡️
          next_state: FETCH_ALL_REVIEW_REQUESTS
          condition: current_page < total_pages
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: REVIEW_MENU
          row: 2
    transitions:
      - trigger: button_click
        condition: id.startswith('req_')
        next_state: VIEW_PEER_PROFILE

  VIEW_PEER_PROFILE:
    type: interactive
    description: Карточка пира перед взятием проверки
    interface:
      text:
        ru: |
          👤 *Карточка пира*

          🆔 `{peer_login}` (Lvl {peer_level})
          🏰 Кампус: {peer_campus}
          🛡 Трайб: {peer_coalition}

          ⚔️ *Проект:* {project_name}
          🕒 *Время:* {request_description}
        en: |
          👤 *Peer Card*

          🆔 `{peer_login}` (Lvl {peer_level})
          🏰 Campus: {peer_campus}
          🛡 Tribe: {peer_coalition}

          ⚔️ *Project:* {project_name}
          🕒 *Time:* {request_description}
      buttons:
        - id: confirm_respond
          label:
            ru: 🤝 Беру проверку!
            en: 🤝 I'll take it!
          next_state: COMPLETE_RESPOND
        - id: back
          label:
            ru: ⬅️ К списку
            en: ⬅️ To list
          next_state: DISPLAY_REQUESTS
    on_enter: fetch_peer_profile

  COMPLETE_RESPOND:
    type: system
    description: Попытка занять слот
    logic:
      action: respond_to_review
      payload:
        request_id: $context.selected_request_id
        responder_id: $context.user_id
    transitions:
      - condition: success == true
        next_state: RESPOND_SUCCESS
      - condition: success == false
        next_state: ERROR_REQUEST_TAKEN

  RESPOND_SUCCESS:
    type: interactive
    description: Успешная запись на проверку
    interface:
      text:
        ru: |
          🎉 *Матч!*

          Ты записался на проверку к `{peer_login}`.
          Пир получил уведомление с твоими контактами.
          Спишитесь в личке, чтобы договориться о деталях.
        en: |
          🎉 *It's a Match!*

          You signed up to review `{peer_login}`.
          The peer has been notified with your contacts.
          DM them to agree on the details.
    transitions:
      - next_state: REVIEW_MENU

  MANAGE_NOTIFICATION_FILTERS:
    type: interactive
    description: Фильтр кампусов
    interface:
      text:
        ru: |
          ⚙️ *Где ищем?*

          Выбери кампусы, в которых будут видны твои запросы.
          (Нажми на кнопку, чтобы включить/выключить)
        en: |
          ⚙️ *Where to search?*

          Select campuses where your requests will be visible.
          (Click button to toggle)
      buttons:
        - id: toggle_{campus_id}
          label: "{status_emoji} {my_campus}"
        - id: back
          label:
            ru: 💾 Готово / Назад
            en: 💾 Done / Back
          next_state: REVIEW_MENU
    on_enter: fetch_campus_filters
    transitions:
      - trigger: button_click
        condition: id.startswith('toggle_')
        action: toggle_campus_filter
        next_state: MANAGE_NOTIFICATION_FILTERS

  ERROR_NO_PROJECTS_IN_REVIEW:
    type: interactive
    description: 'Ошибка: нет проектов для сдачи'
    interface:
      text:
        ru: |
          📭 *Пусто*

          У тебя сейчас нет активных проектов в статусе *Review* на платформе.
          Сначала сдай проект в интре, а потом возвращайся сюда за пиром.
        en: |
          📭 *Empty*

          You don't have active projects in *Review* status on the platform.
          Submit the project on the intranet first, then come back here.
      buttons:
        - id: back
          label:
            ru: Ок
            en: Ok
          next_state: REVIEW_MENU

  ERROR_REQUEST_TAKEN:
    type: interactive
    description: 'Ошибка: слот уже занят (Race condition)'
    interface:
      text:
        ru: |
          🏃💨 *Не успел!*

          Кто-то оказался быстрее и уже забрал этот слот.
          Посмотри список, там наверняка есть еще!
        en: |
          🏃💨 *Too slow!*

          Someone was faster and already took this slot.
          Check the list, there must be others!
      buttons:
        - id: back
          label:
            ru: 🔄 Обновить список
            en: 🔄 Refresh list
          next_state: FETCH_ALL_REVIEW_REQUESTS
