          📁 Project: #*{selected_team_project_name_md}*
          ⏰ Planned start: `{team_planned_start_text}`
          💬 Note: `{team_request_note_text}`
          🌐 Timezone: `{user_timezone_name}` (UTC{user_timezone_formatted})

