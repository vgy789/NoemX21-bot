          next_state: PROJECT_PRR_LIST
          row: 1

# ==============================================================================
# АСИНХРОННЫЕ УВЕДОМЛЕНИЯ (PUSH NOTIFICATIONS)
# Данные интерфейсы отправляются пользователям вне основного FSM flow,
# как результат действий других пользователей или системных событий.
# При нажатии на кнопки в этих уведомлениях, пользователь входит в нужный стейт FSM.
# ==============================================================================
notifications:
  NOTIFY_AUTHOR_PRR_TAKEN:
    description: "Уведомление автору заявки о том, что пир откликнулся (Вариант 2, Способ 1)"
    trigger: "action: validate_and_propose_review"
    interface:
      text:
        ru: |
          🔥 *Утка принесла благую весть!*

          На твой запрос по *{project_name}* откликнулся пир **@{reviewer_username}** (lvl {reviewer_level}).

          *Что делать?*
          1. Жди сообщение в личку Rocket.Chat / Telegram.
          2. Напиши первым.

          🔗 Telegram: {reviewer_telegram_link}
          💬 Rocket.Chat: {reviewer_rocketchat_link}
          {reviewer_alternative_contact_line}

          🧊 Я *скрыла твою заявку*, чтобы тебя не завалили лишними сообщениями.
        en: |
          🔥 *The Duck has great news!*

          User @{reviewer_username} (level {reviewer_level}) has responded to your request for *{project_name}*.

          *What to do?*
          1. Wait for the peer to message you.
          2. Write first.

          🔗 Telegram: {reviewer_telegram_link}
          💬 Rocket.Chat: {reviewer_rocketchat_link}
          {reviewer_alternative_contact_line}

          🧊 I've hidden your request so you don't get spammed.
      buttons:
        - id: contact_reviewer
          label:
            ru: 💬 Написать @{reviewer_username}
            en: 💬 Message @{reviewer_username}
          condition: "reviewer_username != ''"
          action: open_url
          url: "https://t.me/{reviewer_username}"
          row: 1
        - id: contact_reviewer_rc
          label:
            ru: 💬 Написать в Rocket.Chat
            en: 💬 Message in Rocket.Chat
          condition: "reviewer_rocketchat_id != ''"
          action: open_url
          url: "https://rocketchat-student.21-school.ru/direct/{reviewer_rocketchat_id}"
          row: 1
        - id: resume_search
          label:
            ru: 🔄 Вернуть на доску
            en: 🔄 Return to board
          action: resume_my_prr
          payload:
            prr_id: $context.prr_id
          next_state: MY_PRR_DETAILS
          row: 2
        - id: close_prr
          label:
            ru: ❌ Закрыть заявку (Договорились)
            en: ❌ Close request (Agreed)
          action: close_my_prr
          payload:
            prr_id: $context.prr_id
          next_state: MY_PRR_LIST
          row: 3
        - id: go_main_menu
          label:
            ru: 🏠 На главную
            en: 🏠 Main menu
          next_state: PRR_MAIN_MENU
          row: 4
