initial_state: MAIN_MENU
states:
  MAIN_MENU:
    type: interactive
    description: Главное меню бота
    on_enter:
      - action: get_user_stats
    interface:
      text:
        ru: |-
          🏠 *Главное меню*

          🆔 `{my_s21login}` 🎖️ Уровень `{my_level}`
          🛡 `{my_coalition}`
        en: |-
          🏠 *Main Menu*

          `{my_s21login}` 🎖️ Level `{my_level}`
          🛡 `{my_coalition}`
      buttons:
        - id: stats_search
          label:
            ru: 📊 Статистика и поиск
            en: 📊 Stats & Search
          row: 1
          next_state: STATS_MENU
        - id: library
          label:
            ru: 📚 Библиотека
            en: 📚 Library
          next_state: LIBRARY_MENU
          row: 2
        - id: booking
          label:
            ru: 💬 Переговорки
            en: 💬 Meeting rooms
          row: 2
          next_state: BOOKING_MENU
        - id: review
          label:
            ru: 👀 Ревью
            en: 👀 Review
          next_state: REVIEWS_MENU
          row: 3
        - id: clubs
          label:
            ru: 🧶 Клубы
            en: 🧶 Clubs
          row: 3
          next_state: CLUBS_MENU
        - id: settings
          label:
            ru: ⚙️ Настройки
            en: ⚙️ Settings
          next_state: SETTINGS_MENU
          row: 4
