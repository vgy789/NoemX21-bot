---
meta:
  feature_id: MAIN-001
  name: Главное меню
  description: Центральное меню бота для навигации между функциями
  version: 2.0.0

initial_state: MAIN_MENU
states:
  MAIN_MENU:
    type: interactive
    description: Главное меню бота
    interface:
      text:
        ru: |-
          🏠 *Личный кабинет*

          🆔 `{my_s21login}` 🎖️ Уровень `{my_level}`
          🛡 `{my_coalition}`
        en: |-
          🏠 *Personal Cabinet*

          `{my_s21login}` 🎖️ Level `{my_level}`
          🛡 `{my_coalition}`
      buttons:
        - id: stats_search
          label:
            ru: 📊 Статистика и поиск
            en: 📊 Stats & Search
          next_state: statistics.yaml/STATS_SEARCH_MENU
        - id: review
          label:
            ru: 👀 Ревью
            en: 👀 Review
          row: 1
          next_state: reviews.yaml/REVIEW_MENU
        - id: booking
          label:
            ru: 💬 Переговорки
            en: 💬 Meeting rooms
          row: 1
          next_state: booking.yaml/BOOKING_MENU
        - id: library
          label:
            ru: 📚 Библиотека
            en: 📚 Library
          next_state: library.yaml/LIBRARY_MENU
          row: 2
        - id: clubs
          label:
            ru: 🎲 Клубы/группы
            en: 🎲 Clubs/Groups
          row: 2
          next_state: clubs.yaml/CLUBS_MENU
        - id: settings
          label:
            ru: ⚙️ Настройки
            en: ⚙️ Settings
          next_state: settings.yaml/SETTINGS_MENU
