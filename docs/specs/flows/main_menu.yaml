initial_state: MAIN_MENU
states:
  MAIN_MENU:
    type: interactive
    description: Главное меню бота
    on_enter:
      - action: get_user_stats
      - action: load_sapphire_giveaway_main_context
    interface:
      text:
        ru: |-
          🏠 *Главное меню*

          🆔 `{my_s21login}` 🎖️ Уровень `{my_level}`
          🛡 `{my_coalition}`
        en: |-
          🏠 *Main Menu*

          `{my_s21login}` 🎖️ Level `{my_level}`
          🛡 `{my_coalition}`
      buttons:
        - id: stats_search
          label:
            ru: 📊 Статистика и поиск
            en: 📊 Stats & Search
          row: 1
          next_state: STATS_MENU
        - id: library
          label:
            ru: 📚 Библиотека
            en: 📚 Library
          next_state: LIBRARY_MENU
          row: 2
        - id: booking
          label:
            ru: 💬 Переговорки
            en: 💬 Meeting rooms
          row: 2
          next_state: BOOKING_MENU
        - id: review
          label:
            ru: 👀 Ревью
            en: 👀 Review
          next_state: PRR_MAIN_MENU
          row: 3
        - id: team_finder
          label:
            ru: 👥 Найти команду
            en: 👥 Find a team
          next_state: TEAM_MAIN_MENU
          row: 3
        - id: settings
          label:
            ru: ⚙️ Настройки
            en: ⚙️ Settings
          next_state: SETTINGS_MENU
          row: 4
        - id: clubs
          label:
            ru: 🧶 Клубы
            en: 🧶 Clubs
          row: 4
          next_state: CLUBS_MENU
        - id: giveaway_join
          label:
            ru: 🎁 100 коинов! Розыгрыш!
            en: 🎁 100 Coins Giveaway!
          row: 5
          condition: "is_sapphire == true && giveaway_active == true && giveaway_is_participant == false"
          next_state: GIVEAWAY_MENU
        - id: giveaway_progress
          label:
            ru: 📈 Прогресс в конкурсе
            en: 📈 Contest Progress
          row: 5
          condition: "giveaway_is_participant == true"
          next_state: GIVEAWAY_PROGRESS
        - id: giveaway_admin
          label:
            ru: 🛠️ Админ конкурса
            en: 🛠️ Contest Admin
          row: 6
          condition: "giveaway_owner == true"
          next_state: GIVEAWAY_ADMIN_MENU
