---
meta:
  feature_id: LIB-001
  name: Библиотека
  description: 'Оптимизированный процесс: Личный дашборд, Быстрый поиск, Умные фильтры'
  version: 3.0.0

initial_state: AUTO_SYNC_USER_STATS

states:
  # -------------------------------------------------------------------------
  # 1. ЗАГРУЗКА И ГЛАВНОЕ МЕНЮ (ДАШБОРД)
  # -------------------------------------------------------------------------
  AUTO_SYNC_USER_STATS:
    type: system
    description: "Загружаем личные данные пользователя (долги, книги на руках)"
    logic:
      action: get_user_summary
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: LIBRARY_HOME

  LIBRARY_HOME:
    type: interactive
    description: "Персональный дашборд вместо общей статистики"
    interface:
      text:
        ru: |
          👋 *Привет, {user_firstname}!*

          🏫 Библиотека: {campus_name}

          👤 *Твой статус:*
          📚 На руках: *{active_loans_count}*
          ⚠️ Просрочено: *{overdue_count}*
          {user_status_message}

          _Что будем читать сегодня?_
        en: |
          👋 *Hi, {user_firstname}!*

          🏫 Library: {campus_name}

          👤 *Your Status:*
          📚 Active loans: *{active_loans_count}*
          ⚠️ Overdue: *{overdue_count}*
          {user_status_message}

          _What are we reading today?_
      buttons:
        - id: search
          label:
            ru: 🔍 Найти книгу
            en: 🔍 Find a book
          next_state: SEARCH_INPUT_MODE
          row: 1
        - id: my_books
          label:
            ru: 👤 Мои книги ({active_loans_count})
            en: 👤 My books ({active_loans_count})
          next_state: FETCH_MY_BOOKS
          row: 1
        - id: categories
          label:
            ru: 📂 Каталог
            en: 📂 Catalog
          next_state: FETCH_CATEGORIES
          row: 2
        - id: help
          label:
            ru: ❓ Правила
            en: ❓ Rules
          next_state: SHOW_RULES
          row: 2

  # -------------------------------------------------------------------------
  # 2. ПОИСК И СПИСКИ (ЕДИНЫЙ КОНТУР)
  # -------------------------------------------------------------------------
  SEARCH_INPUT_MODE:
    type: input
    description: "Ввод поискового запроса"
    interface:
      text:
        ru: |
          ⌨️ *Поиск по библиотеке*
          Напиши название, автора или ключевое слово.
          _Пример:_ `Java`, `Достоевский`, `Design Patterns`
        en: |
          ⌨️ *Library Search*
          Type title, author, or keyword.
          _Example:_ `Java`, `Dostoevsky`, `Design Patterns`
      buttons:
        - id: cancel
          label:
            ru: 🙅‍♂️ Отмена
            en: 🙅‍♂️ Cancel
          next_state: LIBRARY_HOME
    transitions:
      - trigger: on_input
        next_state: PREPARE_SEARCH

  PREPARE_SEARCH:
    type: system
    description: "Сброс пагинации и сохранение запроса"
    logic:
      action: set_context
      payload:
        search_query: $context.last_input
        page: 1
        only_available: false # По умолчанию ищем всё
    transitions:
      - next_state: EXECUTE_SEARCH

  EXECUTE_SEARCH:
    type: system
    description: "Выполнение запроса к API"
    logic:
      action: search_books
      payload:
        query: $context.search_query
        category_id: $context.selected_category_id
        only_available: $context.only_available
        page: $context.page
        limit: 5 # Меньше книг на странице — легче читать с телефона
    transitions:
      - condition: total_count == 0
        next_state: SEARCH_EMPTY
      - next_state: DISPLAY_RESULTS

  DISPLAY_RESULTS:
    type: interactive
    description: "Выдача результатов с фильтром 'на лету'"
    interface:
      text:
        ru: |
          🔎 *Результаты поиска*
          📖 Найдено: {total_count} (Стр. {page}/{total_pages})
          ⚙️ Фильтр: {filter_status_text_ru}

          {formatted_book_list_with_icons}
          _🟢 - доступна, 🔴 - занята_
        en: |
          🔎 *Search Results*
          📖 Found: {total_count} (Pg. {page}/{total_pages})
          ⚙️ Filter: {filter_status_text_en}

          {formatted_book_list_with_icons}
          _🟢 - available, 🔴 - taken_
      buttons:
        # Динамические кнопки книг (1-5)
        - id: "{book_id_1}"
          label: "1. {short_title_1}"
          next_state: FETCH_BOOK_DETAILS
        - id: "{book_id_2}"
          label: "2. {short_title_2}"
          next_state: FETCH_BOOK_DETAILS
        - id: "{book_id_3}"
          label: "3. {short_title_3}"
          next_state: FETCH_BOOK_DETAILS
        - id: "{book_id_4}"
          label: "4. {short_title_4}"
          next_state: FETCH_BOOK_DETAILS
        - id: "{book_id_5}"
          label: "5. {short_title_5}"
          next_state: FETCH_BOOK_DETAILS
        
        # Управление
        - id: toggle_avail
          label:
            ru: "🔄 {toggle_btn_label_ru}" # Меняется: "Только доступные" / "Показать все"
            en: "🔄 {toggle_btn_label_en}"
          next_state: TOGGLE_FILTER_STATE
          row: 2
        
        # Пагинация
        - id: prev
          label: "⬅️"
          next_state: PREV_PAGE
          condition: page > 1
          row: 3
        - id: next
          label: "➡️"
          next_state: NEXT_PAGE
          condition: page < total_pages
          row: 3
          
        - id: back
          label:
            ru: 🔙 В меню
            en: 🔙 Menu
          next_state: LIBRARY_HOME
          row: 4
    transitions:
      - trigger: button_click
        condition: id.startswith('book_') # Обработка клика по книге
        next_state: FETCH_BOOK_DETAILS

  # Состояния для переключения фильтров "на лету" без ввода текста
  TOGGLE_FILTER_STATE:
    type: system
    logic:
      action: toggle_boolean_context
      payload:
        key: "only_available"
        reset_pagination: true
    transitions:
      - next_state: EXECUTE_SEARCH

  NEXT_PAGE:
    type: system
    logic:
      action: increment_context
      payload:
        key: "page"
        value: 1
    transitions:
      - next_state: EXECUTE_SEARCH

  PREV_PAGE:
    type: system
    logic:
      action: increment_context
      payload:
        key: "page"
        value: -1
    transitions:
      - next_state: EXECUTE_SEARCH

  # -------------------------------------------------------------------------
  # 3. ДЕТАЛИ КНИГИ И ДЕЙСТВИЯ
  # -------------------------------------------------------------------------
  FETCH_BOOK_DETAILS:
    type: system
    logic:
      action: get_book_details
      payload:
        book_id: $context.selected_book_id
    transitions:
      - next_state: BOOK_CARD

  BOOK_CARD:
    type: interactive
    description: "Карточка книги с четким статусом"
    interface:
      text:
        ru: |
          📖 *{title}*
          ✍️ {author}
          📂 {category}
          
          ---
          📊 *Статус:* {status_emoji} {status_text_ru}
          🏢 *Место:* Полка {shelf_number}
          {description_snippet}
        en: |
          📖 *{title}*
          ✍️ {author}
          📂 {category}
          
          ---
          📊 *Status:* {status_emoji} {status_text_en}
          🏢 *Location:* Shelf {shelf_number}
          {description_snippet}
      buttons:
        - id: borrow
          label:
            ru: ⚡ Взять почитать
            en: ⚡ Borrow now
          next_state: ACTION_BORROW
          condition: is_available == true
        - id: notify
          label:
            ru: 🔔 Уведомить о возврате
            en: 🔔 Notify when available
          next_state: ACTION_SUBSCRIBE
          condition: is_available == false
        - id: back_list
          label:
            ru: 🔙 К результатам
            en: 🔙 Back to results
          next_state: DISPLAY_RESULTS # Возвращаемся к сохраненному списку
        - id: menu
          label:
            ru: 🏠 Меню
            en: 🏠 Menu
          next_state: LIBRARY_HOME

  ACTION_BORROW:
    type: system
    logic:
      action: borrow_book
      payload:
        book_id: $context.selected_book_id
    transitions:
      - condition: success == true
        next_state: BORROW_SUCCESS
      - condition: success == false
        next_state: BORROW_ERROR

  BORROW_SUCCESS:
    type: interactive
    description: "Чек об успешной операции"
    interface:
      text:
        ru: |
          ✅ *Бронь подтверждена!*
          
          Книга: "{title}"
          🗓 **Вернуть до:** {due_date}
          
          Забери книгу на стойке в течение 24 часов.
        en: |
          ✅ *Reservation confirmed!*
          
          Book: "{title}"
          🗓 **Return by:** {due_date}
          
          Pick up the book at the desk within 24 hours.
      buttons:
        - id: my_books
          label:
            ru: 👤 Перейти к моим книгам
            en: 👤 Go to my books
          next_state: FETCH_MY_BOOKS
        - id: search_more
          label:
            ru: 🔎 Искать ещё
            en: 🔎 Search more
          next_state: SEARCH_INPUT_MODE

  # -------------------------------------------------------------------------
  # 4. МОИ КНИГИ (ЛИЧНЫЙ КАБИНЕТ)
  # -------------------------------------------------------------------------
  FETCH_MY_BOOKS:
    type: system
    logic:
      action: get_user_loans
    transitions:
      - next_state: MY_BOOKS_LIST

  MY_BOOKS_LIST:
    type: interactive
    interface:
      text:
        ru: |
          👤 *Твоя полка*
          
          {loans_list_formatted}
          
          _⚠️ - скоро срок сдачи или просрочено_
          _✅ - все ок_
        en: |
          👤 *Your Shelf*
          
          {loans_list_formatted}
          
          _⚠️ - due soon or overdue_
          _✅ - all good_
      buttons:
        - id: home
          label:
            ru: 🏠 Главное меню
            en: 🏠 Main Menu
          next_state: LIBRARY_HOME

  SEARCH_EMPTY:
    type: interactive
    interface:
      text:
        ru: |
          🤷‍♂️ *Ничего не найдено*
          Попробуй изменить запрос или сбросить фильтры.
        en: |
          🤷‍♂️ *Nothing found*
          Try changing the query or resetting filters.
      buttons:
        - id: retry
          label:
            ru: 🔄 Искать заново
            en: 🔄 Search again
          next_state: SEARCH_INPUT_MODE
        - id: home
          label:
            ru: 🏠 Домой
            en: 🏠 Home
          next_state: LIBRARY_HOME
