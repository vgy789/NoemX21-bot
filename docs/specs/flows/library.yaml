---
meta:
  feature_id: LIB-001
  name: Библиотека
  description: 'Управление книгами: Поиск, фильтрация, пагинация и бронирование'
  version: 2.2.0

initial_state: AUTO_SYNC_LIB

states:
  AUTO_SYNC_LIB:
    type: system
    description: "Pre-load basic library stats"
    logic:
      action: get_library_stats
      payload:
        campus_id: $context.campus_id
    transitions:
      - next_state: LIBRARY_HOME

  LIBRARY_HOME:
    type: interactive
    description: Главное меню библиотеки
    interface:
      text:
        ru: |
          📚 *Библиотека: {my_campus}*

          Здесь ты можешь найти книги для обучения, забронировать их.

          📊 *Сейчас в библиотеке:*
          • Всего книг: `{total_books_count}`
          • Доступно: `{available_count}`
          • У тебя на руках: `{my_active_loans_count}`
        en: |
          📚 *Library: {my_campus}*

          Here you can find books for learning, reserve them, or extend the deadline.

          📊 *Library Stats:*
          • Total books: `{total_books_count}`
          • Available: `{available_count}`
          • You have: `{my_active_loans_count}`
      buttons:
        - id: search
          label:
            ru: 🔎 Найти книгу
            en: 🔎 Find book
          next_state: BOOK_SEARCH_INPUT
        - id: available
          label:
            ru: ✅ Доступные сейчас
            en: ✅ Available now
          row: 1
          next_state: FETCH_AVAILABLE_BOOKS
        - id: categories
          label:
            ru: 🏷️ Категории
            en: 🏷️ Categories
          row: 1
          next_state: FILTER_SELECTION
        - id: my_books
          label:
            ru: 📖 Мои книги
            en: 📖 My books
          row: 2
          next_state: FETCH_MY_BOOKS
        - id: back
          label:
            ru: 🏠 В главное меню
            en: 🏠 Main menu
          next_state: MAIN_MENU

  BOOK_SEARCH_INPUT:
    type: input
    description: Ввод названия или автора для поиска
    interface:
      text:
        ru: |
          🕵️ *Поиск книги*

          Введи название книги или фамилию автора.
          _Например:_ `Взаимопомощь как фактор эволюции` или `Кнут`
        en: |
          🕵️ *Book Search*

          Enter the book title or author's name.
          _Example:_ `Knuth` or `C Programming`
      buttons:
        - id: back
          label:
            ru: 🙅‍♂️ Отмена
            en: 🙅‍♂️ Cancel
          next_state: LIBRARY_HOME
    transitions:
      - trigger: on_input
        next_state: SEARCHING_BOOKS

  SEARCHING_BOOKS:
    type: system
    description: Промежуточное состояние поиска
    logic:
      action: get_books
      payload:
        campus_id: $context.campus_id
        search: $context.last_input
        limit: 10
        offset: 0
    transitions:
      - condition: total_count == 0
        next_state: BOOKS_NOT_FOUND
      - next_state: DISPLAY_BOOKS

  FILTER_SELECTION:
    type: interactive
    description: Меню выбора фильтров
    interface:
      text:
        ru: |
          🏷️ *Фильтрация*
          Как будем искать?
        en: |
          🏷️ *Filtering*
          How should we search?
      buttons:
        - id: by_category
          label:
            ru: 📂 По категориям
            en: 📂 By categories
          next_state: SELECT_CATEGORY
        - id: by_author
          label:
            ru: ✍️ По авторам
            en: ✍️ By authors
          next_state: SELECT_AUTHOR
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_HOME

  SELECT_CATEGORY:
    type: system
    description: Загрузка категорий
    logic:
      action: get_book_categories
      payload:
        campus_id: $context.campus_id
    transitions:
      - next_state: SHOW_CATEGORIES

  SHOW_CATEGORIES:
    type: interactive
    description: Выбор категории из списка
    interface:
      text:
        ru: 🗂️ *Выбери категорию:*
        en: 🗂️ *Choose category:*
      buttons:
        - id: "{category_1}"
          label: "{category_1}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_2}"
          label: "{category_2}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_3}"
          label: "{category_3}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_4}"
          label: "{category_4}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_5}"
          label: "{category_5}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_6}"
          label: "{category_6}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_7}"
          label: "{category_7}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_8}"
          label: "{category_8}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_9}"
          label: "{category_9}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_10}"
          label: "{category_10}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_11}"
          label: "{category_11}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_12}"
          label: "{category_12}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_13}"
          label: "{category_13}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_14}"
          label: "{category_14}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: "{category_15}"
          label: "{category_15}"
          next_state: FETCH_BOOKS_BY_CATEGORY
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: FILTER_SELECTION

  FETCH_BOOKS_BY_CATEGORY:
    type: system
    description: Загрузка книг по выбранной категории
    logic:
      action: get_books
      payload:
        campus_id: $context.campus_id
        category_id: $context.last_input
        limit: 10
    transitions:
      - condition: total_count == 0
        next_state: BOOKS_NOT_FOUND
      - next_state: DISPLAY_BOOKS

  SELECT_AUTHOR:
    type: system
    description: Загрузка авторов
    logic:
      action: get_book_authors
      payload:
        campus_id: $context.campus_id
    transitions:
      - next_state: SHOW_AUTHORS

  SHOW_AUTHORS:
    type: interactive
    description: Выбор автора из списка
    interface:
      text:
        ru: ✍️ *Выбери автора:*
        en: ✍️ *Choose author:*
      buttons:
        - id: "{author_id_1}"
          label: "{author_name_1}"
          next_state: FETCH_BOOKS_BY_AUTHOR
        - id: "{author_id_2}"
          label: "{author_name_2}"
          next_state: FETCH_BOOKS_BY_AUTHOR
        - id: "{author_id_3}"
          label: "{author_name_3}"
          next_state: FETCH_BOOKS_BY_AUTHOR
        - id: "{author_id_4}"
          label: "{author_name_4}"
          next_state: FETCH_BOOKS_BY_AUTHOR
        - id: "{author_id_5}"
          label: "{author_name_5}"
          next_state: FETCH_BOOKS_BY_AUTHOR
        - id: "{author_id_6}"
          label: "{author_name_6}"
          next_state: FETCH_BOOKS_BY_AUTHOR
        - id: "{author_id_7}"
          label: "{author_name_7}"
          next_state: FETCH_BOOKS_BY_AUTHOR
        - id: "{author_id_8}"
          label: "{author_name_8}"
          next_state: FETCH_BOOKS_BY_AUTHOR
        - id: "{author_id_9}"
          label: "{author_name_9}"
          next_state: FETCH_BOOKS_BY_AUTHOR
        - id: "{author_id_10}"
          label: "{author_name_10}"
          next_state: FETCH_BOOKS_BY_AUTHOR
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: FILTER_SELECTION

  FETCH_BOOKS_BY_AUTHOR:
    type: system
    description: Загрузка книг по выбранному автору
    logic:
      action: get_books
      payload:
        campus_id: $context.campus_id
        author_id: $context.last_input
        limit: 10
    transitions:
      - condition: total_count == 0
        next_state: BOOKS_NOT_FOUND
      - next_state: DISPLAY_BOOKS

  FETCH_BOOKS_BY_FILTER:
    type: system
    description: Загрузка книг по выбранному фильтру
    logic:
      action: get_books
      payload:
        campus_id: $context.campus_id
        category_id: $context.last_input
        author_id: $context.last_input
        limit: 10
        offset: 0
    transitions:
      - condition: total_count == 0
        next_state: BOOKS_NOT_FOUND
      - next_state: DISPLAY_BOOKS

  FETCH_AVAILABLE_BOOKS:
    type: system
    description: Загрузка только доступных
    logic:
      action: get_books
      payload:
        campus_id: $context.campus_id
        only_available: true
        limit: 10
        offset: 0
    transitions:
      - condition: total_count == 0
        next_state: BOOKS_NOT_FOUND
      - next_state: DISPLAY_BOOKS

  DISPLAY_BOOKS:
    type: interactive
    description: Вывод списка книг с пагинацией
    interface:
      text:
        ru: |
          📚 *Результаты поиска ({total_count})*
          Страница {current_page} из {total_pages}

          {books_list_numbered}
        en: |
          📚 *Search results ({total_count})*
          Page {current_page} of {total_pages}

          {books_list_numbered}
      buttons:
        - id: "{book_btn_id_1}"
          label: "{book_btn_label_1}"
        - id: "{book_btn_id_2}"
          label: "{book_btn_label_2}"
        - id: "{book_btn_id_3}"
          label: "{book_btn_label_3}"
        - id: "{book_btn_id_4}"
          label: "{book_btn_label_4}"
        - id: "{book_btn_id_5}"
          label: "{book_btn_label_5}"
        - id: "{book_btn_id_6}"
          label: "{book_btn_label_6}"
        - id: "{book_btn_id_7}"
          label: "{book_btn_label_7}"
        - id: "{book_btn_id_8}"
          label: "{book_btn_label_8}"
        - id: "{book_btn_id_9}"
          label: "{book_btn_label_9}"
        - id: "{book_btn_id_10}"
          label: "{book_btn_label_10}"
        - id: prev
          label: "⬅️"
          next_state: FETCH_PREV_PAGE
          condition: current_page > 1
          row: 1
        - id: next
          label: "➡️"
          next_state: FETCH_NEXT_PAGE
          condition: current_page < total_pages
          row: 1
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_HOME
    transitions:
      - trigger: button_click
        condition: id.startswith('book_')
        next_state: FETCH_BOOK_DETAILS

  FETCH_PREV_PAGE:
    type: system
    description: Переход на предыдущую страницу
    logic:
      action: update_page
      payload:
        delta: -1
    transitions:
      - next_state: FETCH_BOOKS_BY_FILTER # Or whatever the current filter state is? 
        # Actually, we need to return to the state that fetches books.
        # But which one? FETCH_AVAILABLE_BOOKS, FETCH_BOOKS_BY_FILTER, SEARCHING_BOOKS?
        # The engine doesn't store "previous fetch state".
        # We can use a generic "FETCH_CURRENT_LIST" state in library.go that decides based on context?
        # Or simplistic: always go to DISPLAY_BOOKS? No, DISPLAY_BOOKS just displays.
        # We need to re-fetch.
        # Let's assume we store "fetch_action" in context or something? 
        # Or simple hack: define FETCH_BOOKS_GENERIC state that routes based on context context flags.
        # Let's add FETCH_BOOKS_ROUTER state.
      - next_state: FETCH_BOOKS_ROUTER

  FETCH_NEXT_PAGE:
    type: system
    description: Переход на следующую страницу
    logic:
      action: update_page
      payload:
        delta: 1
    transitions:
      - next_state: FETCH_BOOKS_ROUTER

  FETCH_BOOKS_ROUTER:
    type: system
    description: Маршрутизация к правильному загрузчику
    transitions:
      - condition: search != ""
        next_state: SEARCHING_BOOKS
      - condition: selected_category_id != ""
        next_state: FETCH_BOOKS_BY_FILTER
      - condition: selected_author_id != ""
        next_state: FETCH_BOOKS_BY_FILTER
      - condition: only_available == true
        next_state: FETCH_AVAILABLE_BOOKS 
      # Default fallbacks?
      - next_state: FETCH_AVAILABLE_BOOKS

  BOOKS_NOT_FOUND:
    type: interactive
    description: Пустой результат поиска
    interface:
      text:
        ru: |
          🤷‍♂️ *Ничего не найдено*

          Мы перерыли все полки, но книг по запросу не нашли.
          Попробуй изменить запрос или категорию.
        en: |
          🤷‍♂️ *Nothing found*

          We checked all shelves but couldn't find any books.
          Try changing your query or category.
      buttons:
        - id: retry
          label:
            ru: 🔄 Новый поиск
            en: 🔄 New search
          next_state: BOOK_SEARCH_INPUT
        - id: back
          label:
            ru: 🏠 В меню
            en: 🏠 To menu
          next_state: LIBRARY_HOME

  FETCH_BOOK_DETAILS:
    type: system
    description: Получение деталей одной книги
    logic:
      action: get_book_details
      payload:
        book_id: $context.selected_book_id
    transitions:
      - next_state: BOOK_DETAILS

  BOOK_DETAILS:
    type: interactive
    description: Карточка книги
    interface:
      text:
        ru: |
          📖 *{book_title}*

          👤 *Автор:* {book_author}
          🗂️ *Категория:* {book_category}
          ---
          {status_emoji} *Статус:* {status_description}
          {loan_info}
        en: |
          📖 *{book_title}*

          👤 *Author:* {book_author}
          🗂️ *Category:* {book_category}
          ---
          {status_emoji} *Status:* {status_description}
          {loan_info}
      buttons:
        - id: borrow
          label:
            ru: ⚡ Взять почитать
            en: ⚡ Borrow now
          next_state: BORROW_BOOK_ACTION
          condition: is_available == true
        - id: notify
          label:
            ru: 🔔 Жду возврата
            en: 🔔 Notify me
          next_state: SUBSCRIBE_BOOK_ACTION
          condition: is_available == false
        - id: back
          label:
            ru: 🔙 К списку
            en: 🔙 Back to list
          next_state: DISPLAY_BOOKS

  BORROW_BOOK_ACTION:
    type: system
    description: Попытка взять книгу
    logic:
      action: borrow_book
      payload:
        book_id: $context.selected_book_id
        user_id: $context.user_id
    transitions:
      - condition: success == true
        next_state: BORROW_SUCCESS
      - condition: success == false
        next_state: BORROW_ERROR

  BORROW_SUCCESS:
    type: interactive
    description: Успешная выдача
    interface:
      text:
        ru: |
          ✅ *Книга забронирована!*

          Ты взял «{book_title}».
          🗓 *Вернуть до:* {due_date}

          Не забудь отметить получение на стойке администратора, если это требуется в твоем кампусе.
        en: |
          ✅ *Book reserved!*

          You borrowed "{book_title}".
          🗓 *Return by:* {due_date}

          Don't forget to confirm pickup at the admin desk if required in your campus.
      buttons:
        - id: my_books
          label:
            ru: 📚 К моим книгам
            en: 📚 My books
          next_state: FETCH_MY_BOOKS
        - id: menu
          label:
            ru: 🏠 В меню
            en: 🏠 Main menu
          next_state: LIBRARY_HOME

  FETCH_MY_BOOKS:
    type: system
    description: Получение списка моих книг
    logic:
      action: get_user_loans
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: MY_BOOKS

  MY_BOOKS:
    type: interactive
    description: Список книг пользователя
    interface:
      text:
        ru: |
          👤 *Твои книги*

          Здесь список всего, что ты сейчас читаешь.
          Следи за дедлайнами! ⏰

          {my_books_list_formatted}
        en: |
          👤 *Your Books*

          Here is the list of everything you are reading.
          Watch the deadlines! ⏰

          {my_books_list_formatted}
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_HOME

  BORROW_ERROR:
    type: interactive
    description: Ошибка при выдаче
    interface:
      text:
        ru: |
          ❌ *Упс!*

          Кто-то успел забрать книгу прямо перед тобой, или у тебя превышен лимит книг на руках.
        en: |
          ❌ *Oops!*

          Someone grabbed the book just before you, or you reached your borrowing limit.
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: BOOK_DETAILS
