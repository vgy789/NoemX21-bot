initial_state: AUTO_SYNC_USER_STATS

states:
  AUTO_SYNC_USER_STATS:
    type: system
    description: Подтягиваем сводку по пользователю и кампусу
    logic:
      action: get_user_summary
    transitions:
      - next_state: LIBRARY_HOME

  LIBRARY_HOME:
    type: interactive
    description: Главный экран библиотеки
    on_enter:
      - action: get_user_summary
    interface:
      text:
        ru: |
          📚 *Библиотека кампуса*

          {user_status_message_ru}
          {overdue_line_ru}
        en: |
          📚 *Campus Library*

          {user_status_message_en}
          {overdue_line_en}
      buttons:
        - id: categories
          label:
            ru: 🗂 Полки по темам
            en: 🗂 Topic shelves
          next_state: FETCH_CATEGORIES
          row: 1
        - id: search
          label:
            ru: 🔍 Найти книгу
            en: 🔍 Find a book
          next_state: SEARCH_INPUT_MODE
          row: 1
        - id: my_books
          label:
            ru: 👤 Мои книги ({active_loans_count})
            en: 👤 My books ({active_loans_count})
          next_state: FETCH_MY_BOOKS
          row: 2
        - id: help
          label:
            ru: 📜 Кодекс читателя
            en: 📜 Reader's Code
          next_state: SHOW_RULES
          row: 2
        - id: back
          label:
            ru: 🏠 На главную
            en: 🏠 Main menu
          next_state: MAIN_MENU
          row: 4

  SEARCH_INPUT_MODE:
    type: input
    description: Ожидаем текстовый запрос для поиска
    interface:
      text:
        ru: |
          🔎 *Библиотека / Поиск*

          Напиши название, автора или ключевое слово. Я нырну в базу и всё найду. 🦆

          _Например:_ `Алгоритм`, `Оруэлл`, `Python`
        en: |
          🔎 *Library / Search*

          Type a title, author, or keyword. I'll dive into the database and find it. 🦆

          _Example:_ `Algorithm`, `Orwell`, `Python`
      buttons:
        - id: cancel
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_HOME
    transitions:
      - trigger: on_input
        next_state: PREPARE_SEARCH

  PREPARE_SEARCH:
    type: system
    description: Сохраняем новый поисковый запрос и сбрасываем фильтры
    logic:
      action: prepare_search_context
    transitions:
      - next_state: EXECUTE_SEARCH

  EXECUTE_SEARCH:
    type: system
    description: Выполнение поиска по каталогу
    logic:
      action: search_books
      payload:
        query: $context.search_query
        category_id: $context.selected_category_id
        only_available: $context.only_available
        page: $context.page
        limit: 7
    transitions:
      - condition: total_count == 0
        next_state: SEARCH_EMPTY
      - next_state: DISPLAY_RESULTS

  DISPLAY_RESULTS:
    type: interactive
    description: Результаты поиска с фильтрами и пагинацией
    interface:
      text:
        ru: |
          🎯 Твой улов: *{results_scope_label_ru}*
          ⚙️ Фильтр: _{filter_status_text_ru}_
          🧭 Страница: _{page_caption_ru}_

          {formatted_book_list_with_icons}
          _🟢 — Свободна (хватать!) / 🔴 — Занята (ждать)_
          {results_error_text}
        en: |
          🎯 Your catch: *{results_scope_label_en}*
          ⚙️ Filter: _{filter_status_text_en}_
          🧭 Page: _{page_caption_en}_

          {formatted_book_list_with_icons}
          _🟢 — Free (grab it!) / 🔴 — Borrowed (wait)_
          {results_error_text}
      buttons:
        - id: "{book_id_1}"
          label: "{book_btn_label_1}"
          condition: "book_id_1 != ''"
          action: select_book_from_callback
          next_state: REFRESH_RESULTS_AFTER_SELECTION
        - id: "{book_id_2}"
          label: "{book_btn_label_2}"
          condition: "book_id_2 != ''"
          action: select_book_from_callback
          next_state: REFRESH_RESULTS_AFTER_SELECTION
        - id: "{book_id_3}"
          label: "{book_btn_label_3}"
          condition: "book_id_3 != ''"
          action: select_book_from_callback
          next_state: REFRESH_RESULTS_AFTER_SELECTION
        - id: "{book_id_4}"
          label: "{book_btn_label_4}"
          condition: "book_id_4 != ''"
          action: select_book_from_callback
          next_state: REFRESH_RESULTS_AFTER_SELECTION
        - id: "{book_id_5}"
          label: "{book_btn_label_5}"
          condition: "book_id_5 != ''"
          action: select_book_from_callback
          next_state: REFRESH_RESULTS_AFTER_SELECTION
        - id: "{book_id_6}"
          label: "{book_btn_label_6}"
          condition: "book_id_6 != ''"
          action: select_book_from_callback
          next_state: REFRESH_RESULTS_AFTER_SELECTION
        - id: "{book_id_7}"
          label: "{book_btn_label_7}"
          condition: "book_id_7 != ''"
          action: select_book_from_callback
          next_state: REFRESH_RESULTS_AFTER_SELECTION
        - id: prev_page
          label:
            ru: ⬅️ Назад
            en: ⬅️ Back
          action: go_to_prev_page
          next_state: EXECUTE_SEARCH
          row: 7
        - id: page
          label:
            ru: "{page_caption_ru}"
            en: "{page_caption_en}"
          action: none
          row: 7
        - id: next_page
          label:
            ru: Вперёд ➡️
            en: Next ➡️
          action: go_to_next_page
          next_state: EXECUTE_SEARCH
          row: 7
        - id: toggle_avail
          label:
            ru: "🔄 {toggle_btn_label_ru}"
            en: "🔄 {toggle_btn_label_en}"
          action: toggle_search_availability
          next_state: EXECUTE_SEARCH
          row: 8
        - id: home
          label:
            ru: 📚 В библиотеку
            en: 📚 Library menu
          next_state: LIBRARY_HOME
          row: 99
        - id: categories
          label:
            ru: 🔙 К полкам
            en: 🔙 To shelves
          next_state: FETCH_CATEGORIES
          row: 99
    transitions:
      - trigger: message
        condition: "is_numeric(id)"
        action: select_book_by_number
        next_state: REFRESH_RESULTS_AFTER_SELECTION

  REFRESH_RESULTS_AFTER_SELECTION:
    type: system
    description: Перечитываем результаты перед открытием карточки книги
    logic:
      action: search_books
      payload:
        query: $context.search_query
        category_id: $context.selected_category_id
        only_available: $context.only_available
        page: $context.page
        limit: 7
    transitions:
      - next_state: FETCH_BOOK_DETAILS

  FETCH_BOOK_DETAILS:
    type: system
    description: Подгружаем детальную карточку книги
    logic:
      action: get_book_details
      payload:
        book_id: $context.selected_book_id
    transitions:
      - next_state: BOOK_CARD

  BOOK_CARD:
    type: interactive
    description: Карточка выбранной книги
    interface:
      text:
        ru: |
          📖 *{title}*
          ✍️ Автор: {author}
          🗂 Полка: {category}

          {status_emoji} *{status_text_ru}*

          *Описание:* _{description_snippet}_
        en: |
          📖 *{title}*
          ✍️ Author: {author}
          🗂 Category: {category}

          {status_emoji} *{status_text_en}*

          *Description:* _{description_snippet}_
      buttons:
        - id: borrow
          label:
            ru: ⚡️ Забрать
            en: ⚡️ Grab it
          condition: "is_available == true"
          next_state: ACTION_BORROW
          row: 1
        - id: back_results
          label:
            ru: 🔙 К результатам
            en: 🔙 To results
          next_state: DISPLAY_RESULTS
          row: 2
        - id: home
          label:
            ru: 📚 В библиотеку
            en: 📚 Library menu
          next_state: LIBRARY_HOME
          row: 2

  ACTION_BORROW:
    type: system
    description: Пытаемся выдать книгу пользователю
    logic:
      action: borrow_book
      payload:
        book_id: $context.selected_book_id
    transitions:
      - condition: success == true
        next_state: BORROW_SUCCESS
      - next_state: BORROW_ERROR

  BORROW_SUCCESS:
    type: interactive
    description: Успешное бронирование книги
    interface:
      text:
        ru: |
          ✅ *Кря-победа! Книга твоя.*

          Экземпляр “`{title}`” забронирован под твое крыло и ждёт тебя в библиотеке.

          🗓 Вернуть до: `{due_date}` (поставь напоминалку, серьезно!)
        en: |
          ✅ *Quack-tastic! It's yours.*

          “`{title}`” is reserved under your wing. It's waiting in the library.

          🗓 Return by: `{due_date}` (set a reminder, seriously!)
      buttons:
        - id: my_books
          label:
            ru: 👤 На мою полку
            en: 👤 To my shelf
          next_state: FETCH_MY_BOOKS
        - id: home
          label:
            ru: 📚 В библиотеку
            en: 📚 Library menu
          next_state: LIBRARY_HOME

  FETCH_MY_BOOKS:
    type: system
    description: Загружаем активные выдачи пользователя
    logic:
      action: get_user_loans
    transitions:
      - next_state: MY_BOOKS_LIST

  MY_BOOKS_LIST:
    type: interactive
    interface:
      text:
        ru: |
          👤 *Твоя книжная полка*

          {loans_list_formatted}

          _✅ — В срок / ⚠️ — Срочно неси назад!_

          _{my_loans_hint_ru}_
        en: |
          👤 *Your bookshelf*

          {loans_list_formatted}

          _✅ — On time / ⚠️ — Return it ASAP!_

          _{my_loans_hint_en}_
      buttons:
        - id: "{loan_btn_id_1}"
          label: "{loan_btn_label_1}"
          next_state: PROCESS_MY_BOOK
        - id: "{loan_btn_id_2}"
          label: "{loan_btn_label_2}"
          next_state: PROCESS_MY_BOOK
        - id: "{loan_btn_id_3}"
          label: "{loan_btn_label_3}"
          next_state: PROCESS_MY_BOOK
        - id: "{loan_btn_id_4}"
          label: "{loan_btn_label_4}"
          next_state: PROCESS_MY_BOOK
        - id: "{loan_btn_id_5}"
          label: "{loan_btn_label_5}"
          next_state: PROCESS_MY_BOOK
        - id: "{loan_btn_id_6}"
          label: "{loan_btn_label_6}"
          next_state: PROCESS_MY_BOOK
        - id: "{loan_btn_id_7}"
          label: "{loan_btn_label_7}"
          next_state: PROCESS_MY_BOOK
        - id: "{loan_btn_id_8}"
          label: "{loan_btn_label_8}"
          next_state: PROCESS_MY_BOOK
        - id: home
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          row: 99
          next_state: LIBRARY_HOME

  PROCESS_MY_BOOK:
    type: system
    logic:
      action: return_book_loan
    transitions:
      - next_state: FETCH_MY_BOOKS

  FETCH_CATEGORIES:
    type: system
    logic:
      action: get_book_categories
    transitions:
      - next_state: DISPLAY_CATEGORIES

  DISPLAY_CATEGORIES:
    type: interactive
    description: Выбор категории
    interface:
      text:
        ru: |
          🗂 *Библиотека / Полки по темам*

          Выбери направление, а я покажу, что там есть почитать.
        en: |
          🗂 *Library / Subject Shelves*

          Choose a topic and I'll show you what's on the shelf.
      buttons:
        - id: "{category_id_1}"
          label: "{category_label_1}"
          condition: "category_id_1 != ''"
          action: prepare_category_search
          next_state: EXECUTE_SEARCH
          row: 1
        - id: "{category_id_2}"
          label: "{category_label_2}"
          condition: "category_id_2 != ''"
          action: prepare_category_search
          next_state: EXECUTE_SEARCH
          row: 2
        - id: "{category_id_3}"
          label: "{category_label_3}"
          condition: "category_id_3 != ''"
          action: prepare_category_search
          next_state: EXECUTE_SEARCH
          row: 3
        - id: "{category_id_4}"
          label: "{category_label_4}"
          condition: "category_id_4 != ''"
          action: prepare_category_search
          next_state: EXECUTE_SEARCH
          row: 4
        - id: "{category_id_5}"
          label: "{category_label_5}"
          condition: "category_id_5 != ''"
          action: prepare_category_search
          next_state: EXECUTE_SEARCH
          row: 5
        - id: "{category_id_6}"
          label: "{category_label_6}"
          condition: "category_id_6 != ''"
          action: prepare_category_search
          next_state: EXECUTE_SEARCH
          row: 6
        - id: "{category_id_7}"
          label: "{category_label_7}"
          condition: "category_id_7 != ''"
          action: prepare_category_search
          next_state: EXECUTE_SEARCH
          row: 7
        - id: "{category_id_8}"
          label: "{category_label_8}"
          condition: "category_id_8 != ''"
          action: prepare_category_search
          next_state: EXECUTE_SEARCH
          row: 8
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_HOME
          row: 99

  SHOW_RULES:
    type: interactive
    interface:
      text:
        ru: |
          📜 *Утиный кодекс читателя* 🦆

          1. Книги выдаются на 14 дней. Не будь редиской, верни вовремя.
          2. Бронирование – штука быстрая, нажал – беги забирать.
          3. Если книга у другого пира – кусай локти или жди.
        en: |
          📜 *Duck Reader's Code* 🦆

          1. Books are for 14 days. Don't be a goose, return on time.
          2. Reservation is fast – press it and go get it.
          3. If another peer has the book – tough luck, wait your turn.
      buttons:
        - id: back
          label:
            ru: ✅ Понятно!
            en: ✅ Got it!
          next_state: LIBRARY_HOME

  BORROW_ERROR:
    type: interactive
    interface:
      text:
        ru: |
          ❌ *Промашка!* Книга ускользнула.

          Кто-то выхватил прямо перед твоим клювом.
        en: |
          ❌ *Slip up!* The book slipped away.

          Someone grabbed it right from under your beak.
      buttons:
        - id: retry
          label:
            ru: 🔄 Попробовать еще раз
            en: 🔄 Try again
          next_state: EXECUTE_SEARCH
        - id: home
          label:
            ru: 📚 В библиотеку
            en: 📚 Library menu
          next_state: LIBRARY_HOME

  SEARCH_EMPTY:
    type: interactive
    interface:
      text:
        ru: |
          🤷 *Пусто, ничего не нашлось*

          По запросу *{results_scope_label_ru}* в кампусе `{campus_name}` ничего не всплыло.
          Попробуй другой поисковый запрос.
        en: |
          🤷 *Empty, nothing found*

          Nothing found for *{results_scope_label_en}* in `{campus_name}`.
          Try another search query.
      buttons:
        - id: retry
          label:
            ru: 🔎 Другой запрос
            en: 🔎 Another query
          next_state: SEARCH_INPUT_MODE
        - id: categories
          label:
            ru: 🗂 Все разделы
            en: 🗂 All subjects
          next_state: FETCH_CATEGORIES
        - id: home
          label:
            ru: 📚 В библиотеку
            en: 📚 Library menu
          next_state: LIBRARY_HOME
