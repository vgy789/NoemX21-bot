---
meta:
  feature_id: LIB-001
  name: Библиотека
  description: 'Управление книгами: Поиск, фильтрация, пагинация и бронирование'
  version: 2.0.0

initial_state: LIBRARY_MENU
states:
  LIBRARY_MENU:
    type: interactive
    description: Главное меню библиотеки
    ## TODO: реализуй поиск по названию/автору, state: → BOOK_SEARCH_INPUT
    transitions:
      - trigger: on_input
        next_state: BOOK_SEARCH_INPUT
    interface:
      text:
        ru: |
          📚 *Библиотека* `{my_campus}`

          📊 *Статистика*: Книг доступно: `{available_count}`

          🔎 *Отправь мне название книги или нажми на кнопки ниже:*
        en: |
          📚 *Library* `({my_campus})`

          📊 *Statistics*: Available books: `{available_count}`

          🔎 *Send me the book title or click the buttons below:*
      buttons:
        - id: list_all
          label:
            ru: 📋 Весь список
            en: 📋 List all
          row: 1
          next_state: FETCH_BOOKS
        - id: available
          label:
            ru: ✅ Доступно сейчас
            en: ✅ Available now
          row: 1
          next_state: FETCH_AVAILABLE_BOOKS
        - id: filters
          label:
            ru: 🏷️ Категории
            en: 🏷️ Categories
          row: 2
          next_state: FILTER_SELECTION
        - id: my_books
          label:
            ru: 📖 Мои книги
            en: 📖 My books
          row: 2
          next_state: MY_BOOKS
        - id: back
          label:
            ru: 🏠 Назад
            en: 🏠 Back
          next_state: main_menu.yaml/MAIN_MENU
    on_enter: fetch_library_stats

  FILTER_SELECTION:
    type: interactive
    description: Выбор критерия фильтрации
    interface:
      text:
        ru: |
          🏷️ *Фильтрация книг*

        en: |
          🏷️ *Filter books*

      buttons:
        - id: by_category
          label:
            ru: По категориям
            en: By categories
          row: 1
          next_state: SELECT_CATEGORY
        - id: by_author
          label:
            ru: По автору
            en: By author
          row: 1
          next_state: SELECT_AUTHOR
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_MENU

  SELECT_CATEGORY:
    type: interactive
    description: Выбор конкретной категории
    interface:
      text:
        ru: |
          🗂️ *Выбери категорию:*
        en: |
          🗂️ *Choose category:*
      buttons:
        - id: cat_{book_category_id}
          label: "{book_category_name}"
          next_state: FETCH_BOOKS
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: FILTER_SELECTION
    on_enter: fetch_categories

  SELECT_AUTHOR:
    type: interactive
    description: Выбор конкретного автора
    interface:
      text:
        ru: |
          ✍️ *Выбери автора:*
        en: |
          ✍️ *Choose author:*
      buttons:
        - id: auth_{book_author_id}
          label: "{book_author_name}"
          next_state: FETCH_BOOKS
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: FILTER_SELECTION
    on_enter: fetch_authors

  FETCH_BOOKS:
    type: system
    description: Загрузка списка книг с учётом фильтров и пагинации
    logic:
      action: get_books
      payload:
        campus_id: $context.campus_id
        search: $context.search_query
        category_id: $context.category_id
        author_id: $context.author_id
        only_available: $context.only_available
        offset: $context.books_offset
        limit: 10
    transitions:
      - next_state: DISPLAY_BOOKS

  FETCH_AVAILABLE_BOOKS:
    type: system
    description: Загрузка только доступных книг
    logic:
      action: get_books
      payload:
        campus_id: $context.campus_id
        only_available: true
        limit: 10
    transitions:
      - next_state: DISPLAY_BOOKS

  DISPLAY_BOOKS:
    type: interactive
    description: Список книг с пагинацией
    interface:
      text:
        ru: |
          *Результаты поиска ({total_count})*

          Страница {current_page} из {total_pages}

          {books_list_numbered}
        en: |
          *Search results ({total_count})*

          Page {current_page} of {total_pages}

          {books_list_numbered}
      buttons:
        - id: book_{book_id}
          label: "{index}"
        - id: prev_page
          label: ⬅️
          next_state: FETCH_BOOKS
          condition: current_page > 1
          row: 1
        - id: next_page
          label: ➡️
          next_state: FETCH_BOOKS
          condition: current_page < total_pages
          row: 1
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_MENU
    transitions:
      - trigger: button_click
        condition: id.startswith('book_')
        next_state: BOOK_DETAILS

  BOOK_DETAILS:
    type: interactive
    description: Детальная информация о книге
    interface:
      text:
        ru: |
          📖 *{book_title}*
          ───
          👤 *Автор:* {book_author}
          🗂️ *Категория:* {book_category}

          {status_emoji} *Статус:* {status_description}
          {loan_info}
          ───
          {notification_text}
        en: |
          📖 *{book_title}*
          ───
          👤 *Author:* {book_author}
          🗂️ *Category:* {book_category}

          {status_emoji} *Status:* {status_description}
          {loan_info}
          ───
          {notification_text}
      buttons:
        - id: borrow
          label:
            ru: ⚡ Взять книгу
            en: ⚡ Borrow book
          next_state: BORROW_BOOK
          condition: is_available == true
        - id: notify_when_free
          label:
            ru: 🔔 Уведомить о возврате
            en: 🔔 Notify when back
          next_state: SET_BOOK_NOTIFICATION
          condition: is_available == false
        - id: back
          label:
            ru: ⬅️ К списку
            en: ⬅️ Back to list
          next_state: DISPLAY_BOOKS
    on_enter: fetch_book_details

  BORROW_BOOK:
    type: system
    description: Логика выдачи книги
    logic:
      action: borrow_book
      payload:
        book_id: $context.selected_book_id
        student_id: $context.user_id
    transitions:
      - condition: success == true
        next_state: BORROW_CONFIRMED
      - condition: success == false
        next_state: ERROR_UNAVAILABLE

  BORROW_CONFIRMED:
    type: interactive
    description: Подтверждение успешной выдачи
    interface:
      text:
        ru: |
          ✅ Книга «{book_title}» за тобой! Пожалуйста, верни её до {due_date}.
        en: |
          ✅ Book "{book_title}" is yours! Please return it by {due_date}.
    transitions:
      - next_state: main_menu.yaml/MAIN_MENU

  SET_BOOK_NOTIFICATION:
    type: interactive
    description: Подписка на уведомление о возврате
    interface:
      text:
        ru: |
          🔔 Мы уведомим тебя, когда «{book_title}» в кампусе {my_campus} снова будет свободна.
        en: |
          🔔 We will notify you when "{book_title}" in {my_campus} campus is available again.
    transitions:
      - next_state: DISPLAY_BOOKS

  MY_BOOKS:
    type: interactive
    description: Книги у пользователя на руках
    interface:
      text:
        ## 🟢 (более 3 дней), 🟡 (1-2 дня), 🔴 (просрочено).
        ru: |
          *Твои книги:*

          {my_books_list}
        en: |
          *Your books:*

          {my_books_list}
      buttons:
        - id: return_{book_id}
          label:
            ru: Вернуть «{book_title}»
            en: Return «{book_title}»
          next_state: RETURN_BOOK
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_MENU
    on_enter: fetch_my_books

  RETURN_BOOK:
    type: system
    description: Логика возврата книги
    logic:
      action: return_book
      payload:
        book_id: $context.selected_book_id
        student_id: $context.user_id
    transitions:
      - next_state: MY_BOOKS

  ERROR_UNAVAILABLE:
    type: interactive
    description: 'Ошибка: книга занята'
    interface:
      text:
        ru: |
          ❌ Упс! Кто-то успел забрать книгу раньше тебя.
        en: |
          ❌ Oops! Someone already borrowed this book.
    transitions:
      - next_state: DISPLAY_BOOKS
