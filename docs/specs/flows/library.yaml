---
meta:
  feature_id: LIB-001
  name: Библиотека
  description: 'Управление книгами: Поиск, фильтрация, пагинация и бронирование'
  version: 2.1.0

initial_state: AUTO_SYNC_LIB

states:
  AUTO_SYNC_LIB:
    type: system
    description: "Pre-load basic library stats"
    logic:
      action: get_library_stats
      payload:
        campus_id: $context.campus_id
    transitions:
      - next_state: LIBRARY_MENU

  LIBRARY_MENU:
    type: interactive
    description: Главное меню библиотеки
    interface:
      text:
        ru: |
          📚 *Библиотека: {my_campus}*

          Здесь ты можешь найти книги для обучения, забронировать их или продлить срок сдачи.

          📊 *Сейчас в библиотеке:*
          • Всего книг: `{total_books_count}`
          • Доступно: `{available_count}`
          • У тебя на руках: `{my_active_loans_count}`
        en: |
          📚 *Library: {my_campus}*

          Here you can find books for learning, reserve them, or extend the deadline.

          📊 *Library Stats:*
          • Total books: `{total_books_count}`
          • Available: `{available_count}`
          • You have: `{my_active_loans_count}`
      buttons:
        - id: search
          label:
            ru: 🔎 Найти книгу
            en: 🔎 Find book
          next_state: BOOK_SEARCH_INPUT
        - id: available
          label:
            ru: ✅ Доступные сейчас
            en: ✅ Available now
          row: 1
          next_state: FETCH_AVAILABLE_BOOKS
        - id: categories
          label:
            ru: 🏷️ Категории
            en: 🏷️ Categories
          row: 1
          next_state: FILTER_SELECTION
        - id: my_books
          label:
            ru: 📖 Мои книги
            en: 📖 My books
          row: 2
          next_state: FETCH_MY_BOOKS
        - id: back
          label:
            ru: 🏠 В главное меню
            en: 🏠 Main menu
          next_state: MAIN_MENU

  BOOK_SEARCH_INPUT:
    type: input
    description: Ввод названия или автора для поиска
    interface:
      text:
        ru: |
          🕵️ *Поиск книги*

          Введи название книги или фамилию автора.
          _Например:_ `Knuth` или `C Programming`
        en: |
          🕵️ *Book Search*

          Enter the book title or author's name.
          _Example:_ `Knuth` or `C Programming`
      buttons:
        - id: back
          label:
            ru: 🙅‍♂️ Отмена
            en: 🙅‍♂️ Cancel
          next_state: LIBRARY_MENU
    transitions:
      - trigger: on_input
        next_state: SEARCHING_BOOKS

  SEARCHING_BOOKS:
    type: system
    description: Промежуточное состояние поиска
    logic:
      action: get_books
      payload:
        campus_id: $context.campus_id
        search: $context.last_input
        limit: 10
        offset: 0
    transitions:
      - condition: total_count == 0
        next_state: BOOKS_NOT_FOUND
      - next_state: DISPLAY_BOOKS

  FILTER_SELECTION:
    type: interactive
    description: Меню выбора фильтров
    interface:
      text:
        ru: |
          🏷️ *Фильтрация*
          Как будем искать?
        en: |
          🏷️ *Filtering*
          How should we search?
      buttons:
        - id: by_category
          label:
            ru: 📂 По категориям
            en: 📂 By categories
          next_state: SELECT_CATEGORY
        - id: by_author
          label:
            ru: ✍️ По авторам
            en: ✍️ By authors
          next_state: SELECT_AUTHOR
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_MENU

  SELECT_CATEGORY:
    type: interactive
    description: Выбор категории из списка
    logic:
      action: get_categories
    interface:
      text:
        ru: 🗂️ *Выбери категорию:*
        en: 🗂️ *Choose category:*
      buttons:
        - id: cat_{category_id}
          label: "{category_name}"
          next_state: FETCH_BOOKS_BY_FILTER
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: FILTER_SELECTION

  SELECT_AUTHOR:
    type: interactive
    description: Выбор автора из списка
    logic:
      action: get_authors
    interface:
      text:
        ru: ✍️ *Выбери автора:*
        en: ✍️ *Choose author:*
      buttons:
        - id: auth_{author_id}
          label: "{author_name}"
          next_state: FETCH_BOOKS_BY_FILTER
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: FILTER_SELECTION

  FETCH_BOOKS_BY_FILTER:
    type: system
    description: Загрузка книг по выбранному фильтру
    logic:
      action: get_books
      payload:
        campus_id: $context.campus_id
        category_id: $context.selected_category_id
        author_id: $context.selected_author_id
        limit: 10
        offset: 0
    transitions:
      - condition: total_count == 0
        next_state: BOOKS_NOT_FOUND
      - next_state: DISPLAY_BOOKS

  FETCH_AVAILABLE_BOOKS:
    type: system
    description: Загрузка только доступных
    logic:
      action: get_books
      payload:
        campus_id: $context.campus_id
        only_available: true
        limit: 10
        offset: 0
    transitions:
      - condition: total_count == 0
        next_state: BOOKS_NOT_FOUND
      - next_state: DISPLAY_BOOKS

  DISPLAY_BOOKS:
    type: interactive
    description: Вывод списка книг с пагинацией
    interface:
      text:
        ru: |
          📚 *Результаты поиска ({total_count})*
          Страница {current_page} из {total_pages}

          {books_list_numbered}
        en: |
          📚 *Search results ({total_count})*
          Page {current_page} of {total_pages}

          {books_list_numbered}
      buttons:
        - id: book_{book_id}
          label: "{index}. {book_short_title}"
        - id: prev
          label: "⬅️"
          next_state: FETCH_PREV_PAGE
          condition: current_page > 1
          row: 1
        - id: next
          label: "➡️"
          next_state: FETCH_NEXT_PAGE
          condition: current_page < total_pages
          row: 1
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_MENU
    transitions:
      - trigger: button_click
        condition: id.startswith('book_')
        next_state: FETCH_BOOK_DETAILS

  BOOKS_NOT_FOUND:
    type: interactive
    description: Пустой результат поиска
    interface:
      text:
        ru: |
          🤷‍♂️ *Ничего не найдено*

          Мы перерыли все полки, но книг по запросу не нашли.
          Попробуй изменить запрос или категорию.
        en: |
          🤷‍♂️ *Nothing found*

          We checked all shelves but couldn't find any books.
          Try changing your query or category.
      buttons:
        - id: retry
          label:
            ru: 🔄 Новый поиск
            en: 🔄 New search
          next_state: BOOK_SEARCH_INPUT
        - id: back
          label:
            ru: 🏠 В меню
            en: 🏠 To menu
          next_state: LIBRARY_MENU

  FETCH_BOOK_DETAILS:
    type: system
    description: Получение деталей одной книги
    logic:
      action: get_book_details
      payload:
        book_id: $context.selected_book_id
    transitions:
      - next_state: BOOK_DETAILS

  BOOK_DETAILS:
    type: interactive
    description: Карточка книги
    interface:
      text:
        ru: |
          📖 *{book_title}*

          👤 *Автор:* {book_author}
          🗂️ *Категория:* {book_category}
          ---
          {status_emoji} *Статус:* {status_description}
          {loan_info}
        en: |
          📖 *{book_title}*

          👤 *Author:* {book_author}
          🗂️ *Category:* {book_category}
          ---
          {status_emoji} *Status:* {status_description}
          {loan_info}
      buttons:
        - id: borrow
          label:
            ru: ⚡ Взять почитать
            en: ⚡ Borrow now
          next_state: BORROW_BOOK_ACTION
          condition: is_available == true
        - id: notify
          label:
            ru: 🔔 Жду возврата
            en: 🔔 Notify me
          next_state: SUBSCRIBE_BOOK_ACTION
          condition: is_available == false
        - id: back
          label:
            ru: 🔙 К списку
            en: 🔙 Back to list
          next_state: DISPLAY_BOOKS

  BORROW_BOOK_ACTION:
    type: system
    description: Попытка взять книгу
    logic:
      action: borrow_book
      payload:
        book_id: $context.selected_book_id
        user_id: $context.user_id
    transitions:
      - condition: success == true
        next_state: BORROW_SUCCESS
      - condition: success == false
        next_state: BORROW_ERROR

  BORROW_SUCCESS:
    type: interactive
    description: Успешная выдача
    interface:
      text:
        ru: |
          ✅ *Книга забронирована!*

          Ты взял «{book_title}».
          🗓 *Вернуть до:* {due_date}

          Не забудь отметить получение на стойке администратора, если это требуется в твоем кампусе.
        en: |
          ✅ *Book reserved!*

          You borrowed "{book_title}".
          🗓 *Return by:* {due_date}

          Don't forget to confirm pickup at the admin desk if required in your campus.
      buttons:
        - id: my_books
          label:
            ru: 📚 К моим книгам
            en: 📚 My books
          next_state: FETCH_MY_BOOKS
        - id: menu
          label:
            ru: 🏠 В меню
            en: 🏠 Main menu
          next_state: LIBRARY_MENU

  FETCH_MY_BOOKS:
    type: system
    description: Получение списка моих книг
    logic:
      action: get_user_loans
      payload:
        user_id: $context.user_id
    transitions:
      - next_state: MY_BOOKS

  MY_BOOKS:
    type: interactive
    description: Список книг пользователя
    interface:
      text:
        ru: |
          👤 *Твои книги*

          Здесь список всего, что ты сейчас читаешь.
          Следи за дедлайнами! ⏰

          {my_books_list_formatted}
        en: |
          👤 *Your Books*

          Here is the list of everything you are reading.
          Watch the deadlines! ⏰

          {my_books_list_formatted}
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: LIBRARY_MENU

  BORROW_ERROR:
    type: interactive
    description: Ошибка при выдаче
    interface:
      text:
        ru: |
          ❌ *Упс!*

          Кто-то успел забрать книгу прямо перед тобой, или у тебя превышен лимит книг на руках.
        en: |
          ❌ *Oops!*

          Someone grabbed the book just before you, or you reached your borrowing limit.
      buttons:
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: BOOK_DETAILS
