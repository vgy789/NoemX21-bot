---
meta:
  feature_id: ADM-001
  name: Администрирование
  description: 'Центр управления: рассылки, маршрутизация ревью и защита чатов'
  version: 2.0.0

initial_state: ADMIN_MENU
states:
  ADMIN_MENU:
    type: interactive
    description: Главное меню администратора
    interface:
      text:
        ru: |
          🎛 *Центр управления*

          Добро пожаловать в админку. Выбери уровень доступа:

          📡 *Global Admin:*
          Отправка уведомлений всем пользователям бота.

          👮‍♂️ *Group Owner:*
          Настройка твоих чатов: защита от чужаков и привязка топиков для уведомлений.
        en: |
          🎛 *Control Center*

          Welcome to the admin panel. Choose access level:

          📡 *Global Admin:*
          Broadcast notifications to all bot users.

          👮‍♂️ *Group Owner:*
          Manage your chats: intruder protection and topic linking for notifications.
      buttons:
        - id: broadcast
          label:
            ru: 📢 Сделать рассылку
            en: 📢 Broadcast message
          next_state: BROADCAST_INPUT
          condition: is_bot_owner == true
        - id: link_topic
          label:
            ru: 🔗 Маршрутизация (Topics)
            en: 🔗 Routing (Topics)
          next_state: SELECT_GROUP_FOR_TOPIC
          condition: is_group_owner == true
        - id: guard
          label:
            ru: 🛡️ Фейс-контроль (Guard)
            en: 🛡️ Face Control (Guard)
          next_state: SELECT_GROUP_FOR_GUARD
          condition: is_group_owner == true
        - id: back
          label:
            ru: 🏠 Выход
            en: 🏠 Exit
          next_state: main_menu.yaml/MAIN_MENU
    on_enter: check_admin_permissions

  BROADCAST_INPUT:
    type: input
    description: Ввод текста для рассылки
    interface:
      text:
        ru: |
          📢 *Громкоговоритель*

          Напиши сообщение. Его получат **ВСЕ** пользователи бота, у которых включены уведомления.

          _Поддерживается Markdown-разметка._
        en: |
          📢 *Loudspeaker*

          Write a message. It will be received by **ALL** bot users with notifications enabled.

          _Markdown is supported._
      buttons:
        - id: cancel
          label:
            ru: 🔙 Отмена
            en: 🔙 Cancel
          next_state: ADMIN_MENU
    validation:
      regex: ^[\s\S]{1,4096}$
    transitions:
      - trigger: on_valid_input
        next_state: BROADCAST_CONFIRM

  BROADCAST_CONFIRM:
    type: interactive
    description: Подтверждение рассылки
    interface:
      text:
        ru: |
          ⚠️ *Финальная проверка*

          Ты собираешься отправить это сообщение всем пользователям. Отменить действие будет нельзя.

          📜 *Превью:*
          ──────────────────
          {last_input}
          ──────────────────
        en: |
          ⚠️ *Final Check*

          You are about to send this message to all users. This action cannot be undone.

          📜 *Preview:*
          ──────────────────
          {last_input}
          ──────────────────
      buttons:
        - id: confirm
          label:
            ru: 🔥 Отправить сейчас
            en: 🔥 Send now
          next_state: EXECUTE_BROADCAST
        - id: cancel
          label:
            ru: ❌ Отмена
            en: ❌ Cancel
          next_state: ADMIN_MENU

  EXECUTE_BROADCAST:
    type: system
    description: Фоновая отправка рассылки
    logic:
      action: broadcast_message
      payload:
        text: $context.last_input
    transitions:
      - next_state: ADMIN_MENU

  SELECT_GROUP_FOR_TOPIC:
    type: interactive
    description: Выбор группы для привязки темы
    interface:
      text:
        ru: |
          🔗 *Маршрутизация ревью*

          Выбери группу, в которой ты хочешь настроить автоматический постинг запросов на ревью (Peer Review) в конкретный топик.

          _Список групп, где ты владелец:_
        en: |
          🔗 *Review Routing*

          Select a group where you want to configure automatic posting of Peer Review requests to a specific topic.

          _Groups where you are owner:_
      buttons:
        - id: group_{chat_id}
          label: "{chat_title}"
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: ADMIN_MENU
    on_enter: fetch_managed_groups

  INPUT_THREAD_ID:
    type: input
    description: Ввод message_thread_id
    interface:
      text:
        ru: |
          📍 *Настройка для «{chat_title}»*

          Введи ID топика (`message_thread_id`), куда бот будет присылать уведомления.

          ℹ️ *Как узнать ID:*
          1. Скопируй ссылку на любое сообщение внутри нужного топика.
          2. Последние цифры ссылки — это и есть ID (например, в `t.me/c/123/44` ID — это **44**).

          👇 *Введи только число:*
        en: |
          📍 *Setup for "{chat_title}"*

          Enter the Topic ID (`message_thread_id`) where the bot will post notifications.

          ℹ️ *How to find ID:*
          1. Copy the link to any message inside the desired topic.
          2. The last digits are the ID (e.g., in `t.me/c/123/44`, the ID is **44**).

          👇 *Enter number only:*
    validation:
      regex: ^\d+$
    transitions:
      - trigger: on_valid_input
        next_state: CONFIGURE_TOPIC_FILTERS

  CONFIGURE_TOPIC_FILTERS:
    type: interactive
    description: Настройка фильтров темы
    interface:
      text:
        ru: |
          ⚙️ *Фильтры потока ({chat_title})*

          ID топика: `{thread_id}`

          Какие запросы пересылать сюда? Нажимай на кнопки, чтобы включить/выключить фильтры.

          📋 *Текущие настройки:*
          {current_filters_summary}
        en: |
          ⚙️ *Stream Filters ({chat_title})*

          Topic ID: `{thread_id}`

          Which requests should be forwarded here? Tap buttons to toggle filters.

          📋 *Current settings:*
          {current_filters_summary}
      buttons:
        - id: campus_{campus_id}
          label:
            ru: "🏳️ Кампус: {my_campus} {status_emoji}"
            en: "🏳️ Campus: {my_campus} {status_emoji}"
        - id: branch_{branch_id}
          label:
            ru: "🌿 Ветка: {branch_name} {status_emoji}"
            en: "🌿 Branch: {branch_name} {status_emoji}"
        - id: save
          label:
            ru: 💾 Сохранить и выйти
            en: 💾 Save and exit
          next_state: SAVE_TOPIC_LINK
    on_enter: fetch_topic_filter_options
    transitions:
      - trigger: button_click
        condition: id.startswith('campus_') || id.startswith('branch_')
        action: toggle_topic_filter
        next_state: CONFIGURE_TOPIC_FILTERS

  SAVE_TOPIC_LINK:
    type: system
    description: Сохранение привязки
    logic:
      action: link_group_topic
      payload:
        chat_id: $context.selected_chat_id
        thread_id: $context.thread_id
        filters: $context.topic_filters
    transitions:
      - next_state: ADMIN_MENU

  SELECT_GROUP_FOR_GUARD:
    type: interactive
    description: Выбор группы для Guard
    interface:
      text:
        ru: |
          🛡️ *Фейс-контроль (Guard)*

          Выбери группу, чтобы настроить автоматическую проверку входящих пользователей через API Школы 21.
        en: |
          🛡️ *Face Control (Guard)*

          Select a group to configure automatic user verification via School 21 API.
      buttons:
        - id: group_{chat_id}
          label: "{chat_title}"
          next_state: CONFIGURE_GUARD_RULES
        - id: back
          label:
            ru: 🔙 Назад
            en: 🔙 Back
          next_state: ADMIN_MENU
    on_enter: fetch_managed_groups

  CONFIGURE_GUARD_RULES:
    type: interactive
    description: Настройка условий пропуска
    interface:
      text:
        ru: |
          👮‍♂️ *Пост охраны: {chat_title}*

          Кого пропускаем внутрь? Бот будет кикать тех, кто не соответствует правилам.

          📋 *Активные требования:*
          {current_rules_summary}
        en: |
          👮‍♂️ *Security Post: {chat_title}*

          Who is allowed in? The bot will kick anyone who doesn't meet the rules.

          📋 *Active Requirements:*
          {current_rules_summary}
      buttons:
        - id: toggle_school_member
          label:
            ru: "🎓 Студент Школы 21 {member_status_icon}"
            en: "🎓 School 21 Student {member_status_icon}"
        - id: set_project
          label:
            ru: "📝 Проект: {project_condition}"
            en: "📝 Project: {project_condition}"
          next_state: INPUT_GUARD_PROJECT
        - id: set_campus
          label:
            ru: "🏰 Кампус: {campus_condition}"
            en: "🏰 Campus: {campus_condition}"
          next_state: SELECT_GUARD_CAMPUS
        - id: save
          label:
            ru: ✅ Применить правила
            en: ✅ Apply Rules
          next_state: SAVE_GUARD_RULES
    on_enter: fetch_current_guard_rules
    transitions:
      - trigger: button_click
        condition: id == 'toggle_school_member'
        action: toggle_guard_school_member
        next_state: CONFIGURE_GUARD_RULES

  INPUT_GUARD_PROJECT:
    type: input
    description: Ввод проекта для Guard
    interface:
      text:
        ru: |
          📝 *Требование по проекту*

          Введи название проекта, на который должен быть зарегистрирован студент (или `none` для отключения).

          *Пример:* `C3_SimpleBashUtils`
        en: |
          📝 *Project Requirement*

          Enter the project name the student must be registered for (or `none` to disable).

          *Example:* `C3_SimpleBashUtils`
    transitions:
      - trigger: on_valid_input
        next_state: CONFIGURE_GUARD_RULES
        action: set_guard_project

  SELECT_GUARD_CAMPUS:
    type: interactive
    description: Выбор кампуса для Guard
    interface:
      text:
        ru: |
          🏰 *Требование по кампусу*

          Выбери кампус, из которого должны быть студенты.
        en: |
          🏰 *Campus Requirement*

          Select the campus students must be from.
      buttons:
        - id: campus_{campus_id}
          label: "{my_campus}"
          next_state: CONFIGURE_GUARD_RULES
        - id: reset
          label:
            ru: 🌍 Любой кампус (Сброс)
            en: 🌍 Any campus (Reset)
          next_state: CONFIGURE_GUARD_RULES
    on_enter: fetch_available_campuses

  SAVE_GUARD_RULES:
    type: system
    description: Сохранение правил
    logic:
      action: update_chat_guard
      payload:
        chat_id: $context.selected_chat_id
        rules: $context.guard_rules
    transitions:
      - next_state: ADMIN_MENU
