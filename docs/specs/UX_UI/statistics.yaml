meta:
  feature_id: "STAT-001"
  name: "Статистика и навыки"
  description: "Отображение статистики пользователя и визуализация навыков через радар-диаграмму"
  version: "1.0.0"

initial_state: STATS_MENU

# --- ОПИСАНИЕ СОСТОЯНИЙ ---
states:

  # 1. Состояние меню статистики
  STATS_MENU:
    type: interactive
    description: "Меню статистики"
    interface:
      text:
        ru: "📊 Ваша статистика..."
        en: "📊 Your statistics..."
      buttons:
        - id: update
          label: { ru: "Обновить", en: "Update" }
          next_state: FETCH_STATS
        - id: skills
          label: { ru: "Навыки", en: "Skills" }
          next_state: RADAR_MENU
    on_enter:
      action: "fetch_statistics"

  # 2. Состояние получения данных статистики
  FETCH_STATS:
    type: system
    description: "Получение данных статистики"
    logic:
      request: "GET /v1/users/{user_id}/stats"
      payload: { user_id: "$context.user_id" }
    transitions:
      - condition: "data_found == true"
        next_state: DISPLAY_STATS
      - condition: "data_found == false"
        next_state: ERROR_NOT_FOUND

  # 3. Состояние отображения статистики
  DISPLAY_STATS:
    type: interactive
    description: "Отображение статистики"
    interface:
      text:
        ru: "📊 **Статистика студента**\n\n🆔 ID: {student_id}\n👤 Логин: {s21_login}\n🏫 Кампус: {campus_name}\n🏛️ Коалиция: {coalition_name} ({coalition_rank})\n\n📈 Прогресс:\n├─ Уровень: {level}\n├─ Опыт: {exp_value} XP\n├─ PRP: {prp_points}\n├─ CRP: {crp_points}\n└─ Монеты: {coins}\n\n💬 Feedback: {feedback_count}"
        en: "📊 **Student Statistics**\n\n🆔 ID: {student_id}\n👤 Login: {s21_login}\n🏫 Campus: {campus_name}\n🏛️ Coalition: {coalition_name} ({coalition_rank})\n\n📈 Progress:\n├─ Level: {level}\n├─ Experience: {exp_value} XP\n├─ PRP: {prp_points}\n├─ CRP: {crp_points}\n└─ Coins: {coins}\n\n💬 Feedback: {feedback_count}"
      buttons:
        - id: back
          label: { ru: "Назад", en: "Back" }
          next_state: "main_menu.yaml/MAIN_MENU"

  # 4. Состояние ошибки статистики
  ERROR_NOT_FOUND:
    type: interactive
    description: "Ошибка получения статистики"
    interface:
      text:
        ru: "❌ Статистика недоступна. Попробуйте позже."
        en: "❌ Statistics unavailable. Try again later."
      buttons:
        - id: back
          label: { ru: "Назад", en: "Back" }
          next_state: "main_menu.yaml/MAIN_MENU"

  # 5. Состояние меню радар-диаграммы
  RADAR_MENU:
    type: interactive
    description: "Меню диаграммы навыков"
    interface:
      text:
        ru: "📈 Диаграмма навыков\nВведите логин для сравнения или оставьте пустым:"
        en: "📈 Skills Radar\nEnter login to compare or leave empty:"
      buttons:
        - id: my_skills
          label: { ru: "Мои навыки", en: "My skills" }
          next_state: SINGLE_USER
        - id: compare
          label: { ru: "Сравнить", en: "Compare" }
          next_state: COMPARE_INPUT
    on_enter: "fetch_radar_menu"

  # 6. Ввод логина для сравнения
  COMPARE_INPUT:
    type: input
    description: "Ввод логина второго пользователя"
    interface:
      text:
        ru: "Введите логин второго пользователя:"
        en: "Enter second user's login:"
      error_invalid:
        ru: "⚠️ Неверный формат! Логин должен быть 4-9 латинских букв."
        en: "⚠️ Invalid format! Login must be 4-9 lowercase letters."
      validation:
        regex: "^[a-z]{4,9}$"
      transitions:
        - trigger: "on_valid_input"
          next_state: COMPARE_USERS

  # 7. Получение навыков текущего пользователя
  SINGLE_USER:
    type: system
    description: "Получение навыков текущего пользователя"
    logic:
      request: "GET /v1/users/{user_id}/skills"
      payload: { user_id: "$context.user_id" }
    transitions:
      - next_state: GENERATE_CHART

  # 8. Получение навыков двух пользователей
  COMPARE_USERS:
    type: system
    description: "Получение навыков двух пользователей"
    logic:
      request: "GET /v1/users/{user_id}/skills"
      payload: { user_id: "$context.user_id", second_user_id: "$context.second_user" }
    transitions:
      - next_state: GENERATE_CHART

  # 9. Генерация Mermaid диаграммы
  GENERATE_CHART:
    type: system
    description: "Генерация Mermaid диаграммы"
    logic:
      action: "generate_radar_chart"
      payload: { user_skills: "$context.user_skills", second_user_skills: "$context.second_user_skills" }
    transitions:
      - next_state: DISPLAY_CHART

  # 10. Отображение диаграммы
  DISPLAY_CHART:
    type: interactive
    description: "Отображение диаграммы навыков"
    interface:
      text:
        ru: "```mermaid\nradar-beta\n  title {title}\n    {dynamic_axes}\n    curve {user1}{skills1}\n    {user2_line}\n    graticule polygon\n    max 100\n```"
        en: "```mermaid\nradar-beta\n  title {title}\n    {dynamic_axes}\n    curve {user1}{skills1}\n    {user2_line}\n    graticule polygon\n    max 100\n```"
      buttons:
        - id: back
          label: { ru: "Назад", en: "Back" }
          next_state: "main_menu.yaml/MAIN_MENU"