meta:
  feature_id: "SRCH-001"
  name: "Поиск пользователей"
  description: "Поиск контактов Telegram по логину School21"
  version: "1.0.0"

initial_state: CHECK_SEARCH_PERMISSION

states:
  CHECK_SEARCH_PERMISSION:
    type: system
    description: "Проверка, включил ли сам пользователь функцию поиска"
    logic:
      request: "GET /v1/users/{user_id}/permissions"
      payload: { user_id: "$context.user_id" }
    transitions:
      - condition: "is_searchable == true"
        next_state: SEARCH_INPUT
      - condition: "is_searchable == false"
        next_state: ERROR_SEARCH_DISABLED

  SEARCH_INPUT:
    type: input
    description: "Ввод логина для поиска"
    interface:
      text:
        ru: "🔍 Введите логин для поиска:"
        en: "🔍 Enter login to search:"
      buttons:
        - id: cancel
          label: { ru: "Отмена", en: "Cancel" }
          next_state: "main_menu.yaml/MAIN_MENU"
      error_invalid:
        ru: "❌ Пользователь не найден."
        en: "❌ User not found."
    validation:
      regex: "^[a-z]{4,9}$"
    transitions:
      - trigger: "on_valid_input"
        next_state: FIND_USER

  FIND_USER:
    type: system
    description: "Поиск пользователя в системе"
    logic:
      request: "GET /v1/users/{login}"
      payload: { login: "$context.last_input" }
    transitions:
      - condition: "user_found == true"
        next_state: CHECK_TARGET_PERMISSION
      - condition: "user_found == false"
        next_state: ERROR_NOT_FOUND

  CHECK_TARGET_PERMISSION:
    type: system
    description: "Проверка прав доступа к профилю цели"
    logic:
      request: "GET /v1/users/{login}/permissions"
      payload: { login: "$context.last_input" }
    transitions:
      - condition: "is_searchable == true"
        next_state: SHOW_RESULT
      - condition: "is_searchable == false && alternative_contact != null"
        next_state: SHOW_ALTERNATIVE
      - condition: "is_searchable == false && alternative_contact == null"
        next_state: HIDDEN_RESULT

  SHOW_RESULT:
    type: interactive
    description: "Отображение результата поиска"
    interface:
      text:
        ru: "👤 **{login}**\nTelegram: @{telegram_handle}"
        en: "👤 **{login}**\nTelegram: @{telegram_handle}"
      buttons:
        - id: message
          label: { ru: "Написать", en: "Message" }
          next_state: "main_menu.yaml/MAIN_MENU"

  SHOW_ALTERNATIVE:
    type: interactive
    description: "Отображение альтернативного контакта"
    interface:
      text:
        ru: "👤 **{login}**\nАльтернативная связь: {alternative_contact}"
        en: "👤 **{login}**\nAlternative contact: {alternative_contact}"
      buttons:
        - id: message
          label: { ru: "Написать", en: "Message" }
          next_state: "main_menu.yaml/MAIN_MENU"

  HIDDEN_RESULT:
    type: interactive
    description: "Скрытый профиль"
    interface:
      text:
        ru: "🙈 Пользователь скрыл свой профиль."
        en: "🙈 User has hidden their profile."
      buttons:
        - id: back
          label: { ru: "Назад", en: "Back" }
          next_state: "main_menu.yaml/MAIN_MENU"

  ERROR_NOT_FOUND:
    type: interactive
    description: "Пользователь не найден"
    interface:
      text:
        ru: "❌ Пользователь не найден."
        en: "❌ User not found."
      buttons:
        - id: back
          label: { ru: "Назад", en: "Back" }
          next_state: "main_menu.yaml/MAIN_MENU"

  ERROR_SEARCH_DISABLED:
    type: interactive
    description: "Поиск отключен у самого пользователя"
    interface:
      text:
        ru: "❌ Видимость профиля: выкл. Поиск профилей пиров недоступен. /searchable – включить"
        en: "❌ Profile visibility: off. Peer search is unavailable. /searchable – enable"
      buttons:
        - id: settings
          label: { ru: "В настройки", en: "To settings" }
          next_state: "settings.yaml/SETTINGS_MENU"
        - id: back
          label: { ru: "Назад", en: "Back" }
          next_state: "main_menu.yaml/MAIN_MENU"