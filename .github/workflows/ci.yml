name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: false

      - name: Cache Go modules and tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            bin/
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum', 'Makefile') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Deps
        run: make deps

      - name: Lint (GolangCI)
        run: make lint

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Security Check
        run: make security
        continue-on-error: true

      - name: Build
        run: make build
