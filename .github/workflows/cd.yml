---
name: CD

env:
  SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Downcase Image Name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Deploy to Dokku via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          script: |
            set -e
            REPO_NAME="${{ github.repository }}"
            IMAGE_NAME=${REPO_NAME,,}
            REGISTRY=${{ vars.REGISTRY }}
            TAG="sha-${{ env.SOURCE_SHA }}"
            FULL_IMAGE="$REGISTRY/$IMAGE_NAME:$TAG"
            APP_NAME=${{ vars.DOKKU_APP_NAME }}
            # deploy user runs dokku via sudo (NOPASSWD)
            sudo dokku apps:create $APP_NAME || true
            # runtime applies migrations during normal startup
            set +e
            DEPLOY_OUTPUT="$(sudo dokku git:from-image $APP_NAME $FULL_IMAGE 2>&1)"
            DEPLOY_STATUS=$?
            set -e
            printf '%s\n' "$DEPLOY_OUTPUT"
            if [ $DEPLOY_STATUS -ne 0 ]; then
              if printf '%s' "$DEPLOY_OUTPUT" | grep -q "No changes detected"; then
                sudo dokku ps:rebuild $APP_NAME
              else
                exit $DEPLOY_STATUS
              fi
            fi
      - name: Dokku cleanup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          script: sudo dokku cleanup
